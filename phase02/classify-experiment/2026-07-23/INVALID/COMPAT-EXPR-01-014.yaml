id: COMPAT-EXPR-01-014
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "always() 带括号与不带括号的兼容性差异"
intent_ref: INTENT-COMPAT-004

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-always-paren:
      name: Test always with/without parens
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Step with parens
          if: ${{ always() }}
          run: |
            echo "with_parens"
        - name: Step without parens
          if: ${{ always }}
          run: |
            echo "without_parens"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "若支持无括号形式，应正常求值并执行"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "若不支持无括号形式，应给出明确的语法错误提示"

teardown:
  reset: none
