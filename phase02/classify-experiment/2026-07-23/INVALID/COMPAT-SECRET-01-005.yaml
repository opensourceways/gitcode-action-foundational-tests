id: COMPAT-SECRET-01-005
dimensions: [compatibility, security]
dimension: compatibility
priority: P1
title: "环境级 secrets 不支持时应明确报错而非降级为项目级"
intent_ref: INTENT-COMPAT-NEW-002

setup:
  repo_fixture: default
  secrets:
    - name: PROJECT_SECRET
      value: project_value
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-env-secret:
      name: Test environment level secret
      runs-on: [dedicate-hosted, x64, large]
      environment: prod
      steps:
        - name: Check secrets
          run: |
            echo "project_secret=${{ secrets.PROJECT_SECRET }}"
            echo "env_secret=${{ secrets.ENV_SECRET }}"
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    eval: llm_assisted
    rubric: "ENV_SECRET 不应返回 PROJECT_SECRET 的值，不应静默降级"
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "项目级 secrets 正常注入，project_secret 值为 project_value"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "系统对环境级 secrets 或 environment 字段的缺失给出明确提示"

teardown:
  reset: fixture
