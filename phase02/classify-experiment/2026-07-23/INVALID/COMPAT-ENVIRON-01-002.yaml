id: COMPAT-ENVIRON-01-002
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "environment 字段绑定 secrets 的行为差异"
intent_ref: INTENT-COMPAT-023

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-environment:
      name: Test environment field
      runs-on: [dedicate-hosted, x64, large]
      environment: prod
      steps:
        - name: Echo env secret
          run: |
            echo "env_secret=${{ secrets.ENV_SECRET }}"
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "environment 字段不应被静默忽略"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "系统对 environment 字段给出明确报错或警告"

teardown:
  reset: none
