id: SEC-DEFPERM-01-002
dimensions: ["security"]
dimension: security
priority: P0
title: "job 级覆盖后权限正确收窄"
intent_ref: INTENT-SEC-036
setup:
  repo_fixture: default
workflow: |
  on:
    workflow_dispatch:
  permissions:
    repository: write
  jobs:
    override-test:
      name: Test job level override
      runs-on: [dedicate-hosted, x64, large]
      permissions:
        repository: read
      steps:
        - name: Attempt write after override
          run: |
            curl -s -o /dev/null -w "%{http_code}" -X POST \n            "https://api.gitcode.com/api/v5/repos/${{ atomgit.repository }}/issues" \n            -H "Authorization: token ${{ atomgit.token }}" \n            -d '{"title": "test"}'
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_logs
    must_not_contain: "write_successful"
  - type: positive
    target: run_logs
    equals: "403_or_permission_denied"
teardown:
  reset: fixture
