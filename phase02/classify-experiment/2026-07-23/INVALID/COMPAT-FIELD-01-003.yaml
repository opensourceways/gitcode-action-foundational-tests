id: COMPAT-FIELD-01-003
dimensions: [compatibility, usability]
dimension: compatibility
priority: P1
title: "未知顶层字段不应被静默忽略而应给出警告"
intent_ref: INTENT-COMPAT-021

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  custom_field: value
  jobs:
    test-unknown-field:
      name: Test unknown top-level field
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo hello
          run: |
            echo "hello"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "不应静默忽略未知字段"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "系统给出警告或错误，提示 custom_field 不被支持"

teardown:
  reset: none
