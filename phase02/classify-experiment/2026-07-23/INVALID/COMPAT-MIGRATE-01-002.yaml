id: COMPAT-MIGRATE-01-002
dimensions: [compatibility, usability]
dimension: compatibility
priority: P1
title: "GitHub 风格 run-name 语法迁移报错应给出可操作指引"
intent_ref: INTENT-COMPAT-031

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  run-name: "Build by ${{ github.actor }}"
  jobs:
    migrate-run-name:
      name: Test run-name block error
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: checkout source
          uses: checkout
        - name: echo hello
          run: |
            echo "hello"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: validation_error
    eval: llm_assisted
    rubric: "报错信息应明确指出 run-name 字段不被支持，并建议使用 name 字段替代；不应仅给出模糊的 unknown property"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "报错信息包含 run-name 不支持及替代方案；若含 github.* 上下文应提示改用 atomgit.*"

teardown:
  reset: fixture
