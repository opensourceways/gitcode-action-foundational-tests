id: COMP-PR-01-003
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: fork PR 的 pull_request workflow ATOMGIT_TOKEN 仅 read 权限
intent_ref: INTENT-COMP-004

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  jobs:
    verify:
      name: Verify fork PR token read only
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Attempt write with token
          run: |
            curl -s -o /dev/null -w "%{http_code}"                     -H "Authorization: token $ATOMGIT_TOKEN"                     -X POST                     "${{ atomgit.api_url }}/repos/${{ atomgit.repository }}/issues/1/comments"                     -d '{"body":"test"}' || echo "write failed as expected"

trigger:
  event: pull_request
  as: untrusted_contributor
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_step_result
    equals: write_succeeded
  - type: positive
    target: run_status
    equals: success_or_failure

teardown:
  reset: fixture
