id: SEC-INJ-01-003
dimensions: ["security"]
dimension: security
priority: P0
title: "不可信 issue/PR 评论内容不可直接插进 run 脚本导致命令注入"
intent_ref: INTENT-SEC-011
setup:
  repo_fixture: default
workflow: |
  on:
    issue_comment:
      types: [created]
  jobs:
    comment-inj:
      name: Test comment injection
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Inline comment body
          run: |
            echo "Comment is ${{ atomgit.event.comment.body }}"
trigger:
  event: issue_comment
  as: untrusted_contributor
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_logs
    must_not_contain: "injected_command_executed"
  - type: positive
    target: run_status
    equals: "success"
teardown:
  reset: fixture
