id: USE-INPT-01-001
dimensions: ["usability", "compatibility"]
dimension: usability
priority: P1
title: "使用 string 类型 input 时正常通过校验"
intent_ref: INTENT-USE-008

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
      inputs:
        env:
          description: target environment
          type: string
          required: true
          default: staging
  jobs:
    test-input:
      name: test string input
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: echo input
          run: |
            echo "env=${{ inputs.env }}"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: COMPLETED

teardown:
  reset: none

