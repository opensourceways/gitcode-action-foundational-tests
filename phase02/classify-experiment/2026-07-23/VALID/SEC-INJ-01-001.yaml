id: SEC-INJ-01-001
dimensions: ["security"]
dimension: security
priority: P0
title: "不可信 PR 标题不可直接插进 run 脚本导致命令注入"
intent_ref: INTENT-SEC-009
setup:
  repo_fixture: default
workflow: |
  on:
    pull_request:
      branches: [main]
  jobs:
    pr-title-inj:
      name: Test PR title injection
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Inline PR title
          run: |
            echo "PR title is ${{ atomgit.event.pull_request.title }}"
trigger:
  event: pull_request
  as: untrusted_contributor
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_logs
    must_not_contain: "injected_command_executed"
  - type: positive
    target: run_status
    equals: "success"
teardown:
  reset: fixture
