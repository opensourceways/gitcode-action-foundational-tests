id: COMPAT-CACHE-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: cache 行为等价性——缓存命中场景
intent_ref: INTENT-COMPAT-025

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify-cache-hit:
      name: Verify cache hit behavior
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) restore cache
          uses: cache
          with:
            path: ~/.cache/test-dir
            key: compat-cache-test-${{ atomgit.run_id }}
            restore-keys: compat-cache-test-
        - name: (TC) verify cache state
          run: |
            if [ -f "$HOME/.cache/test-dir/marker.txt" ]; then
              echo "CACHE_HIT"
            else
              echo "CACHE_MISS"
              mkdir -p "$HOME/.cache/test-dir"
              echo "marker" > "$HOME/.cache/test-dir/marker.txt"
            fi
        - name: (TC) save cache
          if: ${{ always() }}
          uses: cache
          with:
            path: ~/.cache/test-dir
            key: compat-cache-test-${{ atomgit.run_id }}

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "第二次运行日志中应出现 CACHE_HIT"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "命中场景下不应出现持久化失败或 key 冲突报错"

teardown:
  reset: fixture
