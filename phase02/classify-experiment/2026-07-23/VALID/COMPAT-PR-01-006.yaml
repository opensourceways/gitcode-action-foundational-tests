id: COMPAT-PR-01-006
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "PR 目标分支过滤行为差异"
intent_ref: INTENT-COMPAT-NEW-003

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches: [main]
  jobs:
    test-pr-target:
      name: Test PR target branch filter
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo trigger info
          run: |
            echo "event_name=${{ atomgit.event_name }}"
            echo "done"

trigger:
  event: pull_request
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: success
    rubric: "目标分支为 main 的 PR 应触发 workflow 并成功运行"
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "目标分支不为 main 的 PR 不应触发该 workflow"

teardown:
  reset: none
