id: REL-TIMEOUT-01-010
dimensions: [reliability]
dimension: reliability
priority: P1
title: "默认超时——未声明 timeout-minutes 运行 361 分钟应被强制终止"
intent_ref: INTENT-REL-010
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: reliability test job
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: sleep step
          run: |
            sleep 21660
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_status
    equals: "failure"
  - type: positive
    target: run_logs
    contains: "timeout"
teardown:
  reset: none
