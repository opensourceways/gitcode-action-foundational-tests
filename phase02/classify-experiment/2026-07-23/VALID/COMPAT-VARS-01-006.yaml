id: COMPAT-VARS-01-006
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "vars 在 Action 中的可用性差异"
intent_ref: INTENT-COMPAT-022

setup:
  repo_fixture: default
  secrets: []
  variables:
    ACTION_VAR: action_value
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-vars-action:
      name: Test vars in action
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Use vars in action
          uses: checkout
          with:
            ref: ${{ vars.ACTION_VAR }}

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: llm_assisted
    rubric: "若支持 vars，Action 的 with 参数应正确接收值"
  - type: negative
    target: run_logs
    eval: llm_assisted
    rubric: "vars 不应被静默视为空字符串"

teardown:
  reset: fixture
