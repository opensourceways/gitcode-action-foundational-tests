id: USE-OS-01-001
dimensions: ["usability", "compatibility"]
dimension: usability
priority: P1
title: "runner.os 返回值与文档声明的平台支持一致"
intent_ref: INTENT-USE-013

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-os:
      name: test runner.os value
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: echo runner os
          run: |
            echo "os=${{ runner.os }}"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "os=Linux"
  - type: nonfunctional
    target: documentation
    eval: llm_assisted
    rubric: "若实际仅有 Linux Runner，文档必须在 runner.os 说明旁附加当前仅 Linux 可用、Windows/macOS 待定等显式标注"

teardown:
  reset: none

