id: COMPAT-INPUTS-01-001
dimensions: [compatibility, usability]
dimension: compatibility
priority: P1
title: workflow_dispatch inputs 类型限制 - boolean 应报错
intent_ref: INTENT-COMPAT-014

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
      inputs:
        dry_run:
          description: '是否仅验证不部署'
          required: false
          default: false
          type: boolean
  jobs:
    verify:
      name: Verify boolean input rejection
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo input
          run: |
            echo "INPUT_OK"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: success
  - type: nonfunctional
    target: error_message
    eval: llm_assisted
    rubric: "错误信息应明确指出 workflow_dispatch inputs 仅支持 string 类型，boolean 不被支持"

teardown:
  reset: fixture
