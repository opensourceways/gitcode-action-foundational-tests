id: USE-ACT-01-002
dimensions: ["usability", "compatibility"]
dimension: usability
priority: P1
title: "使用 actions/checkout@v4 时报错应给出迁移指引"
intent_ref: INTENT-USE-007

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    bad-act:
      name: test github action ref error
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: checkout with github style
          uses: actions/checkout@v4

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: COMPLETED
  - type: nonfunctional
    target: error_message
    eval: deterministic
    rubric: "报错信息必须同时出现 actions/checkout 与 checkout 对照，或给出 GitCode 官方 Action 使用短名的说明"

teardown:
  reset: none

