id: USE-EXPR-01-001
dimensions: ["usability", "compatibility"]
dimension: usability
priority: P1
title: "引用不存在的上下文属性时报错应包含原始表达式与错误类型"
intent_ref: INTENT-USE-024

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    bad:
      name: undefined context property
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: bad expression
          run: |
            echo "val=${{ atomgit.nonexistent_property }}"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: COMPLETED
  - type: nonfunctional
    target: error_message
    eval: deterministic
    rubric: "报错信息必须包含出错的原始表达式（或截断后的前 50 字符）和错误类型说明；若错误是未知上下文属性，应提示请检查上下文名称和属性名拼写"

teardown:
  reset: none

