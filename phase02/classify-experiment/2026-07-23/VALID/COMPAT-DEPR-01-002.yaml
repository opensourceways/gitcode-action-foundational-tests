id: COMPAT-DEPR-01-002
dimensions: [compatibility, usability]
dimension: compatibility
priority: P1
title: "::add-path:: 废弃命令应被拒绝或给出迁移指引"
intent_ref: INTENT-COMPAT-NEW-012

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-deprecated-add-path:
      name: Test deprecated add-path command
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Use deprecated add-path
          run: |
            echo '::add-path::/custom/path'
            echo "PATH=$PATH"
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "不应静默忽略导致 workflow 成功且 PATH 未被修改"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "系统给出明确响应：报错拒绝、或警告+替代方案"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "若给出警告，应包含 ATOMGIT_PATH 文件协议的替代示例"

teardown:
  reset: none
