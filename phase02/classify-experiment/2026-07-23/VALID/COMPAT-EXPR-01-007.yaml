id: COMPAT-EXPR-01-007
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: hashFiles 表达式多路径组合边界
intent_ref: INTENT-COMPAT-007

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-hashfiles-multi:
      name: Test hashFiles multiple paths
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: checkout source
          uses: checkout
        - name: hash multiple paths
          run: "echo \"hash multi: ${{ hashFiles('**/package.json', '**/package-lock.json') }}\""

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "hash multi:"

teardown:
  reset: fixture
