id: REL-TIMEOUT-01-009
dimensions: [reliability]
dimension: reliability
priority: P1
title: "自定义短超时——timeout-minutes=1 时 step 运行 2 分钟应被强制终止"
intent_ref: INTENT-REL-009
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: timeout test job
      runs-on: [dedicate-hosted, x64, large]
      timeout-minutes: 1
      steps:
        - name: long sleep step
          run: |
            sleep 120
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_status
    equals: "failure"
  - type: nonfunctional
    target: job_duration_seconds
    le: "70"
teardown:
  reset: none
