id: SEC-MASK-01-001
dimensions: ["security"]
dimension: security
priority: P0
title: "Secret 值在运行日志中必须被自动脱敏为 ***"
intent_ref: INTENT-SEC-004
setup:
  repo_fixture: with-secrets
  secrets: ["DEPLOY_TOKEN"]
workflow: |
  on:
    workflow_dispatch:
  jobs:
    mask-test:
      name: Test log masking
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo secret directly
          run: |
            echo "The secret is ${{ secrets.DEPLOY_TOKEN }}"
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "DEPLOY_TOKEN"
  - type: positive
    target: run_logs
    equals: "masked_with_asterisks"
teardown:
  reset: fixture
