id: COMP-SECRET-01-002
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: secret 原始值不应以明文出现在标准日志中
intent_ref: INTENT-COMP-012

setup:
  repo_fixture: with-secrets
  secrets: ['TEST_SECRET']
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify no secret plaintext
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo secret via env
          env:
            MY_SECRET: ${{ secrets.TEST_SECRET }}
          run: |
            echo "env secret is $MY_SECRET"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: TEST_SECRET

teardown:
  reset: fixture
