id: COMPAT-EXPR-01-011
dimensions: [compatibility, usability]
dimension: compatibility
priority: P1
title: join() 函数缺失时的降级行为
intent_ref: INTENT-COMPAT-010

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-join:
      name: Test join function availability
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Test join function in run block
          run: |
            RESULT="${{ join(['a', 'b', 'c'], '-') }}"
            echo "join-result=$RESULT"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain: "join-result=a-b-c"
  - type: nonfunctional
    target: error_message
    eval: llm_assisted
    rubric: "若 join() 函数不可用，错误信息应明确指出函数缺失，而非 generic 语法错误"

teardown:
  reset: fixture
