id: COMPAT-VARS-01-003
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "vars 项目级覆盖组织级的优先级差异"
intent_ref: INTENT-COMPAT-022

setup:
  repo_fixture: default
  secrets: []
  variables:
    ORG_VAR: proj_value
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-vars-priority:
      name: Test vars priority
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo vars
          run: |
            echo "org_var=${{ vars.ORG_VAR }}"
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "若支持 vars，ORG_VAR 应返回项目级值 proj_value"
  - type: negative
    target: run_logs
    eval: llm_assisted
    rubric: "不应返回组织级值（若组织级配置了不同值）"

teardown:
  reset: fixture
