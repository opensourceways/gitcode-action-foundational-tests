id: REL-FAULT-01-032
dimensions: [reliability]
dimension: reliability
priority: P1
title: "故障注入——artifact 上传时网络分区 30 秒后应失败并报网络错误"
intent_ref: INTENT-REL-032
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: fault injection network partition
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: generate artifact file
          run: |
            dd if=/dev/urandom of=artifact.bin bs=1M count=10
        - name: upload artifact step
          uses: upload-artifact
          with:
            name: net-fault-artifact
            path: artifact.bin
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection:
  at: mid_job
  action: network_partition
  params:
    duration_seconds: 30
    target_step: 2
  recovery_expectation: explicit_error_and_rerun_success
assertions:
  - type: positive
    target: step_status
    equals: "failure"
  - type: positive
    target: run_logs
    contains: "network"
teardown:
  reset: fixture
