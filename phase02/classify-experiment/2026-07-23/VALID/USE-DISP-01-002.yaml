id: USE-DISP-01-002
dimensions: ["usability", "completeness"]
dimension: usability
priority: P1
title: "workflow_dispatch 未提供参数但存在 default 时应使用默认值运行"
intent_ref: INTENT-USE-030

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
      inputs:
        environment:
          description: target environment
          type: string
          required: false
          default: staging
  jobs:
    test-default:
      name: default input value
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: echo env
          run: |
            echo "env=${{ inputs.environment }}"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "env=staging"

teardown:
  reset: none

