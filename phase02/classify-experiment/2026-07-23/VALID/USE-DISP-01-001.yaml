id: USE-DISP-01-001
dimensions: ["usability", "completeness"]
dimension: usability
priority: P1
title: "workflow_dispatch 必填参数未提供时应给出明确校验错误"
intent_ref: INTENT-USE-030

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
      inputs:
        environment:
          description: target environment
          type: string
          required: true
  jobs:
    test-required:
      name: missing required input
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: echo env
          run: |
            echo "env=${{ inputs.environment }}"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: COMPLETED
  - type: nonfunctional
    target: error_message
    eval: deterministic
    rubric: "报错信息必须指出缺少必填参数 environment 或等效字段名"

teardown:
  reset: none

