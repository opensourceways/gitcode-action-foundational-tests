id: COMPAT-EXPR-01-003
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: failure() 与 failed 关键字的处理行为差异
intent_ref: INTENT-COMPAT-005

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-failure:
      name: Test failure handling
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: checkout source
          uses: checkout
        - name: force failure
          run: |
            exit 1
        - name: cleanup after failure
          if: ${{ always() }}
          run: |
            echo "Cleanup ran after failure"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "Cleanup ran after failure"
  - type: positive
    target: run_status
    equals: failure

teardown:
  reset: fixture
