id: COMPAT-EXPR-01-005
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: contains 表达式空值与空字符串边界
intent_ref: INTENT-COMPAT-006

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-contains-empty:
      name: Test contains empty boundaries
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: checkout source
          uses: checkout
        - name: test empty haystack
          run: "echo \"empty haystack: ${{ contains('', 'a') }}\""
        - name: test empty needle
          run: "echo \"empty needle: ${{ contains('abc', '') }}\""

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "empty needle:"

teardown:
  reset: fixture
