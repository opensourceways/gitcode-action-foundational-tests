id: SEC-RUN-01-001
dimensions: ["security"]
dimension: security
priority: P0
title: "Job 结束后 workspace 与临时文件必须被彻底清理"
intent_ref: INTENT-SEC-020
setup:
  repo_fixture: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    job-a:
      name: Write sensitive file
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Write temp secret
          run: |
            echo sensitive-data > /tmp/sensitive-temp.txt
    job-b:
      name: Check cleanup
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Check no residual
          run: |
            if [ -f /tmp/sensitive-temp.txt ]; then
              echo "residual found"
              exit 1
            else
              echo "cleaned as expected"
            fi
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_logs
    must_not_contain: "residual found"
  - type: positive
    target: run_logs
    equals: "cleaned_as_expected"
teardown:
  reset: fixture
