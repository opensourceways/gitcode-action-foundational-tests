id: COMP-SCHEDULE-01-002
dimensions: [completeness, compatibility]
dimension: completeness
priority: P1
title: 非默认分支的 schedule workflow 不应触发
intent_ref: INTENT-COMP-005

setup:
  repo_fixture: multi-branch
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    schedule:
      - cron: "0 2 * * *"
  jobs:
    verify:
      name: Verify schedule non default branch
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo scheduled
          run: |
            echo "should not run"

trigger:
  event: schedule
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_created
    equals: no_run_on_non_default_branch

teardown:
  reset: none
