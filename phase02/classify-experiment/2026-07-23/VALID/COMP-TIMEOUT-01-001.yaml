id: COMP-TIMEOUT-01-001
dimensions: [completeness, reliability]
dimension: completeness
priority: P1
title: 未声明 timeout-minutes 的 job 在 360 分钟内正常完成
intent_ref: INTENT-COMP-008

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify default timeout
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Quick step
          run: |
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: success
  - type: nonfunctional
    target: run_duration
    less_than_minutes: 360

teardown:
  reset: none
