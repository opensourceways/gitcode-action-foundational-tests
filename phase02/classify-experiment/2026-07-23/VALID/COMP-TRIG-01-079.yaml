dimension: completeness
priority: P1
title: 触发事件 types 取值与过滤边界验证
intent_ref: KEEP-TC-234~560
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
fault_injection: null
workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify trigger types boundary
      runs-on: [ubuntu-latest, x64, small]
