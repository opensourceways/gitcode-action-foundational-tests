id: COMPAT-SHELL-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: 默认 shell 隐式行为差异 - 未显式声明时是否为 bash
intent_ref: INTENT-COMPAT-001

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    check-shell:
      name: Check default shell
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: checkout source
          uses: checkout
        - name: print shell info
          run: |
            echo "Current shell: $SHELL"
            echo "Shell via ps: $(ps -p $$ -o comm=)"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: bash

teardown:
  reset: fixture
