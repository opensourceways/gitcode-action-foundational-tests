id: COMPAT-MASK-01-002
dimensions: [compatibility, security]
dimension: compatibility
priority: P0
title: "通过 env 注入 secret 后输出应在日志中被脱敏"
intent_ref: INTENT-COMPAT-033

setup:
  repo_fixture: with-secrets
  secrets: [TEST_SECRET]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    mask-env-test:
      name: Test secret masking via env
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: checkout source
          uses: checkout
        - name: echo secret via env
          env:
            MY_VAR: ${{ secrets.TEST_SECRET }}
          run: |
            echo "Env value: $MY_VAR"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: TEST_SECRET
    eval: deterministic
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "日志中出现 *** 替代通过 env 注入的 secret 值，确认间接引用也能被脱敏"
  - type: positive
    target: run_status
    equals: success
    eval: deterministic
    rubric: "环境变量在运行时可被正常读取，step 执行成功"

teardown:
  reset: fixture
