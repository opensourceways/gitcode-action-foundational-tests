id: REL-MATRIX-01-026
dimensions: [reliability]
dimension: reliability
priority: P1
title: "matrix fail-fast=true——任意 job 实例失败应立即取消其余实例"
intent_ref: INTENT-REL-026
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: matrix test job
      runs-on: [ubuntu-latest, x64, small]
      strategy:
        matrix:
          version: [1, 2, 3]
        fail-fast: true
      steps:
        - name: matrix step
          run: |
            echo version=${{ matrix.version }}
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_status
    equals: "failure"
  - type: positive
    target: cancelled_jobs_count
    equals: "8"
teardown:
  reset: none
