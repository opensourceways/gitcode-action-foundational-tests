id: COMP-PRTARGET-01-002
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: 显式 checkout head.sha 后执行不可信代码的风险可控
intent_ref: INTENT-COMP-014

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request_target:
      branches:
        - main
  jobs:
    verify:
      name: Verify checkout head sha
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Checkout head sha
          uses: checkout
          with:
            ref: ${{ atomgit.event.pull_request.head.sha }}
        - name: Verify workflow still base
          run: |
            echo "BASE_VERSION_MARKER"

trigger:
  event: pull_request_target
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: success
  - type: positive
    target: run_logs
    contains: BASE_VERSION_MARKER

teardown:
  reset: fixture
