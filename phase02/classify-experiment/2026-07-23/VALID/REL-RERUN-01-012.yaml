id: REL-RERUN-01-012
dimensions: [reliability]
dimension: reliability
priority: P1
title: "rerun 越界值——尝试第 4 次重新运行应被系统拒绝"
intent_ref: INTENT-REL-012
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: reliability test job
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: sleep step
          run: |
            sleep 5
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: rerun_request
    equals: "rejected"
teardown:
  reset: none
