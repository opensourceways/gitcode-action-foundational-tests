id: USE-STAT-01-001
dimensions: ["usability", "compatibility"]
dimension: usability
priority: P1
title: "使用 always() 带括号时若被接受则正常执行"
intent_ref: INTENT-USE-004

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-always:
      name: test always syntax
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: force fail
          run: |
            exit 1
        - name: cleanup with always
          if: ${{ always() }}
          run: |
            echo "cleanup executed"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "cleanup executed"

teardown:
  reset: none

