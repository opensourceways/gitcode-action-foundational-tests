id: REL-LOGPERF-01-051
dimensions: [reliability]
dimension: reliability
priority: P1
title: "日志加载性能——50MB 日志下载与查看耗时"
intent_ref: INTENT-REL-051
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: log perf 50MB test
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: generate 50MB log
          run: |
            for i in $(seq 1 50000); do echo LOG_LINE_${{i}} $(date +%s%N); done
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: nonfunctional
    target: download_time_seconds
    le: "30"
  - type: positive
    target: log_integrity
    equals: "100%"
teardown:
  reset: none
