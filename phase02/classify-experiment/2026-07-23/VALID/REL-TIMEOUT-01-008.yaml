id: REL-TIMEOUT-01-008
dimensions: [reliability]
dimension: reliability
priority: P1
title: "job timeout 越界触发——361 分钟应在 360 分钟被强制终止"
intent_ref: INTENT-REL-008
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: timeout test job
      runs-on: [dedicate-hosted, x64, large]
      timeout-minutes: 360
      steps:
        - name: long sleep step
          run: |
            sleep 21660
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_status
    equals: "failure"
  - type: positive
    target: run_logs
    contains: "timeout"
teardown:
  reset: none
