id: COMPAT-RUNNER-01-002
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: runner.arch 在 x86_64 Runner 上应返回 X64
intent_ref: INTENT-COMPAT-019

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: Test runner.arch value
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo runner arch
          run: |
            echo "runner_arch=${{ runner.arch }}"
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: success
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "日志中 runner_arch 应等于 X64，不应为 x86_64"

teardown:
  reset: fixture
