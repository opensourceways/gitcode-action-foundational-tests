id: REL-MATRIX-01-038
dimensions: [reliability]
dimension: reliability
priority: P1
title: "大规模 matrix——20 个组合应全部生成并正确调度"
intent_ref: INTENT-REL-038
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: matrix 20 combos test
      runs-on: [ubuntu-latest, x64, small]
      strategy:
        matrix:
          os: [ubuntu, euler]
          arch: [x64, arm64]
          compiler: [gcc, clang]
          mode: [debug, release, profile]
      steps:
        - name: verify matrix vars
          run: |
            echo os=${{{{ matrix.os }}}} arch=${{{{ matrix.arch }}}} compiler=${{{{ matrix.compiler }}}} mode=${{{{ matrix.mode }}}}
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: generated_jobs_count
    equals: "20"
  - type: positive
    target: run_status
    equals: "completed(success)"
teardown:
  reset: none
