id: REL-QUEUE-01-003
dimensions: [reliability]
dimension: reliability
priority: P1
title: "concurrency QUEUE 策略——超上限运行应排队等待"
intent_ref: INTENT-REL-003
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  concurrency:
    max: 2
    exceed-action: QUEUE
  jobs:
    test:
      name: concurrency test job
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: sleep step
          run: |
            sleep 30
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_status
    equals: "completed(success)"
  - type: nonfunctional
    target: queued_count
    equals: "2"
teardown:
  reset: none
