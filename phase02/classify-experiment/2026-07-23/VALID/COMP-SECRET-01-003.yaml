id: COMP-SECRET-01-003
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: base64 编码后的 secret 是否仍被脱敏
intent_ref: INTENT-COMP-012

setup:
  repo_fixture: with-secrets
  secrets: ['TEST_SECRET']
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify base64 masking
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo base64 secret
          run: |
            echo "base64 secret is $(echo -n '${{ secrets.TEST_SECRET }}' | base64)"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: nonfunctional
    target: run_logs
    eval: llm_assisted
    rubric: "记录 base64 编码后的 secret 输出是否被脱敏为 ***"

teardown:
  reset: fixture
