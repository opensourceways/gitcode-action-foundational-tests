id: COMP-SECRET-01-001
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: "echo secret 在日志中被脱敏为 ***"
intent_ref: INTENT-COMP-012

setup:
  repo_fixture: with-secrets
  secrets: ['TEST_SECRET']
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify secret masking
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo secret
          run: |
            echo "secret is ${{ secrets.TEST_SECRET }}"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    contains: "***"
  - type: negative
    target: run_logs
    must_not_contain_secret: TEST_SECRET

teardown:
  reset: fixture
