id: COMPAT-ACTION-01-002
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: checkout 短名等价性——path 参数支持
intent_ref: INTENT-COMPAT-024

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify-checkout-path:
      name: Verify checkout path parameter
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout with path
          uses: checkout
          with:
            path: subdir/checkout-path
        - name: (TC) verify path exists
          run: |
            if [ ! -f "subdir/checkout-path/README.md" ]; then
              echo "CHECKOUT_PATH_FAILED"
              exit 1
            else
              echo "CHECKOUT_PATH_OK"
            fi

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: completed_success
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中应出现 CHECKOUT_PATH_OK"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "日志中不应出现 CHECKOUT_PATH_FAILED"
  - type: negative
    target: workflow_parse
    eval: deterministic
    rubric: "不应因使用裸插件名 checkout 而解析失败"

teardown:
  reset: fixture
