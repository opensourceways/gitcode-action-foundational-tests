id: COMP-PERMS-01-003
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: fork PR 的 pull_request 下声明 write 仍仅 read
intent_ref: INTENT-COMP-013

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  permissions:
    repository: write
  jobs:
    verify:
      name: Verify fork PR permission ignore
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Attempt write
          run: |
            curl -s -o /dev/null -w "%{http_code}"                     -H "Authorization: token $ATOMGIT_TOKEN"                     -X POST                     "${{ atomgit.api_url }}/repos/${{ atomgit.repository }}/issues/1/comments"                     -d '{"body":"test"}' || echo "write failed as expected"

trigger:
  event: pull_request
  as: untrusted_contributor
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: success_with_write
  - type: positive
    target: run_logs
    contains: write failed as expected

teardown:
  reset: fixture
