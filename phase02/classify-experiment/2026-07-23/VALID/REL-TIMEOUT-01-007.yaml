id: REL-TIMEOUT-01-007
dimensions: [reliability]
dimension: reliability
priority: P1
title: "job timeout 边界值——359 分钟运行应在 360 分钟边界前完成"
intent_ref: INTENT-REL-007
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: timeout test job
      runs-on: [dedicate-hosted, x64, large]
      timeout-minutes: 360
      steps:
        - name: long sleep step
          run: |
            sleep 21540
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_status
    equals: "success"
  - type: nonfunctional
    target: job_duration_minutes
    le: "359"
teardown:
  reset: none
