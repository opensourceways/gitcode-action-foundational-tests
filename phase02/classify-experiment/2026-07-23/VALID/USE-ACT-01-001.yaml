id: USE-ACT-01-001
dimensions: ["usability", "compatibility"]
dimension: usability
priority: P1
title: "使用裸插件名 checkout 时正常拉取官方 Action"
intent_ref: INTENT-USE-007

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-act:
      name: test bare action name
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: checkout source
          uses: checkout
        - name: verify checkout
          run: |
            ls -la

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: COMPLETED

teardown:
  reset: none

