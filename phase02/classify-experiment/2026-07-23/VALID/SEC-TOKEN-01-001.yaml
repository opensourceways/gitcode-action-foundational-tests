id: SEC-TOKEN-01-001
dimensions: ["security"]
dimension: security
priority: P0
title: "fork PR 触发 pull_request 时 ATOMGIT_TOKEN 必须仅拥有 read 权限"
intent_ref: INTENT-SEC-003
setup:
  repo_fixture: default
workflow: |
  on:
    pull_request:
      branches: [main]
  jobs:
    token-read:
      name: Test token read only
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Clone with token
          run: |
            git clone https://x-access-token:${{ atomgit.token }}@atomgit.com/${{ atomgit.repository }}.git test-clone
        - name: Attempt write via API
          run: |
            curl -s -o /dev/null -w "%{http_code}" -X POST \n            "https://api.gitcode.com/api/v5/repos/${{ atomgit.repository }}/issues" \n            -H "Authorization: token ${{ atomgit.token }}" \n            -d '{"title": "test"}'
trigger:
  event: pull_request
  as: untrusted_contributor
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_logs
    equals: "clone_successful"
  - type: negative
    target: run_logs
    must_not_contain: "write_permission_granted"
teardown:
  reset: fixture
