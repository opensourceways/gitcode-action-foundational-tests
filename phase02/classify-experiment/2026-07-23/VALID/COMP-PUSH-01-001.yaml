id: COMP-PUSH-01-001
dimensions: [completeness]
dimension: completeness
priority: P1
title: 匹配 branches 的 push 正确触发 workflow
intent_ref: INTENT-COMP-003

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches:
        - main
  jobs:
    verify:
      name: Verify branch trigger
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Echo triggered
          run: |
            echo "triggered on main"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: success
  - type: positive
    target: run_event
    equals: push

teardown:
  reset: none
