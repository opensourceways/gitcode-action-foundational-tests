id: SEC-RUNNER-SHARE-02-001
dimensions: [security]
dimension: security
priority: P0
title: "多项目共享 Runner 的 Secret 与资源隔离（项目 A secret 不达项目 B）"
intent_ref: INTENT-SEC-028

setup:
  repo_fixture: with-secrets
  secrets: ["SECRET_A"]
  variables: {}
  branch_protection: default

workflow: |
  name: Cross Project Secret Isolation
  on:
  - push
  jobs:
    cross-project:
      name: Cross Project Secret
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Access secret
        run: |
          VAL="${{ secrets.SECRET_A }}"
          if [ -z "$VAL" ]; then
            echo "SECRET_EMPTY_AS_EXPECTED"
          else
            echo "SECRET_NOT_EMPTY"
          fi

trigger:
  event: push
  as: maintainer
  params:
    cross_project: "true"

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志出现 SECRET_EMPTY_AS_EXPECTED"
  - type: negative
    target: run_logs
    must_not_contain_secret: "SECRET_A"

teardown:
  reset: fixture
