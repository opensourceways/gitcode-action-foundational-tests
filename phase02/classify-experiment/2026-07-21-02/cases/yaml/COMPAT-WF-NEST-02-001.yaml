id: COMPAT-WF-NEST-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "workflow_call 嵌套深度限制：验证最多 2 层嵌套，超过应报错"
intent_ref: INTENT-COMPAT-021

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_call: null
  jobs:
    callee-job:
      name: Callee Job
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - run: echo "Nested workflow_call callee executing"
      - run: echo "Callee complete"
      name: Callee Job
  name: workflow_call 嵌套深度限制：验证最多 2 层嵌套，超过应报错

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "2 层 workflow_call 嵌套（A call B call C）正常执行"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "3 层嵌套（A call B call C call D）应明确报错"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "循环调用（A call B 且 B call A）应被检测并报错"

teardown:
  reset: fixture
