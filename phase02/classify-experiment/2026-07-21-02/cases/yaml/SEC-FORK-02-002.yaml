id: SEC-FORK-02-002
dimensions:
  - security
dimension: security
priority: P0
title: "fork PR 触发 pull_request 时不可访问项目/组织级 Secret"
intent_ref: INTENT-SEC-002

setup:
  repo_fixture: with-secrets
  secrets: [DEPLOY_KEY, ORG_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
  - pull_request
  jobs:
    test-secret-isolation:
      name: Test Secret Isolation
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo project secret (should be empty)
        run: "VAL=\"${{ secrets.DEPLOY_KEY }}\"\nif [ -z \"$VAL\" ]; then\n  echo \"\
          PROJECT_SECRET_EMPTY_AS_EXPECTED\"\nelse\n  echo \"PROJECT_SECRET_NOT_EMPTY_UNEXPECTED\"\
          \nfi\n"
      - name: Echo org secret (should be empty)
        run: "VAL=\"${{ secrets.ORG_TOKEN }}\"\nif [ -z \"$VAL\" ]; then\n  echo \"\
          ORG_SECRET_EMPTY_AS_EXPECTED\"\nelse\n  echo \"ORG_SECRET_NOT_EMPTY_UNEXPECTED\"\
          \nfi\n"
      - name: Test API call with secret (should fail)
        run: "STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" -H \"Authorization:\
          \ Bearer ${{ secrets.DEPLOY_KEY }}\" https://api.atomgit.com/user 2>/dev/null\
          \ || echo \"CURL_FAILED\")\nif [ \"$STATUS\" = \"401\" ] || [ \"$STATUS\"\
          \ = \"403\" ] || [ \"$STATUS\" = \"CURL_FAILED\" ]; then\n  echo \"API_AUTH_REJECTED_AS_EXPECTED\"\
          \nelse\n  echo \"API_AUTH_SUCCEEDED_UNEXPECTEDLY\"\nfi\n"
      name: Test Secret Isolation
  name: fork PR 触发 pull_request 时不可访问项目/组织级 Secret

trigger:
  event: fork_pr
  as: untrusted_contributor

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 PROJECT_SECRET_EMPTY_AS_EXPECTED"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 ORG_SECRET_EMPTY_AS_EXPECTED"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 API_AUTH_REJECTED_AS_EXPECTED"
  - type: negative
    target: run_logs
    must_not_contain_secret: "DEPLOY_KEY"
  - type: negative
    target: run_logs
    must_not_contain_secret: "ORG_TOKEN"

teardown:
  reset: fixture
