id: COMPAT-EXPRCS-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证 startsWith/endsWith 大小写敏感性与 GitHub 相反"
intent_ref: INTENT-COMPAT-005

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-case-sensitivity:
      name: Test Case Sensitivity
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test startsWith case-sensitive
        if: ${{ startsWith('Hello', 'He') }}
        run: echo "STARTSWITH_SENSITIVE_MATCH_UPPER"
      - name: Test startsWith case-sensitive lower
        if: ${{ !startsWith('Hello', 'hello') }}
        run: echo "STARTSWITH_SENSITIVE_MISMATCH_LOWER"
      - name: Test endsWith
        if: ${{ endsWith('readme.txt', '.txt') }}
        run: echo "ENDSWITH_WORKS"
      - name: Test contains
        if: ${{ contains('Hello World', 'Hello') }}
        run: echo "CONTAINS_WORKS"
      name: Test Case Sensitivity
  name: 验证 startsWith/endsWith 大小写敏感性与 GitHub 相反

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 STARTSWITH_SENSITIVE_MATCH_UPPER（首字母大写匹配）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 STARTSWITH_SENSITIVE_MISMATCH_LOWER（小写不匹配，与 GitHub 有意不同）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 CONTAINS_WORKS（contains 行为明确）"

teardown:
  reset: fixture
