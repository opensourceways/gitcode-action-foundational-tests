id: REL-PUSH-DEDUP-02-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: "同一 push 连推的触发去重/幂等与并发触发排队公平性"
intent_ref: INTENT-REL-030

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: Push Dedup Test
  on:
  - push
  jobs:
    dedup:
      name: Push Dedup
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Log run id
        run: echo "RUN_ID=${{ atomgit.run_id }}"

trigger:
  event: push
  as: maintainer
  params:
    simultaneous_pushes: "3"
    window_seconds: "10"

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "所有触发均产生可追踪的 run"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "无 run 被静默丢弃"

teardown:
  reset: fixture
