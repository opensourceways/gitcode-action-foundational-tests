id: SEC-SECRET-MASK-02-004
dimensions:
  - security
dimension: security
priority: P1
title: "Secret 包含多行文本时应整体被脱敏"
intent_ref: INTENT-SEC-008

setup:
  repo_fixture: with-secrets
  secrets: [MULTILINE_SECRET]
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-multiline-masking:
      name: Test Multiline Masking
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo multiline secret
        run: echo "${{ secrets.MULTILINE_SECRET }}"
      - name: Echo summary
        run: echo "MULTILINE_MASK_TEST_DONE"
      name: Test Multiline Masking
  name: Secret 包含多行文本时应整体被脱敏

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "MULTILINE_SECRET"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "多行 Secret 每一行在日志中均被遮蔽，日志全文搜索各行内容命中数为 0"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "换行转义符不导致还原为实际换行后明文"

teardown:
  reset: fixture
