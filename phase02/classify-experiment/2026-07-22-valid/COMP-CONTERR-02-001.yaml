id: COMP-CONTERR-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 continue-on-error 对 job DAG 失败传播的影响"
intent_ref: INTENT-COMP-023

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    job-a:
      name: Job A
      continue-on-error: true
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - run: exit 1
        name: Run command
    job-b:
      name: Job B
      needs: job-a
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - run: echo "JOB_B_DEFAULT_IF_SHOULD_BE_SKIPPED"
        name: Run command
    job-c:
      name: Job C
      needs: job-a
      if: ${{ always() }}
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - run: echo "JOB_C_ALWAYS_EXECUTED"
        name: Run command
  name: COMP-CONTERR-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "continue-on-error 的 job-a 失败不阻断 workflow 整体"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job-b（默认 if: success()）被 skipped"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-c（if: always()）执行，日志含 JOB_C_ALWAYS_EXECUTED"

teardown:
  reset: fixture
