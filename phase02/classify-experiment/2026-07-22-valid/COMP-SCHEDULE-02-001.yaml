id: COMP-SCHEDULE-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 schedule 定时触发最短间隔（5 分钟）与 UTC 时区"
intent_ref: INTENT-COMP-021

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    schedule:
    - cron: '*/5 * * * *'
  jobs:
    scheduled-job:
      name: Scheduled Job
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log schedule execution
        run: 'echo "SCHEDULE_RUN_AT=$(date -u)"
  
          echo "SCHEDULE_TRIGGERED_OK"
  
          '
  name: COMP-SCHEDULE-02-001
trigger:
  event: schedule
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "合法 cron 表达式在默认分支上触发，日志含 SCHEDULE_TRIGGERED_OK"
  - type: nonfunctional
    target: run_logs
    eval: "deterministic"
    rubric: "调度延迟在可接受范围内（触发时间在 UTC 时区）"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "schedule 应实际产生运行记录（非静默不触发）"

teardown:
  reset: fixture
