id: COMP-CONCUR-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证并发控制 concurrency max / exceed-action / preemption"
intent_ref: INTENT-COMP-005

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  concurrency:
    max: 2
    exceed-action: QUEUE
  jobs:
    concurrent-job:
      name: Concurrent Job
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Simulate work with sleep
        run: sleep 30
      - name: Log completion
        run: echo "JOB_COMPLETED_${{ atomgit.run_id }}"
  name: COMP-CONCUR-02-001
trigger:
  event: manual
  as: maintainer
  params:
    simultaneous_runs: 5

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "任意时刻 in_progress <= max(2)"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "排队 runs 最终全部完成（5 个 run 均到达 completed）"

teardown:
  reset: fixture
