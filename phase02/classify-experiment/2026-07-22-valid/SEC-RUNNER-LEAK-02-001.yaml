id: SEC-RUNNER-LEAK-02-001
dimensions: [security, reliability]
dimension: security
priority: P0
title: "Runner 跨 job/跨 run 无敏感残留（工作区/环境/凭据清理）"
intent_ref: INTENT-SEC-025

setup:
  repo_fixture: with-secrets
  secrets: ["LEAK_TEST_SECRET"]
  variables: {}
  branch_protection: default

workflow: |
  name: SEC-RUNNER-LEAK-02-001
  on:
    workflow_dispatch:
  jobs:
    job-leak-a:
      name: Job Leak A
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Write sensitive data
        run: |
          echo "${{ secrets.LEAK_TEST_SECRET }}" > /tmp/sensitive.txt
          echo "SENSITIVE_FILE_CREATED"
    job-leak-b:
      name: Job Leak B
      needs: job-leak-a
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Check for残留
        run: |
          if [ -f /tmp/sensitive.txt ]; then
            echo "LEAK_FOUND_UNEXPECTED"
          else
            echo "NO_LEAK_AS_EXPECTED"
          fi
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志出现 NO_LEAK_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志不出现 LEAK_FOUND_UNEXPECTED"
  - type: negative
    target: run_logs
    must_not_contain_secret: "LEAK_TEST_SECRET"

teardown:
  reset: fixture
