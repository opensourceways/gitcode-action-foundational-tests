id: COMPAT-EXPRCO-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "表达式类型强转规则：验证空字符串/null/NaN 比较行为是否与 GitHub 一致"
intent_ref: INTENT-COMPAT-006

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-type-coercion:
      name: Test Type Coercion
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: Test empty string vs zero
        run: "if [ \"${{ '' == 0 }}\" = \"true\" ]; then\n  echo \"PASS: empty-string==0\
          \ is true (GitHub-compatible)\"\nelse\n  echo \"RESULT: empty-string==0 is\
          \ ${{ '' == 0 }}\"\nfi\n"
      - name: Test null truthiness
        run: "result=\"${{ null }}\"\necho \"null evaluates to: '${result}'\"\nif [\
          \ -z \"${result}\" ]; then\n  echo \"PASS: null is empty/falsy\"\nfi\n"
      - name: Test contains with array
        run: 'result="${{ contains(fromJSON(''["a","b","c"]''), ''b'') }}"
  
          echo "contains result: ${result}"
  
          '
      - name: Test string-numeric comparison boundary
        run: 'echo "non-numeric-string == 0: ${{ ''abc'' == 0 }}"
  
          echo "string representation: ${{ ''0'' == 0 }}"
  
          '
      - name: Compare with GitHub documented behavior
        run: echo "See COMPAT-NOTES.md for GitHub type coercion reference"
  name: COMPAT-EXPRCO-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "空字符串 == 0 的行为与 GitHub 文档一致"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "null 求值为空/falsy"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不应出现与 GitHub 行为矛盾的布尔结果"

teardown:
  reset: fixture
