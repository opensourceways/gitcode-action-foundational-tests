id: SEC-SECRET-MASK-02-002
dimensions:
  - security
dimension: security
priority: P1
title: "Secret 经过 base64 编码后 echo 到日志仍应被脱敏"
intent_ref: INTENT-SEC-006

setup:
  repo_fixture: with-secrets
  secrets: [TEST_SECRET]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-base64-masking:
      name: Test Base64 Masking
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo base64-encoded secret
        run: echo "${{ secrets.TEST_SECRET }}" | base64
      - name: Echo raw secret for masking baseline
        run: echo "${{ secrets.TEST_SECRET }}"
  name: SEC-SECRET-MASK-02-002
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "TEST_SECRET"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "若平台支持 base64 检测，base64 编码输出也应被遮蔽；底线：原始 Secret 值不泄露"

teardown:
  reset: fixture
