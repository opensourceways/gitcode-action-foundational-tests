id: COMPAT-SYSENV-MAP-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "系统环境变量映射差异——GITHUB_* 全集 → ATOMGIT_* 及缺失变量"
intent_ref: INTENT-COMPAT-032

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-SYSENV-MAP-02-001
  on:
    workflow_dispatch:
  jobs:
    sysenv:
      name: Sysenv Map
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Check ATOMGIT_ENV
        run: echo "ATOMGIT_ENV=$ATOMGIT_ENV"
      - name: Check GITHUB_ENV fallback
        run: echo "GITHUB_ENV=$GITHUB_ENV"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "ATOMGIT_ENV 有值"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "GITHUB_ENV 若不可用，报错应指明改用 ATOMGIT_ENV"

teardown:
  reset: fixture
