id: REL-TIMEOUT-02-002
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "多个 job 设置不同 timeout-minutes（5/360），各自按独立时钟超时"
intent_ref: INTENT-REL-010

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    job-a-short-timeout:
      name: Job A Short Timeout
      runs-on: [dedicate-hosted, x64, large]
      timeout-minutes: 5
      steps:
      - name: Long step exceeding timeout
        run: sleep 600
    job-b-long-timeout:
      name: Job B Long Timeout
      runs-on: [dedicate-hosted, x64, large]
      timeout-minutes: 360
      steps:
      - name: Quick step
        run: 'echo "Job B running with 360min timeout"
  
          echo "Completed at $(date)"
  
          '
  name: REL-TIMEOUT-02-002
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job A（timeout=5min）在 5min ± 30s 内因超时终止"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job B（timeout=360min）正常执行完成（success）"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "job A 的超时不触发 job B 的取消"

teardown:
  reset: fixture
