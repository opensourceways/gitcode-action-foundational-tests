id: REL-SCHED-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "schedule 最小调度间隔 enforcement——低于 5 分钟的拒绝/排队/降级行为"
intent_ref: INTENT-REL-035

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    schedule:
    - cron: '*/2 * * * *'
  jobs:
    min-interval-check:
      name: Min Interval Check
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - name: Record trigger info
        run: |
          echo "EVENT_NAME=${{ atomgit.event_name }}"
          echo "SCHEDULE=${{ atomgit.event.schedule }}"
          echo "TRIGGER_TIME=$(date -u +%s)"
trigger:
  event: schedule
  as: maintainer
  params:
    observation_window_minutes: "15"
    baseline_cron: "*/5 * * * *"
    high_frequency_crons:
      - "*/2 * * * *"
      - "* * * * *"

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "基准组 */5 在 15min 内触发次数≈3，日志含对应 schedule 表达式"
  - type: negative
    target: run_status
    eval: deterministic
    rubric: "*/2 与 * 不应出现不受限的每分钟高频运行（15min 内次数远超 3 次）"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "若被降级，日志或调度记录应含间隔被调整为 5 分钟的明确标记"
  - type: positive
    target: workflow_validation
    eval: deterministic
    rubric: "若被拒绝，校验阶段报错应指明间隔不得小于 5 分钟"

teardown:
  reset: none
