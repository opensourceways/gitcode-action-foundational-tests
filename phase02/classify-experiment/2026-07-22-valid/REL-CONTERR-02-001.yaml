id: REL-CONTERR-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "continue-on-error: true 后 job 失败不阻断 workflow 但下游 if: success() 不满足"
intent_ref: INTENT-REL-028

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    job-a:
      name: Job A
      continue-on-error: true
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - run: exit 1
        name: Run command
    job-b:
      name: Job B
      needs: job-a
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - run: echo "JOB_B_SHOULD_BE_SKIPPED"
        name: Run command
    job-c:
      name: Job C
      needs: job-a
      if: ${{ always() }}
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - run: echo "JOB_C_ALWAYS_EXECUTED"
        name: Run command
  name: REL-CONTERR-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job-a 失败但不中止 workflow 整体"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job-b 状态为 skipped（默认 if: success() 不满足）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-c（if: always()）状态为 success，日志含 JOB_C_ALWAYS_EXECUTED"

teardown:
  reset: fixture
