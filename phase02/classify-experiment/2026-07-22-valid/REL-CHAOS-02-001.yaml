id: REL-CHAOS-02-001
dimensions: [reliability]
dimension: reliability
priority: P0
title: "在 job 执行中 kill runner 进程，下游 job 应失败且可重跑恢复"
intent_ref: INTENT-REL-015

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: REL-CHAOS-02-001
  on:
    workflow_dispatch:
  jobs:
    job-a:
      name: Job A
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - name: (TC) checkout source
        uses: checkout
      - name: Long running step for kill window
        run: sleep 300
    job-b:
      name: Job B
      needs:
      - job-a
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - name: Post dependency step
        run: echo "job-b executed"
    cleanup:
      name: Cleanup
      needs:
      - job-a
      if: ${{ always() }}
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - name: Cleanup step
        run: echo "cleanup executed after job-a"
trigger:
  event: push
  as: maintainer

fault_injection:
  at: mid_job
  action: kill_runner
  params:
    delay_seconds: 10
  recovery_expectation: retry_and_succeed

assertions:
  - type: positive
    target: run_status
    eval: deterministic
    rubric: "被 kill 的 job-a 应在 180s 内到达 failure 或 cancelled 终态"
  - type: positive
    target: run_status
    eval: deterministic
    rubric: "job-b 应被 skipped（needs 依赖的 job-a 失败）"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "cleanup 的日志含 cleanup executed after job-a"
  - type: nonfunctional
    target: run_status
    eval: deterministic
    rubric: "Re-run failed jobs 后所有 job success"

teardown:
  reset: full_instance
