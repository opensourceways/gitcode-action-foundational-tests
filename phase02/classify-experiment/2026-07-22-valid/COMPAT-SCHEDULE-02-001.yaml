id: COMPAT-SCHEDULE-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "schedule 定时触发差异：验证时区限制、默认分支限制、最短间隔"
intent_ref: INTENT-COMPAT-020

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    schedule:
    - cron: '*/15 * * * *'
  jobs:
    scheduled-job:
      name: Scheduled Job
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: Record execution time
        run: 'echo "Schedule triggered at: $(date -u)"
  
          echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
  
          echo "ATOMGIT_REF=$ATOMGIT_REF"
  
          echo "ATOMGIT_EVENT_NAME=$ATOMGIT_EVENT_NAME"
  
          '
  name: COMPAT-SCHEDULE-02-001

trigger:
  event: schedule
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "schedule 触发时 ATOMGIT_EVENT_NAME 为 schedule"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "cron 按表达式在 UTC 时区触发"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "schedule 应可实际触发（已知 TC-391 bug 追踪中）"

teardown:
  reset: fixture
