id: SEC-ENV-POLLUTE-02-001
dimensions: [security]
dimension: security
priority: P1
title: "工作流写协议（ATOMGIT_ENV/OUTPUT/PATH）不被不可信输入污染提权"
intent_ref: INTENT-SEC-024

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: SEC-ENV-POLLUTE-02-001
  on:
    pull_request:
      branches:
        - main
  jobs:
    env-pollute:
      name: Env Pollute Test
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Write untrusted input to env
        run: |
          PR_TITLE="${{ atomgit.event.pull_request.title }}"
          echo "PR_TITLE=$PR_TITLE" >> $ATOMGIT_ENV
      - name: Read env in next step
        run: echo "$PR_TITLE"
trigger:
  event: pr
  as: untrusted_contributor
  params:
    pr_title_injection: "true"

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无额外命令被执行"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "run 正常完成或按预期失败"

teardown:
  reset: fixture
