id: COMPAT-RUN-CTX-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证 runner.os/arch 返回值格式与文档/一致性问题"
intent_ref: INTENT-COMPAT-011

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-runner-context:
      name: Test Runner Context
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Dump runner context
        run: 'echo "RUNNER_OS=${{ runner.os }}"
  
          echo "RUNNER_ARCH=${{ runner.arch }}"
  
          echo "RUNNER_NAME=${{ runner.name }}"
  
          echo "RUNNER_TEMP=${{ runner.temp }}"
  
          echo "RUNNER_TOOL_CACHE=${{ runner.tool_cache }}"
  
          echo "RUNNER_CONTEXT_DUMPED"
  
          '
  name: COMPAT-RUN-CTX-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "runner.os 返回值与文档声明一致"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "runner.arch 返回值与文档声明一致"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "多次运行返回值格式一致，日志含 RUNNER_CONTEXT_DUMPED"

teardown:
  reset: fixture
