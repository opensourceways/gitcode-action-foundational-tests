id: COMPAT-SECRET-M-02-001
dimensions:
  - compatibility
  - security
dimension: compatibility
priority: P1
title: "secrets 日志脱敏行为对标：验证  遮蔽的覆盖范围与 GitHub 一致性"
intent_ref: INTENT-COMPAT-028

setup:
  repo_fixture: with-secrets
  secrets: [TEST_SECRET]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-masking:
      name: Test Masking
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Direct echo test
          run: 'echo "Direct: ${{ secrets.TEST_SECRET }}"'
        - name: Indirect via env
          env:
            MY_TOKEN: ${{ secrets.TEST_SECRET }}
          run: 'echo "Indirect: $MY_TOKEN"'
        - name: Base64 encoding test
          env:
            MY_TOKEN: ${{ secrets.TEST_SECRET }}
          run: echo "$MY_TOKEN" | base64
        - name: Case variation test
          env:
            MY_TOKEN: ${{ secrets.TEST_SECRET }}
          run: echo "${MY_TOKEN,,}"
        - name: Concatenation test
          env:
            MY_TOKEN: ${{ secrets.TEST_SECRET }}
          run: echo "prefix-${MY_TOKEN}-suffix"
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "直接 echo secrets 值 → 日志显示 ***"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "通过 env 变量间接 echo → 日志显示 ***"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "base64 编码后的 secret 不应在日志中泄露原始值"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "大小写变体和拼接不应绕过脱敏"

teardown:
  reset: fixture
