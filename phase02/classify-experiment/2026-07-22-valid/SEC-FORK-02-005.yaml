id: SEC-FORK-02-005
dimensions:
  - security
dimension: security
priority: P0
title: "fork PR workflow 不应能修改目标仓库的 workflow 文件"
intent_ref: INTENT-SEC-029

setup:
  repo_fixture: with-secrets
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  jobs:
    modify-workflow-via-push:
      name: Modify Workflow Via Push
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Attempt to push workflow modification
        run: "if git push origin HEAD:refs/heads/main 2>&1; then
    echo \"PUSH_SUCCEEDED_UNEXPECTEDLY\"\
          
    exit 1
  else
    echo \"PUSH_REJECTED_AS_EXPECTED\"
  fi
  "
    modify-workflow-via-api:
      name: Modify Workflow Via Api
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - name: Attempt API workflow modification
        env:
          ATOMGIT_TOKEN: ${{ atomgit.token }}
        run: "curl -s -o /dev/null -w \"%{http_code}\" \\
    -X PUT \\
    \"${{ atomgit.api_url\
          \ }}/repos/${{ atomgit.repository }}/pipeline\" \\
    -H \"Authorization:\
          \ token $ATOMGIT_TOKEN\" \\
    -d '{\"content\":\"dummy\"}' > /tmp/api_status
  \
          if [ \"$(cat /tmp/api_status)\" = \"403\" ]; then
    echo \"API_REJECTED_403_AS_EXPECTED\"\
          
  else
    echo \"API_NOT_REJECTED_UNEXPECTED\"
  fi
  "
  name: SEC-FORK-02-005
trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    event_type: pull_request

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 PUSH_SUCCEEDED_UNEXPECTEDLY"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 PUSH_REJECTED_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 API_NOT_REJECTED_UNEXPECTED"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "API 修改返回 403，日志含 API_REJECTED_403_AS_EXPECTED"

teardown:
  reset: fixture
