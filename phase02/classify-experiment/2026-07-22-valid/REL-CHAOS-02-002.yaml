id: REL-CHAOS-02-002
dimensions: [reliability]
dimension: reliability
priority: P1
title: "step 运行中网络中断 60s 后恢复，受影响 step 应失败但后续 step 和 job 状态正确"
intent_ref: INTENT-REL-016

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: REL-CHAOS-02-002
  on:
    workflow_dispatch:
  jobs:
    network-interruption-test:
      name: Network Interruption Test
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - name: Pre-check connectivity
        run: echo "Network available at start"
      - name: Network-dependent step
        continue-on-error: true
        run: curl -s --connect-timeout 5 https://example.com || echo "Network unreachable"
      - name: Post-recovery step
        if: ${{ always() }}
        run: |
          echo "Post step executing after network recovery"
          echo "Step executed at $(date)"
trigger:
  event: push
  as: maintainer

fault_injection:
  at: mid_job
  action: network_partition
  params:
    direction: outbound
    duration_seconds: 60
  recovery_expectation: step_fails_then_recovers

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "网络中断期间的 curl step 失败（exit code 不等于 0）"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "网络恢复后 always 的后续 step 正常执行并完成"
  - type: positive
    target: run_status
    eval: deterministic
    rubric: "job 终态标记为 failure"

teardown:
  reset: fixture
