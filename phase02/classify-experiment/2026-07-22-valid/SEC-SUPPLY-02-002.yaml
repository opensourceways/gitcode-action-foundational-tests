id: SEC-SUPPLY-02-002
dimensions:
  - security
dimension: security
priority: P1
title: "fork PR 不应能写入或污染主分支的依赖缓存"
intent_ref: INTENT-SEC-019

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  jobs:
    test-cache-isolation:
      name: Test Cache Isolation
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - uses: cache
        with:
          key: node-modules-${{ atomgit.run_id }}
          path: node_modules
        name: (TC) cache
      - name: Write cache marker
        run: 'mkdir -p node_modules
  
          echo "fork-cache-marker" > node_modules/cache-marker.txt
  
          echo "FORK_CACHE_WRITTEN"
  
          '
  name: SEC-SUPPLY-02-002
trigger:
  event: fork_pr
  as: untrusted_contributor

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "主分支 cache restore 不命中 fork PR 写入的条目"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "fork PR 不可覆盖主分支已有缓存"

teardown:
  reset: fixture
