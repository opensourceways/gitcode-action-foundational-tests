id: REL-NEEDS-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "needs 链 A→B→C 中 job A 失败时，B 和 C 默认被跳过"
intent_ref: INTENT-REL-022

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    job-a:
      name: Job A
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - run: exit 1
        name: Run command
      - run: echo "JOB_A_SHOULD_NOT_REACH"
        name: Run command
    job-b:
      name: Job B
      needs: job-a
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - run: echo "JOB_B_SHOULD_BE_SKIPPED"
        name: Run command
    job-c:
      name: Job C
      needs: job-b
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - run: echo "JOB_C_SHOULD_BE_SKIPPED"
        name: Run command
    job-d:
      name: Job D
      needs:
      - job-a
      - job-b
      - job-c
      if: ${{ always() }}
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - run: echo "JOB_D_ALWAYS_EXECUTED"
        name: Run command
  name: REL-NEEDS-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job-a 失败 → job-b 和 job-c 状态为 skipped"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-d（if: always()）正常执行，日志含 JOB_D_ALWAYS_EXECUTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "job-b 和 job-c 不是 success"

teardown:
  reset: fixture
