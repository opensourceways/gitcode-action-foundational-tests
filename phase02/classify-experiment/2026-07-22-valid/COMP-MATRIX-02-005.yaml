id: COMP-MATRIX-02-005
dimensions:
  - completeness
  - compatibility
dimension: completeness
priority: P1
title: "验证 matrix include 向已有组合追加额外变量及新增组合的正确展开"
intent_ref: INTENT-COMP-010

setup:
  repo_fixture: matrix-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-matrix:
      name: Test Matrix
      runs-on: [dedicate-hosted, x64, large]
      strategy:
        matrix:
          os: [ubuntu, centos]
          version: [18, 20]
          include:
          - os: ubuntu
            version: 20
            experimental: true
          - os: alpine
            version: latest
            experimental: edge
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo matrix vars
        run: |
          echo "OS=${{ matrix.os }}"
          echo "VERSION=${{ matrix.version }}"
          echo "EXPERIMENTAL=${{ matrix.experimental }}"
          echo "MATRIX_INSTANCE_OK"
  
  name: COMP-MATRIX-02-005
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "共生成 5 个实例（ubuntu-18、ubuntu-20、centos-18、centos-20 + alpine-latest）"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "ubuntu-20 实例日志中出现 EXPERIMENTAL=true"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "alpine-latest 实例日志中出现 EXPERIMENTAL=edge"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "ubuntu-18 与 centos-18/20 实例不应出现 EXPERIMENTAL 被注入"

teardown:
  reset: fixture
