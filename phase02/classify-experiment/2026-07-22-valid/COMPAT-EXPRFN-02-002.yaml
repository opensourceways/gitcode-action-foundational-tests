id: COMPAT-EXPRFN-02-002
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "表达式函数 format 边界行为——参数不足/过剩、转义、非字符串参数处理是否与 GitHub 一致"
intent_ref: INTENT-COMPAT-066

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    format-boundary:
      name: Format Boundary
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Normal replace
        run: echo "RESULT=${{ format('A{0}B{1}C', 'x', 'y') }}"
      - name: Insufficient args
        run: echo "RESULT=${{ format('A{0}B{1}C', 'x') }}"
      - name: Excess args
        run: echo "RESULT=${{ format('A{0}B', 'x', 'y') }}"
      - name: Escape braces
        run: echo "RESULT=${{ format('{{ {0} }}', 'x') }}"
      - name: Non-string number
        run: echo "RESULT=${{ format('{0}', 42) }}"
      - name: Non-string null
        run: echo "RESULT=${{ format('{0}', null) }}"
      - name: Non-string bool
        run: echo "RESULT=${{ format('{0}', true) }}"
  
  name: COMPAT-EXPRFN-02-002
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "正常替换输出 RESULT=AxByC"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "双花括号转义输出 RESULT={ x }"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "参数不足时不应出现表达式解析错误，应输出 RESULT=AxB{1}C"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "参数过剩时不应出现表达式解析错误，应输出 RESULT=AxB"
  - type: nonfunctional
    target: run_logs
    eval: deterministic
    rubric: "非字符串参数输出 RESULT=42、RESULT=null、RESULT=true，不导致解析失败"

teardown:
  reset: fixture
