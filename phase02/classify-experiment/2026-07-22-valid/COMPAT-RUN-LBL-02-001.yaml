id: COMPAT-RUN-LBL-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证 runs-on 三段式标签格式差异与 GitHub 单标签不兼容"
intent_ref: INTENT-COMPAT-010

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-runs-on:
      name: Test Runs On
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log runner assignment
        run: 'echo "RUNNER_OS=${{ runner.os }}"
  
          echo "RUNNER_ARCH=${{ runner.arch }}"
  
          echo "THREE_PART_LABEL_MATCHED"
  
          '
  name: COMPAT-RUN-LBL-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "三段式标签 {ubuntu-24,x64,small} 正确匹配 runner，日志含 THREE_PART_LABEL_MATCHED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "GitHub 单标签格式 ubuntu-latest 应明确报错（非静默忽略）"

teardown:
  reset: fixture
