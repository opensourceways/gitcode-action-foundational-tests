id: SEC-SECRET-MASK-02-003
dimensions:
  - security
dimension: security
priority: P1
title: "Secret 通过子字符串拼接后 echo 应仍被脱敏"
intent_ref: INTENT-SEC-007

setup:
  repo_fixture: with-secrets
  secrets: [COMPOUND_SECRET]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-splice-masking:
      name: Test Splice Masking
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Split and rejoin secret
        run: 'FIRST=$(echo "${{ secrets.COMPOUND_SECRET }}" | cut -c1-4)
  
          SECOND=$(echo "${{ secrets.COMPOUND_SECRET }}" | cut -c5-)
  
          echo "${FIRST}${SECOND}"
  
          '
      - name: Char-by-char concatenation
        run: "CHARS=$(echo \"${{ secrets.COMPOUND_SECRET }}\" | fold -w1)
  RECONSTRUCTED=\"\
          \"
  for c in $CHARS; do
    RECONSTRUCTED=\"${RECONSTRUCTED}${c}\"
  done
  \
          echo \"$RECONSTRUCTED\"
  "
  name: SEC-SECRET-MASK-02-003
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "COMPOUND_SECRET"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "拼接重组后 echo 不泄露完整 Secret"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "逐字符拼接也不泄露完整 Secret"

teardown:
  reset: fixture
