id: COMPAT-ACTION-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证内置 action 引用格式差异 checkout vs actions/checkoutv4"
intent_ref: INTENT-COMPAT-012

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-gitcode-actions:
      name: Test Gitcode Actions
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - uses: setup-node
        with:
          node-version: '20'
        name: (TC) setup-node
      - name: Verify GitCode actions work
        run: 'echo "GITCODE_CHECKOUT_OK"
  
          node --version
  
          echo "GITCODE_SETUP_NODE_OK"
  
          '
  name: COMPAT-ACTION-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "GitCode 短名 checkout 和 setup-node 正确执行，日志含 GITCODE_CHECKOUT_OK 和 GITCODE_SETUP_NODE_OK"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "GitHub 全路径格式 actions/checkout@v4 应明确报错（非静默忽略）"

teardown:
  reset: fixture
