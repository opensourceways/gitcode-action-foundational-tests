id: REL-CONCUR-02-004
dimensions: [reliability]
dimension: reliability
priority: P1
title: "concurrency max 1 且 exceed-action IGNORE 时，并发超限的触发被直接拒绝"
intent_ref: INTENT-REL-004

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: REL-CONCUR-02-004
  on:
    workflow_dispatch:
  concurrency:
    max: 1
    exceed-action: IGNORE
  jobs:
    slow-job:
      name: Slow Job
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - name: Long running step
        run: sleep 60
trigger:
  event: push
  as: maintainer

fault_injection:
  at: pre_job
  action: concurrent_flood
  params:
    concurrency: 2
  recovery_expectation: second_run_ignored

assertions:
  - type: positive
    target: run_status
    eval: deterministic
    rubric: "第二个并发触发被 IGNORE，仅第一个 run 进入执行"

teardown:
  reset: fixture
