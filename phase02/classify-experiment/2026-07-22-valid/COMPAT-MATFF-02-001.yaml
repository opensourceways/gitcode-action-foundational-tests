id: COMPAT-MATFF-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "matrix fail-fast 双层语义：strategy.fail-fast vs stages.fail_fast 的区分与交互"
intent_ref: INTENT-COMPAT-029

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    matrix-test:
      name: Matrix Test
      runs-on: [dedicate-hosted, x64, large]
      strategy:
        matrix:
          os:
          - ubuntu
          - macos
          node:
          - 18
          - 20
          - 22
        fail-fast: true
        max-parallel: 2
      steps:
      - name: Determine pass or fail
        run: "if [ \"${{ matrix.os }}\" = \"macos\" ] && [ \"${{ matrix.node }}\" =\
          \ \"22\" ]; then\n  echo \"Deliberately failing this combination\"\n  exit\
          \ 1\nfi\necho \"PASS: os=${{ matrix.os }} node=${{ matrix.node }}\"\n"
      - name: Long step for cancel window
        run: sleep 30
  name: COMPAT-MATFF-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "strategy.fail-fast: true 时矩阵中任一项失败，其余未完成项在 30s 内转为 cancelled"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "已完成的矩阵实例状态不受 fail-fast 影响"

teardown:
  reset: fixture
