id: REL-TIMEOUT-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "job timeout-minutes5 时超过 5 分钟的 step 被强制终止"
intent_ref: INTENT-REL-009

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    timeout-job:
      name: Timeout Job
      timeout-minutes: 5
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Run until timeout
        run: sleep 600
      - name: Should NOT reach after timeout
        run: echo "TIMEOUT_NOT_ENFORCED_UNEXPECTEDLY"
  name: REL-TIMEOUT-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job 在 5min +/-30s 内被终止"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含超时原因标记"
  - type: nonfunctional
    target: run_status
    eval: "deterministic"
    rubric: "runner 正常回收，无资源泄漏"

teardown:
  reset: fixture
