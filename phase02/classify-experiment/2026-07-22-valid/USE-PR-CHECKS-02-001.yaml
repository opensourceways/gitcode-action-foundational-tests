id: USE-PR-CHECKS-02-001
dimensions: [usability]
dimension: usability
priority: P2
title: "PR 场景状态回写（Checks/commit status）到 PR 页的可见性与可理解性"
intent_ref: INTENT-USE-024

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: USE-PR-CHECKS-02-001
  on:
    pull_request:
      branches:
        - main
  jobs:
    pr-check:
      name: PR Check
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Run check
        run: echo "PR_CHECK_PASSED"
trigger:
  event: pr
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: pr_ui
    eval: "deterministic"
    rubric: "PR 页面显示 workflow 运行状态"
  - type: nonfunctional
    target: pr_ui
    eval: "llm_assisted"
    rubric: "状态文本包含 workflow 名称与结果，易于理解"

teardown:
  reset: fixture
