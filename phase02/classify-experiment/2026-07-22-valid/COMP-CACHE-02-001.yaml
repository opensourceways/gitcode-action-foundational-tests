id: COMP-CACHE-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证缓存 cache key 精确/前缀匹配与跨 run 持久性"
intent_ref: INTENT-COMP-007

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    cache-test:
      name: Cache Test
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - uses: cache
        with:
          key: cache-test-${{ atomgit.run_id }}
          restore-keys: 'cache-test-
  
            '
        name: (TC) cache
      - name: Read cache
        id: cache-hit
        run: "if [ -f cached-data.txt ]; then
    echo \"CACHE_HIT_$(cat cached-data.txt)\"\
          
  else
    echo \"CACHE_MISS\"
    echo \"cache-value-${{ atomgit.run_id }}\"\
          \ > cached-data.txt
  fi
  "
  name: COMP-CACHE-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "cache key 不变时第二次 run 命中缓存（日志含 CACHE_HIT_）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "首次 run 缓存 miss 后保存，日志含 CACHE_MISS"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无跨仓库缓存泄露"

teardown:
  reset: fixture
