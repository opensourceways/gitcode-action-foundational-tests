id: COMPAT-USES-REF-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "uses action 引用方式差异——GitHub owner/repo@ref marketplace vs GitCode 官方短名 + 本地"
intent_ref: INTENT-COMPAT-044

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-USES-REF-02-001
  on:
    workflow_dispatch:
  jobs:
    ref-test:
      name: Uses Ref Test
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: GitCode short name
        uses: checkout
      - name: GitHub style name
        uses: actions/checkout@v4
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "官方短名 step 成功"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "GitHub 式引用报错指明应使用短名"

teardown:
  reset: fixture
