id: REL-CONCUR-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "同一 workflow 10s 内被 push 连续触发 20 次，排队与执行行为可预测"
intent_ref: INTENT-REL-001

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    flood-test:
      name: Flood Test
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log run identifier
        run: 'echo "RUN_ID=${{ atomgit.run_id }}"
  
          echo "RUN_NUMBER=${{ atomgit.run_number }}"
  
          echo "FLOOD_TEST_DONE"
  
          '
  name: REL-CONCUR-02-001
trigger:
  event: push
  as: maintainer
  params:
    simultaneous_pushes: 20
    window_seconds: 10

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "所有 20 次触发均产生可追踪的 Run ID"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "run_number 严格递增"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "无 Run 被静默丢弃"
  - type: nonfunctional
    target: run_status
    eval: "deterministic"
    rubric: "首 Run 在 120s 内进入 in_progress"

teardown:
  reset: fixture
