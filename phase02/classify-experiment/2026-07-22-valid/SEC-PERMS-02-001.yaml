id: SEC-PERMS-02-001
dimensions:
  - security
dimension: security
priority: P0
title: "permissions: （空对象）使 ATOMGIT_TOKEN 持有最小默认权限"
intent_ref: INTENT-SEC-015

setup:
  repo_fixture: with-permissions
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  permissions: {}
  jobs:
    test-minimal-perms:
      name: Test Minimal Perms
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test clone (should succeed)
        run: git fetch origin
      - name: Test push (should fail)
        run: "if git push origin HEAD:refs/heads/test-minimal-push 2>&1; then\n  echo\
          \ \"PUSH_SUCCEEDED_UNEXPECTEDLY\"\n  exit 1\nelse\n  echo \"PUSH_REJECTED_AS_EXPECTED\"\
          \nfi\n"
  name: SEC-PERMS-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 PUSH_REJECTED_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 PUSH_SUCCEEDED_UNEXPECTEDLY"

teardown:
  reset: fixture
