id: COMPAT-PR-TARGET-02-001
dimensions:
  - compatibility
  - security
dimension: compatibility
priority: P0
title: "pull_request_target 语义对齐：验证 base 上下文运行  fork PR 拥有完整权限隔离"
intent_ref: INTENT-COMPAT-008

setup:
  repo_fixture: with-secrets
  secrets: [API_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request_target:
      branches:
        - main
  permissions:
    repository: write
    pr: write
  jobs:
    verify-context:
      name: Verify Context
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - uses: checkout
        with:
          ref: ${{ atomgit.sha }}
        name: (TC) checkout
      - name: Verify workflow file is from base branch
        run: 'echo "Running workflow from commit: $ATOMGIT_SHA"
  
          echo "Event: $ATOMGIT_EVENT_NAME"
  
          echo "Ref: $ATOMGIT_REF"
  
          '
      - name: Test write permission
        run: 'echo "Testing repository write access..."
  
          echo "MARKER-$(date +%s)" > /tmp/pr_target_test
  
          '
      - name: Test secret access
        run: "if [ -n \"${{ secrets.API_TOKEN }}\" ]; then\n  echo \"Secret accessible\
          \ in pull_request_target context\"\nelse\n  echo \"WARNING: Secret not accessible\"\
          \nfi\n"
      - name: Test PR API write
        run: 'echo "PR target test completed with write permissions"
  
          '
  name: COMPAT-PR-TARGET-02-001
trigger:
  event: pull_request_target
  as: untrusted_contributor

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "workflow 使用 main 分支的 workflow 文件版本执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "ATOMGIT_TOKEN 拥有 repository:write 和 pr:write 权限"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "fork PR 的 pull_request_target 可访问项目级 secrets"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "fork 侧对 workflow YAML 的任何修改不应被执行"

teardown:
  reset: fixture
