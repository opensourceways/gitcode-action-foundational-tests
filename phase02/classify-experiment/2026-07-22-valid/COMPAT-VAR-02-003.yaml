id: COMPAT-VAR-02-003
dimensions:
  - compatibility
  - reliability
dimension: compatibility
priority: P1
title: "缺失系统变量引用行为与注入时机验证"
intent_ref: INTENT-COMPAT-064

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    var-timing:
      name: Var Timing
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - name: First-line read and override test
        run: |
          echo "FIRST_RUNNER_OS=$RUNNER_OS"
          echo "FIRST_ATOMGIT_SHA=$ATOMGIT_SHA"
          echo "UNDEFINED=$RUNNER_NONEXISTENT"
          export RUNNER_OS=Fake
          echo "OVERRIDE_RUNNER_OS=$RUNNER_OS"
trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "脚本第一行读取的 RUNNER_OS 非空且为正确值"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "脚本第一行读取的 ATOMGIT_SHA 非空且为正确值"
  - type: negative
    target: run_status
    eval: deterministic
    rubric: "echo $RUNNER_NONEXISTENT 不应导致 step 失败"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "尝试覆盖 RUNNER_OS 后，仍应读取到真实值而非 Fake"

teardown:
  reset: none
