id: SEC-SECRET-MASK-02-001
dimensions:
  - security
dimension: security
priority: P0
title: "Secret 值直接 echo 到日志时应被脱敏为 "
intent_ref: INTENT-SEC-005

setup:
  repo_fixture: with-secrets
  secrets: [TEST_SECRET]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-secret-masking:
      name: Test Secret Masking
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo secret directly
        run: echo "${{ secrets.TEST_SECRET }}"
      - name: Echo non-secret for contrast
        run: echo "This is normal text visible in logs"
  name: SEC-SECRET-MASK-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "TEST_SECRET"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "非 Secret 文本如 'This is normal text visible in logs' 正常显示"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "多次引用同一 Secret 的位置均被遮蔽，日志全文搜索 Secret 原始值命中数为 0"

teardown:
  reset: fixture
