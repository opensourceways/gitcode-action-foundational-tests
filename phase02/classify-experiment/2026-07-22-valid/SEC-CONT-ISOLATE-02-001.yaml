id: SEC-CONT-ISOLATE-02-001
dimensions:
  - security
  - completeness
dimension: security
priority: P1
title: "container 运行时 step 对宿主机环境变量/Secret 的隔离有效性"
intent_ref: INTENT-SEC-040

setup:
  repo_fixture: container-isolation
  secrets: [HOST_SECRET_MARKER]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    container-isolation:
      name: Container Isolation
      runs-on: [dedicate-hosted, x64, large]
      container:
        image: ubuntu:latest
        env:
          EXPLICIT_VAR: explicit_value
      steps:
      - name: Check explicit var
        run: |
          if [ "$EXPLICIT_VAR" = "explicit_value" ]; then
            echo "EXPLICIT_VAR_OK"
          else
            echo "EXPLICIT_VAR_MISSING"
          fi
      - name: Check host secret isolation
        run: |
          if [ -n "$HOST_SECRET_MARKER" ]; then
            echo "HOST_SECRET_LEAKED"
          else
            echo "HOST_SECRET_ISOLATED"
          fi
      - name: Check host path isolation
        run: |
          if [ -d "/host-tmp-sensitive" ] || [ -f "/home/runner/.host-marker" ]; then
            echo "HOST_PATH_ACCESSIBLE"
          else
            echo "HOST_PATH_ISOLATED"
          fi
  
  name: SEC-CONT-ISOLATE-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中出现 EXPLICIT_VAR_OK，显式传入变量可用"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "不应出现 HOST_SECRET_LEAKED"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "不应出现 HOST_PATH_ACCESSIBLE"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中出现 HOST_SECRET_ISOLATED 与 HOST_PATH_ISOLATED"

teardown:
  reset: fixture
