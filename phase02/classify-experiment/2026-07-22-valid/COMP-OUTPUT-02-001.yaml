id: COMP-OUTPUT-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 outputs 三级传递链 step → job → workflow"
intent_ref: INTENT-COMP-008

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    job-a:
      name: Job A
      runs-on: [ubuntu-latest, x64, small]
  
      outputs:
        result: ${{ steps.set-output.outputs.result }}
      steps:
      - uses: checkout
        name: (TC) checkout
      - id: set-output
        run: 'echo "result=job-a-done" >> $ATOMGIT_OUTPUT
  
          '
        name: Set output
      - run: echo "OUTPUT_SET=${{ steps.set-output.outputs.result }}"
        name: Run command
    job-b:
      name: Job B
      needs: job-a
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - run: echo "NEEDS_OUTPUT=${{ needs.job-a.outputs.result }}"
        name: Run command
  name: COMP-OUTPUT-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-a 日志含 OUTPUT_SET=job-a-done"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-b 日志含 NEEDS_OUTPUT=job-a-done（三级链全通）"

teardown:
  reset: fixture
