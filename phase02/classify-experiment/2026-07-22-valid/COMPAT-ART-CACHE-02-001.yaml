id: COMPAT-ART-CACHE-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证内置 upload-artifact/download-artifact 等价性及 cache 作用域隔离"
intent_ref: INTENT-COMPAT-031

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    upload-job:
      name: Upload Job
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Create artifact file
        run: echo "artifact-data-v1" > output.bin
      - uses: upload-artifact
        with:
          name: compat-artifact
          path: output.bin
        name: (TC) upload-artifact
    download-job:
      needs: upload-job
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: download-artifact
        with:
          name: compat-artifact
        name: (TC) download-artifact
      - name: Verify artifact content
        run: "if [ -f output.bin ] && [ \"$(cat output.bin)\" = \"artifact-data-v1\"\
          \ ]; then
    echo \"ARTIFACT_COMPAT_VERIFIED\"
  else
    echo \"ARTIFACT_COMPAT_FAILED\"\
          
    exit 1
  fi
  "
      name: Download Job
  name: COMPAT-ART-CACHE-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "artifact 跨 job 传递正确，日志含 ARTIFACT_COMPAT_VERIFIED"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "cache hit/miss/restore 行为与 GitHub actions/cache 一致"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "fork PR 缓存不与主分支共享"

teardown:
  reset: fixture
