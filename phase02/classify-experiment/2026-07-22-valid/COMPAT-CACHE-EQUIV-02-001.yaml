id: COMPAT-CACHE-EQUIV-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P2
title: "cache action 差异——key/restore-keys 语义、fork 隔离、跨 run 命中与 GitHub 等价性"
intent_ref: INTENT-COMPAT-048

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-CACHE-EQUIV-02-001
  on:
    workflow_dispatch:
  jobs:
    cache-test:
      name: Cache Equivalence
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Restore cache
        uses: cache
        with:
          key: cache-equiv-exact
          restore-keys: cache-equiv-
          path: ./cache-dir
      - name: Use or create cache
        run: |
          if [ -f cache-dir/data.txt ]; then
            echo "CACHE_HIT"
          else
            echo "CACHE_MISS"
            mkdir -p cache-dir
            echo "data" > cache-dir/data.txt
          fi
      - name: Save cache
        uses: cache
        with:
          key: cache-equiv-exact
          path: ./cache-dir
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "CACHE_HIT 或 CACHE_MISS 出现"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "fork PR 不出现主分支的 CACHE_HIT"

teardown:
  reset: fixture
