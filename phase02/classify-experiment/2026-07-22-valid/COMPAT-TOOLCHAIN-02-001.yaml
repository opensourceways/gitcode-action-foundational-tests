id: COMPAT-TOOLCHAIN-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P2
title: "预装工具链版本差异——GitHub runner image 与 GitCode ubuntu-latest 预装软件差集"
intent_ref: INTENT-COMPAT-038

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-TOOLCHAIN-02-001
  on:
    workflow_dispatch:
  jobs:
    toolchain:
      name: Toolchain Check
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Check git
        run: git --version || echo "GIT_MISSING"
      - name: Check node
        run: node --version || echo "NODE_MISSING"
      - name: Check python
        run: python3 --version || echo "PYTHON_MISSING"
      - name: Check docker
        run: docker --version || echo "DOCKER_MISSING"
      - name: Check jq
        run: jq --version || echo "JQ_MISSING"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "git 版本输出非空"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "缺失工具的提示清晰可理解"

teardown:
  reset: fixture
