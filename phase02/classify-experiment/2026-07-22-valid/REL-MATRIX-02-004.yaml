id: REL-MATRIX-02-004
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "strategy.max-parallel3 时，6 实例矩阵的并发峰值不超过 3"
intent_ref: INTENT-REL-008

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    matrix-parallel:
      name: Matrix Parallel
      runs-on: [dedicate-hosted, x64, large]
      strategy:
        matrix:
          env: [dev, staging, prod]
          region: [us, eu]
        max-parallel: 3
      steps:
        - name: Record start time
          run: 'echo "Starting: env=${{ matrix.env }} region=${{ matrix.region }} at $(date +%s)"'
        - name: Simulate work
          run: sleep 30
        - name: Record end time
          run: 'echo "Finished: env=${{ matrix.env }} region=${{ matrix.region }} at $(date +%s)"'
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "任意时刻 in_progress 的矩阵 job 数 ≤ 3"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "6 个 job 全部到达 completed 终态"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "无 job 因 slot 不足而永久卡在 queued"

teardown:
  reset: fixture
