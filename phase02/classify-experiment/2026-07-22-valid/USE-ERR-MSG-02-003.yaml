id: USE-ERR-MSG-02-003
dimensions:
  - usability
dimension: usability
priority: P1
title: "上下文对象命名差异 github. vs atomgit. 的错误信息可诊断性"
intent_ref: INTENT-USE-006

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-atomgit-context-msg:
      name: Test Atomgit Context Msg
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Use correct context
        run: echo "REF=${{ atomgit.ref }} | EVENT=${{ atomgit.event_name }}"
      - name: Log context usage
        run: echo "ATOMGIT_CONTEXT_WORKS"
  name: USE-ERR-MSG-02-003
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "atomgit.* 上下文正确求值，日志含 ATOMGIT_CONTEXT_WORKS"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "使用 ${{ github.ref }} 等 GitHub 前缀时，报错指出 github 上下文不被识别，并暗示替换为 atomgit"

teardown:
  reset: fixture
