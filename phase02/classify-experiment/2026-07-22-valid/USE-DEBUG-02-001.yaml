id: USE-DEBUG-02-001
dimensions:
  - usability
dimension: usability
priority: P1
title: "日志中 ::group::/::endgroup:: workflow 命令的实际支持情况"
intent_ref: INTENT-USE-010

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-wf-commands:
      name: Test Wf Commands
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test group folding
        run: 'echo "::group::Install Dependencies"
  
          echo "Installing npm packages..."
  
          echo "Done!"
  
          echo "::endgroup::"
  
          echo "GROUP_FOLD_TEST_DONE"
  
          '
      - name: Test error annotation
        run: 'echo "::error file=main.js,line=42::Unexpected token"
  
          echo "ERROR_ANNOTATION_DONE"
  
          '
      - name: Test warning annotation
        run: 'echo "::warning::This API is deprecated"
  
          echo "WARNING_ANNOTATION_DONE"
  
          '
  name: USE-DEBUG-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "若支持：日志有可视化折叠/注解效果；若不支持：命令原样输出但不导致 step 失败"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不支持时不导致 step 非零退出"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 GROUP_FOLD_TEST_DONE"

teardown:
  reset: fixture
