id: COMPAT-NO-WIN-MAC-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "无 Windows/macOS runner——GitHub 三平台 vs GitCode 仅 Linux 的迁移降级"
intent_ref: INTENT-COMPAT-039

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-NO-WIN-MAC-02-001
  on:
    workflow_dispatch:
  jobs:
    windows-job:
      name: Windows Job
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: Echo
        run: echo "windows"
    macos-job:
      name: Macos Job
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: Echo
        run: echo "macos"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "不静默挂起超过 300 秒"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "报错信息包含平台不支持提示"

teardown:
  reset: fixture
