id: COMPAT-DEPRECATED-CMD-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P2
title: "废弃命令处理差异——::set-output/::set-env/::add-path 在 GitCode 的降级"
intent_ref: INTENT-COMPAT-045

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-DEPRECATED-CMD-02-001
  on:
    workflow_dispatch:
  jobs:
    deprecated:
      name: Deprecated Commands
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Old set-output
        run: echo "::set-output name=result::hello"
      - name: Old set-env
        run: echo "::set-env name=MY_VAR::world"
      - name: Old add-path
        run: echo "::add-path::/some/path"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "run 状态为成功"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "日志出现废弃命令警告或自动映射提示"

teardown:
  reset: fixture
