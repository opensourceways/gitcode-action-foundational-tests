id: REL-MATRIX-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "二维矩阵生成 16 个 job 实例时全部正确展开并独立执行"
intent_ref: INTENT-REL-005

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    large-matrix-test:
      strategy:
        matrix:
          os:
          - ubuntu
          - centos
          - debian
          - alpine
          node:
          - 18
          - 20
          - 22
          - 24
        fail-fast: false
        max-parallel: 8
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log instance identity
        run: 'echo "INSTANCE_OS=${{ matrix.os }}"
  
          echo "INSTANCE_NODE=${{ matrix.node }}"
  
          echo "INSTANCE_RUN_ID=${{ atomgit.run_id }}"
  
          echo "MATRIX_INSTANCE_OK"
  
          '
      name: Large Matrix Test
  name: 二维矩阵生成 16 个 job 实例时全部正确展开并独立执行

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "16 个 job 实例全部生成并可枚举"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "每个 job 的 matrix 上下文值正确注入"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无'任务初始化错误'"
  - type: nonfunctional
    target: run_logs
    eval: "deterministic"
    rubric: "不同实例日志独立无交叉污染"

teardown:
  reset: fixture
