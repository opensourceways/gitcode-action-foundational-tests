id: SEC-INJECT-02-003
dimensions:
  - security
dimension: security
priority: P0
title: "分支名中的不可信输入不应通过   直接插入 run: 导致命令注入"
intent_ref: INTENT-SEC-011

setup:
  repo_fixture: with-pr-trigger
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches:
        - main
    pull_request:
      branches:
        - main
  jobs:
    test-injection:
      name: Test Injection
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo ref_name (direct interpolation — VULNERABLE PATTERN)
        run: echo "${{ atomgit.ref_name }}"
      - name: Verify no injection executed
        run: "if [ -f /tmp/evil_side_effect ]; then
    echo \"INJECTION_SUCCEEDED_UNEXPECTEDLY\"\
          
    exit 1
  else
    echo \"NO_INJECTION_AS_EXPECTED\"
  fi
  "
      name: Test Injection
  name: SEC-INJECT-02-003
trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    branch_name_contains_injection: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 NO_INJECTION_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 INJECTION_SUCCEEDED_UNEXPECTEDLY"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "分支名中的分号+命令和管道符不应被执行"

teardown:
  reset: fixture
