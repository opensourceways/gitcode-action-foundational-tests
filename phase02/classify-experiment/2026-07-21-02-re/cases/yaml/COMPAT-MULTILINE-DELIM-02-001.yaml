id: COMPAT-MULTILINE-DELIM-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P2
title: "多行值 delimiter 协议与「不可覆盖默认变量」约束一致性"
intent_ref: INTENT-COMPAT-035

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-MULTILINE-DELIM-02-001
  on:
    workflow_dispatch:
  jobs:
    multiline:
      name: Multiline Delimiter
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Write multiline value
        run: |
          echo "MY_VAR << EOF" >> $ATOMGIT_ENV
          echo "line1" >> $ATOMGIT_ENV
          echo "line2" >> $ATOMGIT_ENV
          echo "EOF" >> $ATOMGIT_ENV
      - name: Read multiline value
        run: |
          echo "MY_VAR=$MY_VAR"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "MY_VAR 包含 line1 与 line2"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "PATH 等默认变量未被清空"

teardown:
  reset: fixture
