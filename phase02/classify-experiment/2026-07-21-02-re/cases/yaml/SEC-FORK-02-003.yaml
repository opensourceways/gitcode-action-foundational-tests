id: SEC-FORK-02-003
dimensions:
  - security
dimension: security
priority: P0
title: "pull_request_target 仅执行 base 分支 workflow 定义，不执行 fork 侧 YAML"
intent_ref: INTENT-SEC-003

setup:
  repo_fixture: with-target-workflow
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request_target:
      branches:
        - main
  permissions:
    repository: read
    pr: write
  jobs:
    verify-base-workflow:
      name: Verify Base Workflow
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Verify base branch workflow version
        run: echo "BASE_BRANCH_WORKFLOW_EXECUTED"
      - name: Check for fork-injected commands
        run: "if echo \"FORK_CODE_EXECUTED\" | grep -q \"FORK_CODE_EXECUTED\"; then\n\
          \  echo \"CHECK_COMPLETE\"\nfi\n"
  name: SEC-FORK-02-003
trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    fork_has_modified_yaml: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 BASE_BRANCH_WORKFLOW_EXECUTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 FORK_CODE_EXECUTED"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "workflow 应成功完成"

teardown:
  reset: fixture
