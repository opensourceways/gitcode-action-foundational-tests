id: REL-RUNNER-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "step 尝试分配超过 runner 可用内存时被 OOM kill 且 job 标记失败"
intent_ref: INTENT-REL-012

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    oom-test:
      name: Oom Test
      runs-on: [ubuntu-latest, x64, small]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Allocate memory until OOM
        run: "node -e \"
    const chunks = [];
    try {
      while (true) {
        chunks.push(Buffer.alloc(100\
          \ * 1024 * 1024));
      }
    } catch (e) {
      console.log('OOM_CAUGHT_EXPECTED');
  \
          \    process.exit(137);
    }
  \"
  "
      - name: Should NOT reach
        if: ${{ success() }}
        run: echo "OOM_NOT_TERMINATED_UNEXPECTEDLY"
  name: REL-RUNNER-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "OOM step 非零退出（exit code 137），日志含 OOM_CAUGHT_EXPECTED"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job status = failure"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "runner 不崩溃，继续存活"

teardown:
  reset: fixture
