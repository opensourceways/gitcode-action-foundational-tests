id: USE-ERR-MSG-02-002
dimensions:
  - usability
dimension: usability
priority: P1
title: "触发器 types 取值无效时的错误信息可诊断性"
intent_ref: INTENT-USE-004

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      types:
      - open
      - update
      - reopen
  jobs:
    test-pr-types:
      name: Test Pr Types
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log PR event
        run: echo "PR_TYPE_VALID_VALUES_WORK"
  name: USE-ERR-MSG-02-002
trigger:
  event: pr
  as: maintainer
  params:
    pr_action: open

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "合法 types 值正常触发，日志含 PR_TYPE_VALID_VALUES_WORK"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "使用非法 types 值（如 opened/synchronize/invalid_value）时，报错含指定非法值名、合法值列表和文件位置"

teardown:
  reset: fixture
