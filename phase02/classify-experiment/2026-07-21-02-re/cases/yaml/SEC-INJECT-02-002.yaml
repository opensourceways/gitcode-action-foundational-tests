id: SEC-INJECT-02-002
dimensions:
  - security
dimension: security
priority: P0
title: "PR 正文中的不可信输入不应通过   直接插入 run: 导致命令注入"
intent_ref: INTENT-SEC-010

setup:
  repo_fixture: with-pr-trigger
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  jobs:
    test-injection:
      name: Test Injection
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo PR body (direct interpolation — VULNERABLE PATTERN)
        run: echo "${{ atomgit.event.pull_request.body }}"
      - name: Verify no injection executed
        run: "if [ -f /tmp/injection_marker ]; then
    echo \"INJECTION_SUCCEEDED_UNEXPECTEDLY\"\
          
    exit 1
  else
    echo \"NO_INJECTION_AS_EXPECTED\"
  fi
  "
      name: Test Injection
  name: SEC-INJECT-02-002
trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    pr_body_contains_injection: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 NO_INJECTION_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 INJECTION_SUCCEEDED_UNEXPECTEDLY"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "PR 正文中的 $() 命令替换和反引号命令替换不应被执行"

teardown:
  reset: fixture
