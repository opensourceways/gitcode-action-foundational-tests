id: SEC-SUPPLY-02-001
dimensions:
  - security
dimension: security
priority: P1
title: "第三方 action 引用未 pin 到 commit SHA 时有平台警告"
intent_ref: INTENT-SEC-018

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-sha-pinned:
      name: Test Sha Pinned
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - uses: setup-node
        with:
          node-version: '20'
        name: (TC) setup-node
      - name: Verify SHA-pinned execution
        run: echo "SHA_PINNED_ACTION_WORKS"
  name: SEC-SUPPLY-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "SHA-pinned 引用正常执行，日志含 SHA_PINNED_ACTION_WORKS"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "未 pin 到 SHA 的浮动引用不应静默执行不可信代码"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "浮动引用（如 @main/@master）应有可见的安全警告机制"

teardown:
  reset: fixture
