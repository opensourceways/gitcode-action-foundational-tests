id: SEC-SECRET-MASK-02-002-V1
dimensions: [security]
dimension: security
priority: P0
title: "Secret 字符串拼接/分片输出时仍应被脱敏"
intent_ref: INTENT-SEC-007

setup:
  repo_fixture: with-secrets
  secrets: ["SPLIT_SECRET"]
  variables: {}
  branch_protection: default

workflow: |
  name: SEC-SECRET-MASK-02-002-V1
  on:
    workflow_dispatch:
  jobs:
    split-mask:
      name: Split Mask Test
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Echo split parts
        run: |
          SEC="${{ secrets.SPLIT_SECRET }}"
          LEN=${#SEC}
          HALF=$((LEN/2))
          echo "${SEC:0:HALF}"
          echo "${SEC:HALF}"
      - name: Echo concatenated
        run: |
          PREFIX="prefix_"
          SUFFIX="_suffix"
          echo "$PREFIX${{ secrets.SPLIT_SECRET }}$SUFFIX"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "SPLIT_SECRET"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "拼接输出中 secret 部分应被遮蔽"

teardown:
  reset: fixture
