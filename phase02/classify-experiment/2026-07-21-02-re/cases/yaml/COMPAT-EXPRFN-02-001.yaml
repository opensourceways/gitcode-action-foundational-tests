id: COMPAT-EXPRFN-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证 GitCode 独有 substring/replace 函数，缺失 join/fromJSON 时报错"
intent_ref: INTENT-COMPAT-004

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-exclusive-fns:
      name: Test Exclusive Fns
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test substring
        run: echo "${{ substring('HelloWorld', 0, 5) }}"
      - name: Test replace
        run: echo "${{ replace('HelloWorld', 'World', 'GitCode') }}"
      - name: Test format as baseline
        run: echo "${{ format('{0} {1}', 'format', 'works') }}"
  name: COMPAT-EXPRFN-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "substring 正确截取（输出 Hello）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "replace 正确替换（输出 HelloGitCode）"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "join/fromJSON/case 等 GitHub 独有函数应明确报错（非静默返回空）"

teardown:
  reset: fixture
