id: SEC-ENV-WAIT-02-001
dimensions:
  - security
  - reliability
dimension: security
priority: P1
title: "环境保护 wait timer 倒计时期间环境 Secret 不可访问"
intent_ref: INTENT-SEC-038

setup:
  repo_fixture: environment-protected
  secrets: [DEPLOY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    deploy:
      name: Deploy
      runs-on: [dedicate-hosted, x64, large]
      environment: production
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Access env secret
        run: |
          echo "SECRET_LENGTH=${#DEPLOY_TOKEN}"
          echo "ENV_SECRET_ACCESSED"
  
  name: SEC-ENV-WAIT-02-001
trigger:
  event: push
  as: maintainer
  params:
    observe_wait_timer: true

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "wait timer 结束后日志中出现 ENV_SECRET_ACCESSED，表明 secret 可被正常读取"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "wait timer 倒计时期间不应出现 ENV_SECRET_ACCESSED（job 未提前执行）"
  - type: negative
    target: run_logs
    must_not_contain_secret: DEPLOY_TOKEN
  - type: nonfunctional
    target: run_status
    eval: deterministic
    rubric: "wait timer 状态可被观测，且不被重触发事件绕过"

teardown:
  reset: fixture
