id: SEC-INJECT-02-005
dimensions:
  - security
dimension: security
priority: P0
title: "不可信输入注入到 ATOMGIT_ENV/ATOMGIT_OUTPUT 文件不导致环境变量污染"
intent_ref: INTENT-SEC-014

setup:
  repo_fixture: with-pr-trigger
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  jobs:
    test-env-injection:
      name: Test Env Injection
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Write untrusted input to ATOMGIT_ENV
        run: 'echo "PR_TITLE=${{ atomgit.event.pull_request.title }}" >> $ATOMGIT_ENV
  
          '
      - name: Read back and check
        run: 'echo "PR_TITLE_VALUE=$PR_TITLE"
  
          ENV_COUNT=$(env | wc -l)
  
          echo "ENV_COUNT=$ENV_COUNT"
  
          '
      - name: Write to ATOMGIT_OUTPUT
        run: 'echo "result=${{ atomgit.event.pull_request.title }}" >> $ATOMGIT_OUTPUT
  
          '
  name: SEC-INJECT-02-005
trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    pr_title_is_malicious: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "PR_TITLE 值应被正确保留为字面字符串"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不应出现意外的额外环境变量"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "workflow 应正常完成"

teardown:
  reset: fixture
