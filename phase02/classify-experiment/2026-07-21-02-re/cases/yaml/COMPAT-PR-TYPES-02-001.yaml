id: COMPAT-PR-TYPES-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证 pull_request types 命名差异 open vs opened / update vs synchronize"
intent_ref: INTENT-COMPAT-007

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      types:
      - open
      - update
      - reopen
      - merge
  jobs:
    test-pr-types:
      name: Test Pr Types
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log PR event
        run: 'echo "PR_ACTION=${{ atomgit.action }}"
  
          echo "PR_EVENT=${{ atomgit.event_name }}"
  
          echo "PR_TYPE_TRIGGERED_OK"
  
          '
  name: COMPAT-PR-TYPES-02-001
trigger:
  event: pr
  as: maintainer
  params:
    pr_action: open

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "GitCode types（open/update/reopen/merge）正确触发，日志含 PR_TYPE_TRIGGERED_OK"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "GitHub 命名（opened/synchronize/reopened）不应静默忽略"

teardown:
  reset: fixture
