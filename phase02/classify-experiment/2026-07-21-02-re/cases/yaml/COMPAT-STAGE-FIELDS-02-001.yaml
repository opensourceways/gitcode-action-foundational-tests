id: COMPAT-STAGE-FIELDS-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "GitCode 特有 stage 字段——select/pre/fail-fast 无 GitHub 对应的语义确认"
intent_ref: INTENT-COMPAT-059

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-STAGE-FIELDS-02-001
  on:
    workflow_dispatch:
  stages:
    build:
      name: Build
        pre:
          - name: Pre Build
            runs-on: [dedicate-hosted, x64, large]
            steps:
            - name: Pre step
              run: echo "PRE_BUILD"
        jobs:
          - build-job
        fail-fast: true
  jobs:
    build-job:
      name: Build Job
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Build
        run: echo "BUILD_DONE"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "PRE_BUILD 先于 BUILD_DONE 出现"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "stage 成功执行"

teardown:
  reset: fixture
