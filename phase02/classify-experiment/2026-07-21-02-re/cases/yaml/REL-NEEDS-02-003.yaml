id: REL-NEEDS-02-003
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "needs 指向 matrix 父 job 时，下游 job 正确等待所有矩阵实例完成后执行（复测 TC-486）"
intent_ref: INTENT-REL-024

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    matrix-predecessor:
      name: Matrix Predecessor
      runs-on: [ubuntu-latest, x64, small]
      strategy:
        matrix:
          os:
          - ubuntu
          - macos
        max-parallel: 2
      steps:
      - name: Matrix step
        run: 'echo "Running on ${{ matrix.os }}"
  
          sleep 10
  
          echo "Matrix job ${{ matrix.os }} completed"
  
          '
      name: Matrix Predecessor
    downstream:
      needs: matrix-predecessor
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: Verify needs context
        run: 'echo "All matrix jobs completed"
  
          echo "Predecessor result: ${{ needs.matrix-predecessor.result }}"
  
          '
      - name: Confirm after matrix complete
        run: echo "Downstream job executed successfully"
      name: Downstream
  name: 'needs 指向 matrix 父 job 时，下游 job 正确等待所有矩阵实例完成后执行（复测 '

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "downstream job 在 matrix-predecessor 所有实例 completed 后才开始执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "needs 上下文中 result 可获取汇总状态"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无 '任务初始化错误' 或 TC-486 类型的失败"

teardown:
  reset: fixture
