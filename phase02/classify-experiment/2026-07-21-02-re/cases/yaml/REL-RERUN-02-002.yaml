id: REL-RERUN-02-002
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "同一 Run 重新运行超过 3 次时，第 4 次重新运行被拒绝"
intent_ref: INTENT-REL-026

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    always-fail:
      name: Always Fail
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - run: 'echo "This job always fails"
  
          exit 1
  
          '
  name: REL-RERUN-02-002
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "第 1-3 次 Re-run 均正常执行"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "第 4 次 Re-run 被拒绝（UI 按钮禁用 / API 返回错误 / 等价拒绝信号）"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "第 4 次 Re-run 不被实际执行"

teardown:
  reset: fixture
