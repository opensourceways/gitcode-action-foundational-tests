id: SEC-SECRET-MASK-02-002-V2
dimensions: [security]
dimension: security
priority: P1
title: "多行 Secret 值的逐行脱敏覆盖"
intent_ref: INTENT-SEC-008

setup:
  repo_fixture: with-secrets
  secrets: ["MULTILINE_SECRET"]
  variables: {}
  branch_protection: default

workflow: |
  name: SEC-SECRET-MASK-02-002-V2
  on:
    workflow_dispatch:
  jobs:
    multiline-mask:
      name: Multiline Mask Test
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Echo multiline secret
        run: |
          echo "${{ secrets.MULTILINE_SECRET }}"
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "MULTILINE_SECRET"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "多行输出中每一行敏感内容均被遮蔽"

teardown:
  reset: fixture
