id: COMPAT-USING-RUNTIME-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "action runs.using 运行时差异——GitHub node20/docker/composite vs GitCode 仅 node16"
intent_ref: INTENT-COMPAT-043

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-USING-RUNTIME-02-001
  on:
    workflow_dispatch:
  jobs:
    using-test:
      name: Using Runtime
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Use action with node20
        uses: node20-action-test
      - name: Use action with docker
        uses: docker-action-test
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "不静默挂起超过 300 秒"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "报错指明 node16 为支持的运行时"

teardown:
  reset: fixture
