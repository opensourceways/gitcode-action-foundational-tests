id: COMPAT-OUTPUT-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "job outputs 传递：ATOMGIT_OUTPUT 协议对标  steps.outputs  jobs.outputs 完整性"
intent_ref: INTENT-COMPAT-030

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    producer:
      name: Producer
      runs-on: [dedicate-hosted, x64, large]
      outputs:
        build_version: ${{ steps.set-output.outputs.version }}
        build_status: ${{ steps.set-output.outputs.status }}
      steps:
      - id: set-output
        run: 'echo "version=1.2.3" >> $ATOMGIT_OUTPUT
  
          echo "status=stable" >> $ATOMGIT_OUTPUT
  
          '
      - name: Verify step outputs
        run: 'echo "step output version: ${{ steps.set-output.outputs.version }}"
  
          echo "step output status: ${{ steps.set-output.outputs.status }}"
  
          '
    consumer:
      needs: producer
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: Read job outputs from producer
        run: 'echo "Producer version: ${{ needs.producer.outputs.build_version }}"
  
          echo "Producer status: ${{ needs.producer.outputs.build_status }}"
  
          '
      - name: Validate outputs
        run: "if [ \"${{ needs.producer.outputs.build_version }}\" = \"1.2.3\" ]; then\n\
          \  echo \"PASS: Outputs correctly propagated\"\nelse\n  echo \"FAIL: Output\
          \ value mismatch\"\n  exit 1\nfi\n"
  name: COMPAT-OUTPUT-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "step ATOMGIT_OUTPUT 设置的 key=value 可被同 job 后续 step 读取"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job.outputs 声明的输出可被下游 needs job 读取"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "outputs 值正确传递（version=1.2.3, status=stable）"

teardown:
  reset: fixture
