id: COMPAT-STAGES-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "stages 阶段机制：验证阶段间串行语义  fail_fast 正确性"
intent_ref: INTENT-COMPAT-017

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  stages:
    build:
      name: Build
      fail_fast: true
      jobs:
        name: Jobs
        compile:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: echo "Building..."
          - run: echo "Build complete"
        lint:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: echo "Linting..."
    test:
      name: Test
      jobs:
        name: Jobs
        unit-test:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: echo "Running unit tests..."
        integration-test:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: echo "Running integration tests..."
    deploy:
      name: Deploy
      jobs:
        name: Jobs
        deploy-staging:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: echo "Deploying to staging..."
  name: COMPAT-STAGES-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "build → test → deploy 按声明顺序串行执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "build stage 内的 compile 和 lint 并行执行"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "stage 内所有 job 完成后才进入下一 stage"

teardown:
  reset: fixture
