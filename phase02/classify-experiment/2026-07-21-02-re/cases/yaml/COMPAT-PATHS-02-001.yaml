id: COMPAT-PATHS-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证 paths 过滤器 300 文件上限与 GitHub 3000 阈值差异"
intent_ref: INTENT-COMPAT-019

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      paths:
      - src/**
      - '!src/excluded/**'
  jobs:
    paths-filter-test:
      name: Paths Filter Test
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log paths match
        run: echo "PATHS_MATCHED_AND_TRIGGERED"
  name: COMPAT-PATHS-02-001
trigger:
  event: push
  as: maintainer
  params:
    changed_files_count: 10

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "<=300 文件时 glob 匹配正确触发，日志含 PATHS_MATCHED_AND_TRIGGERED"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "排除语法 ! 行为正确"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "条件满足应触发（非静默不触发）"

teardown:
  reset: fixture
