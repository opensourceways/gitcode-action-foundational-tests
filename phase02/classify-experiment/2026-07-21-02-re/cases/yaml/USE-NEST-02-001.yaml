id: USE-NEST-02-001
dimensions:
  - usability
  - compatibility
dimension: usability
priority: P2
title: "workflow_call 嵌套超过 2 层时的错误信息可诊断性"
intent_ref: INTENT-USE-022

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    deep-callee:
      name: Deep Callee
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - run: echo "Deep nested workflow_call level 3"
  name: USE-NEST-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "workflow_call 嵌套超过 2 层时应报错，消息含：最大层级限制 2、哪个 workflow 调用超限、建议合并层级或改为直接调用——非泛化 'workflow call failed'"

teardown:
  reset: fixture
