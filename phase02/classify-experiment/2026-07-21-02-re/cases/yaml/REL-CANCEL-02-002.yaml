id: REL-CANCEL-02-002
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "stages.fail_fasttrue 时，stage 内第一个 job 失败后同一 stage 内其他仍在运行的 job 被取消"
intent_ref: INTENT-REL-020

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  stages:
    stage1:
      name: Stage1
      fail_fast: true
      jobs:
        name: Jobs
        fail-fast-job:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: 'echo "Deliberately failing fast"

              exit 1

              '
        long-job:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - name: Long running step for cancel window
            run: sleep 120
          - run: echo "Should not reach here"
    stage2:
      name: Stage2
      jobs:
        name: Jobs
        downstream-job:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - run: echo "This should be skipped"
  name: REL-CANCEL-02-002
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "stage1 中 long-job 状态变更为 cancelled"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "stage2 中 downstream-job 状态为 skipped"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "workflow 终态为 failure（因 fail-fast-job 失败）"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "long-job 不应跑到 completed(success)"

teardown:
  reset: fixture
