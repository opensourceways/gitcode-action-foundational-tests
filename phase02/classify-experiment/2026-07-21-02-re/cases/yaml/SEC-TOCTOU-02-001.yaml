id: SEC-TOCTOU-02-001
dimensions: [security]
dimension: security
priority: P1
title: "TOCTOU：审批后推送新 commit / 评论触发不绕过审批与代码固定"
intent_ref: INTENT-SEC-031

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: SEC-TOCTOU-02-001
  on:
    pull_request:
      branches:
        - main
  jobs:
    toctou-check:
      name: TOCTOU Check
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Log commit SHA
        run: echo "RUNNING_ON_SHA=${{ atomgit.sha }}"
trigger:
  event: pr
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中的 SHA 与最新 commit 一致"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "旧 run 不会在新 commit 后重新执行"

teardown:
  reset: fixture
