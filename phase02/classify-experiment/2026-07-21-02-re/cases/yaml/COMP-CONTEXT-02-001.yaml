id: COMP-CONTEXT-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证上下文对象 atomgit. 的所有文档属性实际可用"
intent_ref: INTENT-COMP-014

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-context:
      name: Test Context
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Validate atomgit context attributes
        run: 'echo "event_name=${{ atomgit.event_name }}"
  
          echo "sha=${{ atomgit.sha }}"
  
          echo "ref=${{ atomgit.ref }}"
  
          echo "ref_name=${{ atomgit.ref_name }}"
  
          echo "workspace=${{ atomgit.workspace }}"
  
          echo "run_id=${{ atomgit.run_id }}"
  
          echo "run_number=${{ atomgit.run_number }}"
  
          echo "repository=${{ atomgit.repository }}"
  
          echo "server_url=${{ atomgit.server_url }}"
  
          echo "api_url=${{ atomgit.api_url }}"
  
          echo "CONTEXT_ATTRS_DUMPED"
  
          '
  name: COMP-CONTEXT-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "已文档化的 atomgit.* 属性均输出非空值（event_name/sha/ref/workspace/run_id/repository 等）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 CONTEXT_ATTRS_DUMPED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无属性返回 null/undefined 或错误类型"

teardown:
  reset: fixture
