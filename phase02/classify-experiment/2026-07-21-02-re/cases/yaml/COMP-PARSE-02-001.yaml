id: COMP-PARSE-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 workflow 文件 YAML 合法性检查与错误信息"
intent_ref: INTENT-COMP-018

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    parse-test:
      name: Parse Test
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Verify workflow parsed correctly
        run: echo "WORKFLOW_PARSED_OK"
  name: COMP-PARSE-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "合法 YAML 文件可被解析，日志含 WORKFLOW_PARSED_OK"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "缺失 on/jobs/runs-on 等必填字段时，报错信息含文件路径和行号，且可理解"

teardown:
  reset: fixture
