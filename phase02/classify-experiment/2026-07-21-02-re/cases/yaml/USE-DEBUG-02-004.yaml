id: USE-DEBUG-02-004
dimensions:
  - usability
dimension: usability
priority: P2
title: "运行详情页 post 阶段的展示与文档一致性"
intent_ref: INTENT-USE-013

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  stages:
  - name: main
    jobs:
      main-job:
        runs-on: [dedicate-hosted, x64, large]
        steps:
        - run: echo "Main job succeeded"
  post:
    run_always: true
    jobs:
      notify:
        runs-on: [dedicate-hosted, x64, large]
        steps:
        - name: Deliberate post failure
          run: 'echo "Post notification step"
  
            exit 1
  
            '
  name: USE-DEBUG-02-004
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: nonfunctional
    target: run_status
    eval: "llm_assisted"
    rubric: "post 阶段应在详情页中有独立展示区域（标注 'post' 或 '后处理'），且 post 失败不应将主 workflow 标记为 failure"

teardown:
  reset: fixture
