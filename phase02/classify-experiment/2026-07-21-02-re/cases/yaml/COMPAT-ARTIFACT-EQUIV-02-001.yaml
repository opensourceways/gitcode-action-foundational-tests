id: COMPAT-ARTIFACT-EQUIV-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P2
title: "upload/download-artifact 差异——name 唯一性、path 默认、多 artifact 行为与 GitHub 等价性"
intent_ref: INTENT-COMPAT-049

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: COMPAT-ARTIFACT-EQUIV-02-001
  on:
    workflow_dispatch:
  jobs:
    artifact-test:
      name: Artifact Equivalence
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Create files
        run: |
          echo "file1" > dist/a.txt
          echo "file2" > dist/b.txt
      - name: Upload artifact
        uses: upload-artifact
        with:
          name: build-artifact
          path: dist/
      - name: Download artifact
        uses: download-artifact
        with:
          name: build-artifact
      - name: Verify files
        run: ls -la build-artifact/
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "a.txt 与 b.txt 存在"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "上传与下载 step 成功"

teardown:
  reset: fixture
