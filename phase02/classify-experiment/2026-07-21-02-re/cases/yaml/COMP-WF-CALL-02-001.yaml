id: COMP-WF-CALL-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证可重用工作流 workflow_call 的调用传参与 2 层嵌套限制"
intent_ref: INTENT-COMP-016

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    call-reusable:
      uses: ./.gitcode/workflows/called-workflow.yml
      with:
        input-a: value-from-caller
      secrets:
        secret-x: DEPLOY_TOKEN
      name: Call Reusable
      steps: []
  name: COMP-WF-CALL-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "调用方 with 传参正确到达被调用方（${{ inputs.input-a }} 为 value-from-caller）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "secrets 传递正确"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "第 3 层嵌套应明确报错"

teardown:
  reset: fixture
