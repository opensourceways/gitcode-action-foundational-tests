id: USE-DEBUG-02-003
dimensions:
  - usability
dimension: usability
priority: P1
title: "日志中 ATOMGIT_ 系统变量的注入完整性"
intent_ref: INTENT-USE-012

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    check-system-vars:
      name: Check System Vars
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: Dump all ATOMGIT_ system variables
        run: 'echo "ATOMGIT_REPOSITORY=$ATOMGIT_REPOSITORY"
  
          echo "ATOMGIT_EVENT_NAME=$ATOMGIT_EVENT_NAME"
  
          echo "ATOMGIT_REF=$ATOMGIT_REF"
  
          echo "ATOMGIT_SHA=$ATOMGIT_SHA"
  
          echo "ATOMGIT_ACTOR=$ATOMGIT_ACTOR"
  
          echo "ATOMGIT_TOKEN length: ${#ATOMGIT_TOKEN}"
  
          echo "ATOMGIT_RUN_ID=$ATOMGIT_RUN_ID"
  
          echo "ATOMGIT_RUN_NUMBER=$ATOMGIT_RUN_NUMBER"
  
          '
      - name: Validate each variable is non-empty
        run: "for var in ATOMGIT_REPOSITORY ATOMGIT_EVENT_NAME ATOMGIT_REF ATOMGIT_SHA\
          \ ATOMGIT_ACTOR ATOMGIT_RUN_ID ATOMGIT_RUN_NUMBER; do\n  eval \"val=\\$$var\"\
          \n  if [ -z \"$val\" ]; then\n    echo \"FAIL: $var is empty or unset\"\n\
          \    exit 1\n  fi\ndone\necho \"PASS: All required ATOMGIT_* variables are\
          \ set\"\n"
  name: USE-DEBUG-02-003
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "全部 8 个 ATOMGIT_* 系统变量非空且值正确"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "ATOMGIT_REPOSITORY 包含正确的 owner/repo 格式；ATOMGIT_ACTOR 匹配触发用户"

teardown:
  reset: fixture
