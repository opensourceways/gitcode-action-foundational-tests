id: COMPAT-POST-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "post 后处理阶段：验证 run_always 默认行为  与 always() 的交互"
intent_ref: INTENT-COMPAT-018

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  stages:
    main:
      name: Main
      jobs:
        name: Jobs
        main-job:
          runs-on: [dedicate-hosted, x64, large]
          steps:
          - name: Simulate failure
            run: 'echo "Main job running..."

              exit 1

              '
  post:
    run_always: true
    jobs:
      name: Jobs
      cleanup:
        name: Cleanup
        runs-on: [dedicate-hosted, x64, large]
        steps:
        - name: Post cleanup step
          run: 'echo "Post cleanup executed at $(date)"
  
            echo "Cleanup complete"
  
            '
      notify:
        name: Notify
        runs-on: [dedicate-hosted, x64, large]
        steps:
        - name: Post notification
          run: echo "Sending notification..."
  name: COMPAT-POST-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "run_always: true 时主流程失败后 post 阶段仍执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "post 中 cleanup 和 notify 步骤日志可见"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "post 失败不应将 workflow 最终状态改为 failure"

teardown:
  reset: fixture
