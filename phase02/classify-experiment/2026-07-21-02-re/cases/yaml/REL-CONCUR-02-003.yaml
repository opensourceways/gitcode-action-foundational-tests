id: REL-CONCUR-02-003
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "concurrency max1, exceed-actionCANCEL 时新触发取消旧运行"
intent_ref: INTENT-REL-003

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  concurrency:
    max: 1
    exceed-action: CANCEL
  jobs:
    cancel-test:
      name: Cancel Test
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Long sleep
        run: sleep 180
      - name: Should NOT reach if cancelled
        run: echo "OLD_RUN_COMPLETED_UNEXPECTEDLY"
  name: REL-CONCUR-02-003
trigger:
  event: manual
  as: maintainer
  params:
    stagger_seconds: 10

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "旧 run 被 cancelled"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "新 run 在旧 run 取消后 60s 内进入执行"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "新旧 run 不同时 in_progress"

teardown:
  reset: fixture
