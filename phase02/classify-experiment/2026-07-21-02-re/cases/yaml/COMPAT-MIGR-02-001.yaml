id: COMPAT-MIGR-02-001
dimensions:
  - compatibility
  - usability
dimension: compatibility
priority: P1
title: "端到端迁移摩擦清单：从 GitHub workflow 到 GitCode workflow 的最小改写路线验证"
intent_ref: INTENT-COMPAT-027

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    build:
      name: Build
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
        name: (TC) actions/checkoutv4
      - name: Build
        run: 'echo "Building on branch: ${{ github.ref }}"
  
          echo "Commit SHA: ${{ github.sha }}"
  
          npm ci
  
          npm run build
  
          '
      - name: Test
        if: ${{ success() }}
        run: npm test
      - name: Notify failure
        if: ${{ failure() }}
        run: echo "Build failed"
  name: COMPAT-MIGR-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "按迁移清单逐项修改后 workflow 可正常触发和执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "每个未修改的差异点在触发时产生可理解的错误信息（非 500/内部错误）"

teardown:
  reset: fixture
