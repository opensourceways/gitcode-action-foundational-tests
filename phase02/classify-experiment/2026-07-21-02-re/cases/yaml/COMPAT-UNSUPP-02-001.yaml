id: COMPAT-UNSUPP-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证不支持特征的降级行为不静默忽略"
intent_ref: INTENT-COMPAT-022

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-unsupported:
      name: Test Unsupported
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Verify basic execution
        run: echo "BASIC_EXECUTION_OK"
  name: COMPAT-UNSUPP-02-001
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "不支持的特征（container.image / environment / services）应明确报错"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不支持字段不应静默忽略，报错含字段路径"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "合法 workflow 正常执行，日志含 BASIC_EXECUTION_OK"

teardown:
  reset: fixture
