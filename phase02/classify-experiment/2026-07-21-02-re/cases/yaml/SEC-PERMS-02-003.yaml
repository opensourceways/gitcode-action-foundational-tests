id: SEC-PERMS-02-003
dimensions:
  - security
dimension: security
priority: P1
title: "job 级 permissions 声明可覆盖 workflow 级声明"
intent_ref: INTENT-SEC-017

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  permissions:
    repository: none
    pr: write
  jobs:
    job-a-override:
      permissions:
        repository: read
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test clone with overridden read
        run: echo "JOB_A_OVERRIDE_CLONE_OK"
    job-b-override:
      permissions:
        pr: none
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - name: Test no PR access with overridden none
        run: echo "JOB_B_PR_NONE_OK"
  name: SEC-PERMS-02-003
trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-a 覆盖 workflow 级 repository:none → read，克隆成功，日志含 JOB_A_OVERRIDE_CLONE_OK"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-b 覆盖 workflow 级 pr:write → none，日志含 JOB_B_PR_NONE_OK"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "未显式覆盖的 job 权限不意外放大"

teardown:
  reset: fixture
