id: USE-INPUTS-DEFAULT-02-001
dimensions: [usability, compatibility]
dimension: usability
priority: P2
title: "inputs 默认值在 shell 中以 ${var} 直接引用是否可用/失败可诊断"
intent_ref: INTENT-USE-025

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: USE-INPUTS-DEFAULT-02-001
  on:
    workflow_dispatch:
  jobs:
    inputs-test:
      name: Inputs Default
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Use input default
        run: |
          echo "INPUT_VAL=${{ inputs.test_input }}"
          echo "SHELL_VAL=${test_input}"
trigger:
  event: manual
  as: maintainer
  params:
    skip_inputs: "true"

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志出现 INPUT_VAL 与默认值"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "若失败，错误信息应指明正确引用方式"

teardown:
  reset: fixture
