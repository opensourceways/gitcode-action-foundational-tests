id: COMP-MATRIX-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证矩阵构建 include/exclude/fail-fast/max-parallel 语义"
intent_ref: INTENT-COMP-004

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    matrix-test:
      strategy:
        matrix:
          os:
          - ubuntu
          - windows
          node:
          - 18
          - 20
          - 22
        include:
        - os: ubuntu
          node: 24
          experimental: true
        exclude:
        - os: ubuntu
          node: 22
        fail-fast: false
        max-parallel: 2
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Log matrix values
        run: echo "OS=${{ matrix.os }} NODE=${{ matrix.node }} EXP=${{ matrix.experimental
          }}"
      name: Matrix Test
  name: 验证矩阵构建 include/exclude/fail-fast/max-parallel 语义

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "实例数为 (2*3) + 1 include - 1 exclude = 6 个"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "include 注入的 experimental=true 在对应实例中可用"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "exclude 组合 (ubuntu, 22) 不产生实例"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "max-parallel=2 限制生效，同时运行 <= 2"

teardown:
  reset: fixture
