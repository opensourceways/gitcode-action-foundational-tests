id: REL-CONCUR-02-002
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "concurrency max2, exceed-actionQUEUE 时 5 个同时触发按排队语义执行"
intent_ref: INTENT-REL-002

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  concurrency:
    max: 2
    exceed-action: QUEUE
  jobs:
    queue-test:
      name: Queue Test
      runs-on: [dedicate-hosted, x64, large]
  
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Simulate work
        run: sleep 30
      - name: Log completion
        run: echo "QUEUE_JOB_COMPLETED_${{ atomgit.run_id }}"
  name: REL-CONCUR-02-002
trigger:
  event: manual
  as: maintainer
  params:
    simultaneous_runs: 5

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "任意时刻 in_progress <= 2 始终成立"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "5 个 Run 全部到达 completed"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "无排队 Run 被丢弃或饿死"
  - type: nonfunctional
    target: run_status
    eval: "deterministic"
    rubric: "slot 释放到下一个调度间隔 < 30s"

teardown:
  reset: fixture
