id: SEC-SHA-REF-02-001
dimensions: [security]
dimension: security
priority: P1
title: "uses 支持 commit SHA 不可变引用，且 tag/分支重写风险应被识别"
intent_ref: INTENT-SEC-021

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: SEC-SHA-REF-02-001
  on:
    workflow_dispatch:
  jobs:
    sha-ref:
      name: SHA Ref Test
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Use action by SHA
        uses: checkout@a1b2c3d4e5f6
trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "run 状态为成功"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无 action 被篡改的异常日志"

teardown:
  reset: fixture
