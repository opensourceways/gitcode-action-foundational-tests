id: SEC-INJECT-02-001
dimensions:
  - security
dimension: security
priority: P0
title: "PR 标题中的不可信输入不应通过   直接插入 run: 导致命令注入"
intent_ref: INTENT-SEC-009

setup:
  repo_fixture: with-pr-trigger
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request:
      branches:
        - main
  jobs:
    test-injection:
      name: Test Injection
      runs-on: [dedicate-hosted, x64, large]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo PR title (direct interpolation — VULNERABLE PATTERN)
        run: echo "${{ atomgit.event.pull_request.title }}"
      - name: Verify no injection executed
        run: "if [ -f /tmp/injection_marker ]; then\n  echo \"INJECTION_SUCCEEDED_UNEXPECTEDLY\"\
          \n  exit 1\nelse\n  echo \"NO_INJECTION_AS_EXPECTED\"\nfi\n"
  name: SEC-INJECT-02-001
trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    pr_title_contains_injection: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 NO_INJECTION_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 INJECTION_SUCCEEDED_UNEXPECTEDLY"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现注入命令的执行痕迹（如文件列表、用户信息等）"

teardown:
  reset: fixture
