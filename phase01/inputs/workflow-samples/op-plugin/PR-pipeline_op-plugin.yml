  stage_1:
    name: stage_1
    select: selected_by_default
    jobs:

      SCA:
        name: SCA
        # runs-on: [ self-hosted, arch=x64, os=euler ]
        # runs-on: [ 'codearts-hosted', 'ubuntu-latest', 'x64', 'large' ]
        runs-on: [ dedicate-hosted, x64, 2xlarge ]
        container:
          image: swr.cn-north-4.myhuaweicloud.com/pytorch_images_x86/pytorchx86:v_03
          options: --user root
        steps:
          - name: checkout
            uses: checkout
            with:
              ref: refs/merge-requests/${{ env.pr_id }}/merge
          - name: Run SCA PR Scan
            uses: sca-pr-scan
            with:
              scan-access-key: ${{ secrets.SCAN_ACCESS_KEY }}
              scan-secret-key: ${{ secrets.SCAN_SECRET_KEY }}
              pr-id: ${{ atomgit.event.pull_request.number }}
              repository-name: ${{ atomgit.repository }}
              project-name: FrameworkPTAdapter

      Antipoison:
        name: Antipoison
        # runs-on: [ self-hosted, arch=x64, os=euler ]
        # runs-on: [ 'codearts-hosted', 'ubuntu-latest', 'x64', 'large' ]
        runs-on: [ dedicate-hosted, x64, 2xlarge ]
        container:
          image: swr.cn-north-4.myhuaweicloud.com/pytorch_images_x86/pytorchx86:v_03
          options: --user root
        steps:
          - name: checkout
            uses: checkout
            with:
              ref: refs/merge-requests/${{ env.pr_id }}/merge
          - name: Antipoison
            run: |
              git clone -b master https://codehub.devcloud.cn-north-4.huaweicloud.com/a9b188a62f334fc0963bcfb523426d17/ci_gitcode.git cie
              pip3.8 install --trusted-host https://repo.huaweicloud.com -i https://repo.huaweicloud.com/repository/pypi/simple requests
              wget -q https://pytorch-package.obs.cn-north-4.myhuaweicloud.com/pta/tools/ApiGateway-python-sdk-2.0.7.zip --no-check-certificate
              unzip -q ApiGateway-python-sdk-2.0.7.zip
              cp -rf ApiGateway-python-sdk-2.0.7/apig_sdk cie/codecheck/
              python3.8 cie/codecheck/anti_poison.py --created_appId ${{ secrets.ANTIPOISON_CREATED_APPID }} --created_secretKey ${{ secrets.ANTIPOISON_CREATED_SECRETKEY }} --result_appId ${{ secrets.ANTIPOISON_RESULT_APPID }} --result_secretKey ${{ secrets.ANTIPOISON_RESULT_SECRETKEY }} --org_name ${org_name} --pr_id ${pr_id} --repo ${repo}

      CodeCheck_pre_commit:
        name: CodeCheck_pre_commit
        # runs-on: [ self-hosted, arch=x64, os=euler ]
        # runs-on: [ 'codearts-hosted', 'ubuntu-latest', 'x64', 'large' ]
        runs-on: [ dedicate-hosted, x64, 2xlarge ]
        container:
          image: swr.cn-north-4.myhuaweicloud.com/pytorch_images_x86/pytorchx86:v_03
          options: --user root
        steps:
          - name: checkout
            uses: checkout
            with:
              ref: refs/merge-requests/${{ env.pr_id }}/merge
          - name: setup-python
            uses: setup-python
          - name: setup-python310
            run: |
              ln -sf /usr/local/bin/python3.10 /usr/bin/python
              python --version
          - name: install gitleaks
            run: |
              cd ${ATOMGIT_WORKSPACE}
              wget --no-host-directories -c --no-check-certificate https://pytorch-package.obs.cn-north-4.myhuaweicloud.com/pta-codecheck/gitleaks
              chmod +x gitleaks
              cd -
          - name: pre-commit
            uses: openlibing-pre-commit-action
            with:
              gc_token: ${{ secrets.ATOMGIT_TOKEN }}

      Only_doc_commit:
        name: Only_doc_commit
        # runs-on: [ self-hosted, arch=x64, os=euler ]
        # runs-on: [ 'codearts-hosted', 'ubuntu-latest', 'x64', 'large' ]
        runs-on: [ dedicate-hosted, x64, 2xlarge ]
        container:
          image: swr.cn-north-4.myhuaweicloud.com/pytorch_images_x86/pytorchx86:v_03
          options: --user root
        outputs:
          build_skip: ${{ steps.set-skip.outputs.build_skip }}
        steps:
          - name: checkout
            uses: checkout
            with:
              ref: refs/merge-requests/${{ env.pr_id }}/merge
          - name: Only Doc Commit Check
            id: only-doc-check
            uses: WWQ129/.gitcode/actions/Only_Doc_Commit_Check@main
            with:
              pr_id: ${{ env.pr_id }}
              target_branch: ${{ atomgit.event.pull_request.base.ref }}
              remote_url: ${{ env.REMOTE_URL }}
          - name: set build skip flag
            id: set-skip
            run: |
              BUILD_SKIP=${{ steps.only-doc-check.outputs.is_only_doc }}
              echo "build_skip=${BUILD_SKIP}" >> "$ATOMGIT_OUTPUT"
              echo "Only Doc Commit Check result: ${BUILD_SKIP}"


  stage_2:
    name: stage_2
    select: selected_by_default
    jobs:

      Build_master_x86:
        name: Build_master_x86
        if : ${{ jobs.Only_doc_commit.outputs.build_skip != 'yes' }}
        uses: .gitcode/workflows/build_job.yml
        secrets:
          OBS_AK: ${{ secrets.OBS_AK }}
          OBS_SK: ${{ secrets.OBS_SK }}
        with:
          pytorch_branch: "master"
          CP_DOCKER_IMG: ${{ env.img_master_x86 }}
          runs_on_arch: "x64"
          runs_on_spec: "2xlarge"

