name: PR-pipeline_op-plugin

concurrency:
  max: 5
  exceed-action: QUEUE
  enable: true
  preemption:
    enable: true
    events: [mr_id]

on:
  pull_request_comment:
    types: [created]
    branches: [ '*' ]
    comments: [ '^(?:\/)?compile*' ]
inputs:
  repo:
    type: string
    description: "仓库名称"
    default: ${{ atomgit.event.repository.name }}
  REMOTE_URL:
    type: string
    description: "远程仓库URL"
    default: ${{ env.ATOMGIT_REPOSITORY_URL }}
  org_name:
    type: string
    description: "组织名称"
    default: "ComputingActionTest"
  pr_id:
    type: string
    description: "PR ID"
    default: ${{ atomgit.event.pull_request.number }}
  workspace:
    type: string
    description: "工作目录"
    default: ${{ env.ATOMGIT_WORKSPACE }}

env:
  img_master_arm: "pytorch_2.13.0_a2_aarch64_builder:20260709"
  img_2_7_1_arm: "pytorch_2.7.1_a2_aarch64_builder:20260518"
  img_2_9_0_arm: "pytorch_2.9.0_a2_aarch64_builder:20260518"
  img_2_10_0_arm: "pytorch_2.10.0_a2_aarch64_builder:20260518"
  img_2_11_0_arm: "pytorch_2.11.0_a2_aarch64_builder:20260518"
  img_2_12_0_arm: "pytorch_2.12.0_a2_aarch64_builder:20260518"
  img_master_x86: "pytorch_2.13.0_a1_x86_64_builder:20260709"
  img_2_7_1_x86: "pytorch_2.7.1_a1_x86_64_builder:20260418"
  img_2_9_0_x86: "pytorch_2.9.0_a1_x86_64_builder:20260518"
  img_2_10_0_x86: "pytorch_2.10.0_a1_x86_64_builder:20260418"
  img_2_11_0_x86: "pytorch_2.11.0_a1_x86_64_builder:20260418"
  img_2_12_0_x86: "pytorch_2.12.0_a1_x86_64_builder:20260518"

stages:
