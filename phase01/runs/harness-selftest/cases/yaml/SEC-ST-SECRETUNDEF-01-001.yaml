id: SEC-ST-SECRETUNDEF-01-001
dimensions: [security]
dimension: security
priority: P1
title: "未定义 secret 展开为空（harness 自测）"
intent_ref: INTENT-SEC-530
setup:
  repo_fixture: with-secrets
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  name: SEC-ST-SECRETUNDEF-01-001
  on:
    push:
      branches: [main]
  jobs:
    assert:
      name: undefined-secret-empty
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: assert undefined secret expands empty
          env:
            U: ${{ secrets.UNDEFINED_SECRET_XYZ }}
          run: |
            echo "undef_len=${#U}"
            test -z "$U"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_status
    eval: deterministic
    rubric: "引用未定义 secret 应展开为空字符串，不得泄露/报错；step 成功即证为空"
teardown:
  reset: fixture
