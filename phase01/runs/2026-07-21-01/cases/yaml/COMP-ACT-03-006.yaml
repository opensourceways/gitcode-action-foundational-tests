id: COMP-ACT-03-006
dimensions: [completeness]
dimension: completeness
priority: P2
title: "setup-buildx 构建器配置——安装、自定义 builder、多架构、缓存、daemon 不可用场景"
intent_ref: INTENT-ACT-006

setup:
  repo_fixture: with-docker-build
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [push]
  permissions: {}
  jobs:
    buildx-test:
      name: "(COMP-ACT-03-006) 验证 setup-buildx 构建器配置"
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: "(COMP-ACT-03-006) checkout source"
          uses: official_checkout
        - name: "(COMP-ACT-03-006) check docker daemon"
          run: |
            if docker info 2>&1; then
              echo "DOCKER_DAEMON_AVAILABLE: yes"
            else
              echo "DOCKER_DAEMON_AVAILABLE: no"
              echo "NOTE: 已知 #86——默认资源池不支持 Docker daemon"
            fi
        - name: "(COMP-ACT-03-006) setup buildx"
          uses: docker/setup-buildx-action
        - name: "(COMP-ACT-03-006) verify buildx version"
          if: ${{ always() }}
          run: |
            if docker info 2>&1 > /dev/null; then
              docker buildx version 2>&1 && echo "BUILDX_VERSION: ok" || echo "BUILDX_VERSION: failed"
            else
              echo "BUILDX_TEST: skipped (no daemon)"
            fi
        - name: "(COMP-ACT-03-006) create custom builder"
          if: ${{ always() }}
          run: |
            if docker info 2>&1 > /dev/null; then
              docker buildx create --name test-builder 2>&1 && echo "BUILDER_CREATE: ok" || echo "BUILDER_CREATE: failed"
            else
              echo "BUILDER_CREATE: skipped (no daemon)"
            fi

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "Buildx 安装 step 执行完成，docker buildx version 正常"
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "有 daemon 时自定义 builder 创建成功；无 daemon 时跳过并说明原因"

teardown:
  reset: fixture
