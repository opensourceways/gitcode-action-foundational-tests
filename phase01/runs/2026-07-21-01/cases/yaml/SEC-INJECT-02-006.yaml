id: SEC-INJECT-02-006
dimensions:
  - security
dimension: security
priority: P1
title: "通过环境变量安全引用不可信输入应不触发脚本注入"
intent_ref: INTENT-SEC-013

setup:
  repo_fixture: with-pr-trigger
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - pull_request
  jobs:
    test-safe-reference:
      name: Test Safe Reference
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Safe echo via env intermediate
        env:
          PR_TITLE: ${{ atomgit.event.pull_request.title }}
        run: echo "$PR_TITLE"
      - name: Verify no injection via safe reference
        run: "if [ -f /tmp/injection_via_env ]; then
    echo \"INJECTION_VIA_ENV_UNEXPECTED\"\
          
    exit 1
  else
    echo \"SAFE_ENV_REFERENCE_OK\"
  fi
  "
      name: Test Safe Reference
  name: 通过环境变量安全引用不可信输入应不触发脚本注入

trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    pr_title_contains_metacharacters: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "env 中间变量方式引用，shell 元字符被当作字面字符串，日志含 SAFE_ENV_REFERENCE_OK"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "workflow 正常完成"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不出现注入命令的执行痕迹"

teardown:
  reset: fixture
