id: COMPAT-DOCKER-03-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "Docker daemon 在托管 Runner 上的可用性——历史 #86"
intent_ref: INTENT-COMPAT-044

setup:
  repo_fixture: standard
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    docker-test:
      name: test-docker-daemon-availability
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: check docker cli
          run: |
            if command -v docker &> /dev/null; then
              echo "DOCKER_CLI_AVAILABLE: yes"
              docker --version
            else
              echo "DOCKER_CLI_AVAILABLE: no"
            fi
        - name: check docker daemon
          if: ${{ always() }}
          run: |
            docker ps 2>&1 || echo "DOCKER_DAEMON_UNAVAILABLE: yes"
        - name: check docker info
          if: ${{ always() }}
          run: |
            docker info 2>&1 | head -5 || echo "DOCKER_INFO_FAILED: yes"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "docker CLI 或 daemon 状态可观测；若不可用记录为已知差异"
  - type: nonfunctional
    target: step_logs
    eval: llm_assisted
    rubric: "若 daemon 不可用——文档应声明并提供替代方案（如 official_build_push）"

teardown:
  reset: fixture
