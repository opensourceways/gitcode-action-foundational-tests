id: REL-LOAD-PARALLEL-03-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: "单 workflow 含 10 个独立 job 全部正确并行分发"
intent_ref: INTENT-REL-043

setup:
  repo_fixture: standard
  secrets: []
  variables: {}
  branch_protection: default

