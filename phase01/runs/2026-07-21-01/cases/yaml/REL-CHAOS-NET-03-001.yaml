id: REL-CHAOS-NET-03-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: "job 执行中网络分区后 step 应超时失败而非永久 hang"
intent_ref: INTENT-REL-013

setup:
  repo_fixture: standard
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    net-test:
      name: network-partition-test
      runs-on: [ubuntu-latest, x64, small]
      timeout-minutes: 5
      steps:
        - name: attempt network call
          run: |
            echo "NET_TEST_START: $(date -u +%H:%M:%S)"
            curl -s --connect-timeout 10 https://registry.npmjs.org 2>&1 || echo "CURL_FAILED: $?"
            echo "NET_TEST_END: $(date -u +%H:%M:%S)"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection:
  at: mid_job
  action: network_partition
  params: { delay_seconds: 30, block_outbound: true }
  recovery_expectation: step_timeout_with_network_error

assertions:
  - type: positive
    target: run_status
    equals: failure
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "日志含网络错误（connection refused / could not resolve host 等）"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "step 不应 hang 超过 timeout-minutes"

teardown:
  reset: fixture
