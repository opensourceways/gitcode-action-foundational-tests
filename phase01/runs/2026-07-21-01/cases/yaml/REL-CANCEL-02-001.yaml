id: REL-CANCEL-02-001
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "手动取消 sleep step，step 收到终止信号且清理步骤仍执行"
intent_ref: INTENT-REL-019

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    long-job:
      name: Long Job
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Long sleep for cancel window
        run: sleep 300
      - name: Cleanup after cancel
        if: ${{ always }}
        run: echo "CLEANUP_EXECUTED_AFTER_CANCEL"
      name: Long Job
  name: 手动取消 sleep step，step 收到终止信号且清理步骤仍执行

trigger:
  event: push
  as: maintainer
  params:
    cancel_after_seconds: 10

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "被取消 step 在 10s 内终止，job status = cancelled"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "if: always() 清理步骤执行，日志含 CLEANUP_EXECUTED_AFTER_CANCEL"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "取消后不 stuck > 120s"

teardown:
  reset: fixture
