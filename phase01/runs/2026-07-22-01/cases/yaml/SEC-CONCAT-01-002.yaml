id: SEC-CONCAT-01-002
dimensions: [security]
dimension: security
priority: P0
title: secret 通过 shell 插值拼接不应绕过日志脱敏
intent_ref: INTENT-SEC-006

setup:
  repo_fixture: with-secrets
  secrets: [DEPLOY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches: [main]
  jobs:
    test:
      name: Test shell interpolation bypass masking
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout source
          uses: checkout
        - name: (TC) interpolate secret into variable
          run: |
            msg="start_${DEPLOY_TOKEN}_end"
            echo "$msg"
        - name: (TC) inline interpolation with secret
          run: |
            echo "before_${DEPLOY_TOKEN}_after"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: DEPLOY_TOKEN
  - type: negative
    target: run_logs
    must_not_contain: "placeholder_for_interpolated_result"
  - type: positive
    target: run_status
    equals: completed

teardown:
  reset: fixture
