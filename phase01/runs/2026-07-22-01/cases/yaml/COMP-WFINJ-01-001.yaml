id: COMP-WFINJ-01-001
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: 恶意 fork PR 修改 workflow 文件后 pull_request_target 仍使用 base 分支版本
intent_ref: INTENT-COMP-014

setup:
  repo_fixture: with-secrets
  secrets: [DEPLOY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request_target:
      branches: [main]
      types: [open, update]
  jobs:
    workflow-source-verify:
      name: Verify workflow source is from base branch
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: Check current workflow SHA matches base
          run: |
            BASE_SHA="${{ atomgit.event.pull_request.base.sha }}"
            CURRENT_SHA="${{ atomgit.sha }}"
            echo "Base SHA: $BASE_SHA"
            echo "Current SHA: $CURRENT_SHA"
            if [ "$BASE_SHA" = "$CURRENT_SHA" ]; then
              echo "USES_BASE_BRANCH"
            else
              echo "USES_HEAD_BRANCH"
            fi

trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    modify_workflow: true

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    must_contain: "USES_BASE_BRANCH"
  - type: negative
    target: run_logs
    must_not_contain: "USES_HEAD_BRANCH"

teardown:
  reset: fixture
