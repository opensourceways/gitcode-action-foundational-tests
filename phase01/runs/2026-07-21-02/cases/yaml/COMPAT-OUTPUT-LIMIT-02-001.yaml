id: COMPAT-OUTPUT-LIMIT-02-001
dimensions: [compatibility, reliability]
dimension: compatibility
priority: P2
title: "step 输出/artifact 超限行为差异——1MB output、artifact 上限的降级方式"
intent_ref: INTENT-COMPAT-046

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: Output Limit Test
  on:
  - push
  jobs:
    limit-test:
      name: Output Limit
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Generate large output
        run: python3 -c "print('A'*1024*1024)"
      - name: Generate large artifact
        run: dd if=/dev/zero of=bigfile.bin bs=1M count=10
      - name: Upload large artifact
        uses: upload-artifact
        with:
          name: large-artifact
          path: bigfile.bin

trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "run 不崩溃"
  - type: nonfunctional
    target: run_logs
    eval: "llm_assisted"
    rubric: "超限后出现截断或报错提示"

teardown:
  reset: fixture
