id: SEC-CONT-CRED-02-001
dimensions:
  - security
dimension: security
priority: P1
title: "私有 container 镜像拉取凭证的安全传递与日志不泄露"
intent_ref: INTENT-SEC-039

setup:
  repo_fixture: private-registry
  secrets: [REGISTRY_USERNAME, REGISTRY_PASSWORD]
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    private-image-job:
      name: Private Image Job
      runs-on: [ubuntu-latest, x64, small]
      container:
        image: registry.example.com/private-image:latest
        credentials:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      steps:
      - name: Marker inside container
        run: echo "CONTAINER_STEP_EXECUTED"
      name: Private Image Job

  name: 私有 container 镜像拉取凭证的安全传递与日志不泄露

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中出现 CONTAINER_STEP_EXECUTED，表明私有镜像拉取成功且步骤执行"
  - type: negative
    target: run_logs
    must_not_contain_secret: REGISTRY_USERNAME
  - type: negative
    target: run_logs
    must_not_contain_secret: REGISTRY_PASSWORD
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "拉取失败时的错误消息不应包含认证头或密码明文"

teardown:
  reset: fixture
