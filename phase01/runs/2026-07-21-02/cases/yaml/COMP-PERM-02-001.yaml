id: COMP-PERM-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 permissions 权限模型 6 个权限域与快捷语法"
intent_ref: INTENT-COMP-015

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  permissions:
    repository: read
    pr: write
  jobs:
    test-permissions:
      name: Test Permissions
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test clone (should succeed with repository:read)
        run: echo "CLONE_OK"
      - name: Test push (should fail with read-only)
        run: "if git push origin HEAD:refs/heads/test-perms-push 2>&1; then
    echo\
          \ \"PUSH_SUCCEEDED_UNEXPECTEDLY\"
  else
    echo \"PUSH_REJECTED_AS_EXPECTED_READ_ONLY\"\
          
  fi
  "
      name: Test Permissions
  name: 验证 permissions 权限模型 6 个权限域与快捷语法

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "repository:read 下 clone 成功，日志含 CLONE_OK"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "repository:read 下 push 被拒绝，日志含 PUSH_REJECTED_AS_EXPECTED_READ_ONLY"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无 write 声明不应静默降级为 read"

teardown:
  reset: fixture
