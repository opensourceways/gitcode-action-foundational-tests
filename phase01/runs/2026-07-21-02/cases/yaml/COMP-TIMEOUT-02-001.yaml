id: COMP-TIMEOUT-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 timeout-minutes 超时终止与 job 状态标记"
intent_ref: INTENT-COMP-024

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    timeout-job:
      timeout-minutes: 1
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Sleep beyond timeout
        run: sleep 300
      name: Timeout Job
    post-timeout-job:
      needs: timeout-job
      if: ${{ cancelled }}
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "TIMEOUT_CLEANUP"
      name: Post Timeout Job
  name: 验证 timeout-minutes 超时终止与 job 状态标记

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "超时后 job 状态为 cancelled（非 success）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含超时原因标记"
  - type: nonfunctional
    target: run_status
    eval: "deterministic"
    rubric: "runner 在超时后正常回收，无资源泄漏"

teardown:
  reset: fixture
