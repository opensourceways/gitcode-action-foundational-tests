id: COMPAT-COMM-01-002
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "issue_comment types:created 不支持时应给出降级指引"
intent_ref: INTENT-COMPAT-NEW-004

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    issue_comment:
      types: [created]
  jobs:
    test-comment-created:
      name: Test issue comment created type
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo trigger info
          run: |
            echo "event_name=${{ atomgit.event_name }}"
            echo "done"

trigger:
  event: issue_comment
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "不应静默忽略 types 配置导致所有 issue_comment 都触发"
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "若 created 不被支持，报错应给出可接受的 types 列表"

teardown:
  reset: none
