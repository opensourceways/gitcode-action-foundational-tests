id: COMPAT-SCHEDULE-01-003
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "schedule 在非默认分支不触发与 GitHub 差异"
intent_ref: INTENT-COMPAT-013

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    schedule:
      - cron: '0 2 * * *'
  jobs:
    test-schedule-non-default:
      name: Test schedule on non-default branch
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo branch
          run: |
            echo "branch=${{ atomgit.ref_name }}"
            echo "done"

trigger:
  event: schedule
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "非默认分支的 schedule workflow 不应触发运行"
  - type: positive
    target: run_status
    eval: llm_assisted
    rubric: "默认分支的 schedule workflow 正常触发"

teardown:
  reset: none
