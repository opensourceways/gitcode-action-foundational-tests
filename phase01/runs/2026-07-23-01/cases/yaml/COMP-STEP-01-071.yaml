id: COMP-STEP-01-071
dimensions: [completeness]
dimension: completeness
priority: P1
title: step 执行控制 shell working-directory continue-on-error timeout-minutes 验证
intent_ref: KEEP-TC-279~288
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
fault_injection: null
workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify step execution control
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Bash shell
          shell: bash
          run: |
            echo "bash_ok"
        - name: Sh shell
          shell: sh
          run: |
            echo "sh_ok"
        - name: Working directory
          working-directory: .
          run: |
            echo "wd_ok"
        - name: Continue on error
          continue-on-error: true
          run: |
            echo "continue_ok"
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
assertions:
  - type: positive
    target: run_logs
    must_contain: bash_ok
  - type: positive
    target: run_logs
    must_contain: sh_ok
  - type: positive
    target: run_logs
    must_contain: wd_ok
  - type: positive
    target: run_logs
    must_contain: continue_ok
teardown:
  reset: fixture
