id: COMPAT-RUNNER-01-005
dimensions: [compatibility]
dimension: compatibility
priority: P2
title: "内网环境 Runner 不支持时的差异"
intent_ref: INTENT-COMPAT-NEW-008

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test-intranet:
      name: Test intranet runner
      runs-on: [intranet, x64]
      steps:
        - name: Echo hello
          run: |
            echo "hello"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "系统对内网环境 Runner 标签给出明确报错"
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "不应无限排队"

teardown:
  reset: none
