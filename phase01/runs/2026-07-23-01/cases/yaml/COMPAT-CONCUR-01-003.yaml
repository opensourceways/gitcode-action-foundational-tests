id: COMPAT-CONCUR-01-003
dimensions: [compatibility, reliability]
dimension: compatibility
priority: P1
title: "concurrency preemption enable 行为差异"
intent_ref: INTENT-COMPAT-NEW-005

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  concurrency:
    group: test-preemption
    cancel-in-progress: true
  jobs:
    test-preemption:
      name: Test concurrency preemption
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Sleep and echo
          run: |
            sleep 30
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: error_message
    eval: llm_assisted
    rubric: "系统接受或拒绝 preemption 配置时应给出明确提示"
  - type: negative
    target: run_status
    eval: llm_assisted
    rubric: "preemption 配置不应被静默忽略"

teardown:
  reset: none
