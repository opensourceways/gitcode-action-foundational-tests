id: SEC-SUPPLY-01-003
dimensions: ["security"]
dimension: security
priority: P0
title: "第三方 Action 来源应具备信任边界（typosquatting 限制）"
intent_ref: INTENT-SEC-015
setup:
  repo_fixture: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    typo-test:
      name: Test typosquatting rejection
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Use typo action
          uses: checkout-action@v1
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: negative
    target: run_status
    must_not_equal: "success"
  - type: positive
    target: run_logs
    equals: "action_not_found_or_unapproved"
teardown:
  reset: fixture
