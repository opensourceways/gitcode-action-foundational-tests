id: COMPAT-VARS-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: vars 上下文若支持应正确返回值
intent_ref: INTENT-COMPAT-022

setup:
  repo_fixture: default
  secrets: []
  variables:
    TEST_VAR: hello_vars
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: Test vars context
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Echo vars TEST_VAR
          run: |
            echo "test_var=${{ vars.TEST_VAR }}"
            echo "done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_status
    equals: success
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "日志中 test_var 应包含 hello_vars，表明 vars 上下文可用"

teardown:
  reset: fixture
