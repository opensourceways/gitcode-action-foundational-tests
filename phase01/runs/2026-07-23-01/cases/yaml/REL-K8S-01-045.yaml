id: REL-K8S-01-045
dimensions: [reliability]
dimension: reliability
priority: P1
title: "自托管 K8s Runner 弹性伸缩——min=1/max=1 时并发 3 个 jobs 应排队执行"
intent_ref: INTENT-REL-045
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    test:
      name: K8s runner scaling test
      runs-on: [self-hosted, kubernetes, small]
      steps:
        - name: sleep step
          run: |
            sleep 10
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: pod_count
    equals: "1"
  - type: positive
    target: max_concurrent_jobs
    equals: "1"
teardown:
  reset: none
