id: USE-YAML-01-001
dimensions: ["usability"]
dimension: usability
priority: P1
title: "缺少必填字段 on 时报错应指出具体字段名与位置"
intent_ref: INTENT-USE-022

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  jobs:
    bad:
      name: missing on field
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: step
          run: |
            echo "hello"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: COMPLETED
  - type: nonfunctional
    target: error_message
    eval: deterministic
    rubric: "报错信息必须同时包含字段名、所在行号、正确写法示例三项中的至少两项"

teardown:
  reset: none

