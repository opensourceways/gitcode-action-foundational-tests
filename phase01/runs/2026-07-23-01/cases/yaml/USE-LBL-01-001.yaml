id: USE-LBL-01-001
dimensions: ["usability"]
dimension: usability
priority: P1
title: "runs-on 标签完全不匹配时应给出明确失败原因与可用标签列表"
intent_ref: INTENT-USE-025

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    bad:
      name: unmatched runner labels
      runs-on: [nonexistent-os, x64, small]
      steps:
        - name: step
          run: |
            echo "hello"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: COMPLETED
  - type: nonfunctional
    target: error_message
    eval: deterministic
    rubric: "报错信息必须包含用户指定的 runs-on 标签原文；若因标签不匹配，应提示未找到匹配标签的 Runner，可用标签包括..."

teardown:
  reset: none

