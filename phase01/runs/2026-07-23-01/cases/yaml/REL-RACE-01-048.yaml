id: REL-RACE-01-048
dimensions: [reliability]
dimension: reliability
priority: P1
title: "取消与 needs 条件竞态——job A 被取消时 job B(if: failure())应正确判定"
intent_ref: INTENT-REL-048
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  jobs:
    job_a:
      name: job A cancel target
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: sleep step
          run: |
            sleep 60
    job_b:
      name: job B failure condition
      runs-on: [dedicate-hosted, x64, large]
      needs: job_a
      if: failure()
      steps:
        - name: should not run
          run: |
            echo this should not run
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_a_status
    equals: "canceled"
  - type: positive
    target: job_b_status
    equals: "skipped"
teardown:
  reset: none
