id: COMPAT-OUTCOME-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "continue-on-error false 时 outcome 与 conclusion 应均为 failure"
intent_ref: INTENT-COMPAT-035

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  jobs:
    outcome-false:
      name: Test outcome with continue on error false
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: checkout source
          uses: checkout
        - name: failing step
          continue-on-error: false
          run: |
            exit 1
        - name: check status
          if: ${{ always() }}
          run: |
            echo "Check step outcome and conclusion"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: step_status
    equals: failure
    eval: llm_assisted
    rubric: "失败 step 的 outcome 为 failure"
  - type: positive
    target: step_conclusion
    equals: failure
    eval: llm_assisted
    rubric: "失败 step 的 conclusion 为 failure"
  - type: positive
    target: run_status
    equals: failure
    eval: deterministic
    rubric: "job 整体状态为 failure"

teardown:
  reset: fixture
