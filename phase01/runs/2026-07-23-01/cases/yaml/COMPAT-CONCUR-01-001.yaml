id: COMPAT-CONCUR-01-001
dimensions: [compatibility, reliability]
dimension: compatibility
priority: P1
title: "concurrency cancel-in-progress false 时应排队而非报错"
intent_ref: INTENT-COMPAT-034

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
  concurrency:
    group: test-group-compat-034
    cancel-in-progress: false
  jobs:
    concurrency-test:
      name: Test concurrency queue behavior
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: checkout source
          uses: checkout
        - name: long running step
          run: |
            echo "Starting long job"
            sleep 60
            echo "Job done"

trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_status
    equals: failure
    eval: deterministic
    rubric: "第二次触发不应被标记为失败"
  - type: positive
    target: run_status
    eval: llm_assisted
    rubric: "第二次触发的状态为 queued / pending，等待第一次完成后执行"
  - type: positive
    target: run_logs
    eval: llm_assisted
    rubric: "第一次完成后第二次正常开始执行并输出 Job done"

teardown:
  reset: fixture
