id: COMP-JOB-01-068
dimensions: [completeness]
dimension: completeness
priority: P1
title: job strategy 矩阵与 continue-on-error 验证
intent_ref: KEEP-TC-276~278
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
fault_injection: null
workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Verify strategy and matrix
      runs-on: [dedicate-hosted, x64, large]
      strategy:
        matrix:
          version: [a, b]
        fail-fast: false
      continue-on-error: true
      steps:
        - name: Matrix value
          run: |
            echo "VERSION=${{ matrix.version }}"
            echo "strategy_ok"
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
assertions:
  - type: positive
    target: run_logs
    must_contain: VERSION=a
  - type: positive
    target: run_logs
    must_contain: VERSION=b
  - type: positive
    target: run_logs
    must_contain: strategy_ok
teardown:
  reset: fixture
