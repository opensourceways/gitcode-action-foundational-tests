id: REL-PREEMPT-01-005
dimensions: [reliability]
dimension: reliability
priority: P1
title: "preemption events 边界值——配置 10 个应正常解析"
intent_ref: INTENT-REL-005
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on:
    workflow_dispatch:
  concurrency:
    max: 5
    exceed-action: QUEUE
    preemption:
      events: [push, pull_request, workflow_dispatch, schedule, tag, issue_comment, pull_request_comment, merge_requests, fork_pr, manual]
  jobs:
    test:
      name: preempt boundary test
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: echo step
          run: |
            echo test
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_status
    equals: "completed(success)"
teardown:
  reset: none
