id: COMP-WFLOW-01-065
dimensions: [completeness]
dimension: completeness
priority: P1
title: workflow post 后处理阶段字段验证
intent_ref: KEEP-TC-366~401
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
fault_injection: null
workflow: |
  on:
    workflow_dispatch:
  jobs:
    verify:
      name: Main job
      runs-on: [dedicate-hosted, x64, large]
      steps:
        - name: Main step
          run: |
            echo "main_done"
  post:
    run_always: true
    steps:
      - name: Post notification
        run: |
          echo "post_done"
trigger:
  event: workflow_dispatch
  as: maintainer
  params: {}
assertions:
  - type: positive
    target: run_logs
    must_contain: main_done
  - type: positive
    target: run_logs
    must_contain: post_done
teardown:
  reset: fixture
