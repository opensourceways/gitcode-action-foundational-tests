id: USE-STATE-01-001
dimensions: [usability]
dimension: usability
priority: P2
title: 运行状态机完整性与可观察性
intent_ref: INTENT-USE-011

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [push]
  concurrency:
    enable: true
    max: 1
    exceed-action: QUEUE
  jobs:
    slow-job:
      runs-on: default
      steps:
        - run: sleep 120

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: nonfunctional
    target: ui_state_display
    eval: deterministic
    rubric: "Actions 列表页显示 queued 状态标签且含排队信息（可截图判定）"
  - type: nonfunctional
    target: ui_state_display
    eval: llm_assisted
    rubric: "queued/cancelled/skipped 状态的原因文本是否具体（0=仅状态标签无原因, 1=有原因但笼统如仅 'cancelled', 2=具体如 'cancelled by user @username'）"

teardown:
  reset: fixture
