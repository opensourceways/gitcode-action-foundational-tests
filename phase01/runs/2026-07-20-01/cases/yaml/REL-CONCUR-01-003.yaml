id: REL-CONCUR-01-003
dimensions: [reliability]
dimension: reliability
priority: P1
title: concurrency max=1 CANCEL 抢占
intent_ref: INTENT-REL-003
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [workflow_dispatch]
  concurrency:
    enable: true
    max: 1
    exceed-action: CANCEL
  jobs:
    test:
      runs-on: default
      steps:
        - run: sleep 180
trigger:
  event: workflow_dispatch
  as: maintainer
  params: { trigger_count: 2 }
fault_injection: null
assertions:
  - type: positive
    target: concurrency_cancel
    eval: deterministic
    rubric: "旧 Run cancelled；新 Run 正常执行；不同时 in_progress"
teardown:
  reset: none
