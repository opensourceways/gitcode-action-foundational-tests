id: COMPAT-EXPRFN-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: 表达式函数集差异
intent_ref: INTENT-COMPAT-004
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test-expression-functions:
      runs-on: default
      steps:
        - run: |
            echo "substring: ${{ substring('hello world', 0, 5) }}"
            echo "replace: ${{ replace('hello world', 'world', 'gitcode') }}"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "substring/replace 正确执行；join/fromJSON/case 使用时报错而非静默"
teardown:
  reset: fixture
