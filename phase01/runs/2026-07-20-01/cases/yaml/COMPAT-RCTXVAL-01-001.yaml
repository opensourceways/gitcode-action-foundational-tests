id: COMPAT-RCTXVAL-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: runner 上下文字段值格式差异
intent_ref: INTENT-COMPAT-011
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test:
      runs-on: default
      steps:
        - run: |
            echo "runner.os=${{ runner.os }}"
            echo "runner.arch=${{ runner.arch }}"
            echo "runner.temp=${{ runner.temp }}"
            echo "runner.tool_cache=${{ runner.tool_cache }}"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "runner.os/arch 返回值格式一致；runner.temp/tool_cache 路径存在可写"
teardown:
  reset: fixture
