id: REL-RUNNER-01-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: OOM kill job failure
intent_ref: INTENT-REL-012
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test:
      runs-on: {ubuntu-24,x64,small}
      steps:
        - run: node -e 'const a=[];while(true)a.push(Buffer.alloc(1e8))'
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: job_status
    eval: deterministic
    rubric: "job status = failure (OOM)；runner 继续存活不崩溃"
teardown:
  reset: fixture
