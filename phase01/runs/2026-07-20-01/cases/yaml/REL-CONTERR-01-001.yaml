id: REL-CONTERR-01-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: continue-on-error 失败传播
intent_ref: INTENT-REL-028
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    a:
      continue-on-error: true
      runs-on: default
      steps:
        - run: exit 1
    b:
      needs: [a]
      runs-on: default
      steps:
        - run: echo "B should be skipped"
    c:
      needs: [a]
      if: ${{ always }}
      runs-on: default
      steps:
        - run: echo "C always runs"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: continue_on_error
    eval: deterministic
    rubric: "A failure → workflow 继续；B skipped；C success；needs.a.result=failure"
teardown:
  reset: none
