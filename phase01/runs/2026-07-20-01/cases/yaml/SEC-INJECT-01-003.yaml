id: SEC-INJECT-01-003
dimensions: [security]
dimension: security
priority: P0
title: 分支名中的不可信输入不应通过 ${{ }} 直接插入 run: 导致命令注入
intent_ref: INTENT-SEC-011

setup:
  repo_fixture: with-secrets
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [push]
  jobs:
    test-branch-injection:
      runs-on: default
      steps:
        - name: Unsafe direct interpolation
          run: echo "Branch: ${{ atomgit.ref_name }}"
        - name: Safe intermediate env approach
          run: echo "Branch safely passed"
          env:
            BRANCH_NAME: ${{ atomgit.ref_name }}

trigger:
  event: push
  as: maintainer
  params:
    branch_name: "feature/zzz\";echo INJECTED_BY_BRANCH;#"

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "日志中不应出现 INJECTED_BY_BRANCH（注入命令不应被执行）"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "分支名中的 shell 特殊字符（; | $() 等）不应被解释执行"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "分支名作为字面字符串在日志中出现，特殊字符保持原样但不触发执行"

teardown:
  reset: fixture
