id: REL-RERUN-01-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: Re-run failed jobs 隔离
intent_ref: INTENT-REL-025
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    a:
      runs-on: default
      steps:
        - run: echo "A success"
    b:
      runs-on: default
      steps:
        - run: exit 1
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: rerun_failed
    eval: deterministic
    rubric: "Re-run failed 仅 B 重执行；A 保留 cached 状态不重执行"
teardown:
  reset: none
