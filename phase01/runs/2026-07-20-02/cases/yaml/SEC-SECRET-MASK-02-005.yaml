id: SEC-SECRET-MASK-02-005
dimensions:
  - security
dimension: security
priority: P1
title: "::add-mask:: 命令的正确性与安全性"
intent_ref: INTENT-SEC-027

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-add-mask:
      name: Test Add Mask
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Register mask and test
        run: 'echo "::add-mask::MY_DYNAMIC_SECRET"
  
          echo "MY_DYNAMIC_SECRET"
  
          echo "ADD_MASK_TEST_DONE"
  
          '
      - name: Test mask isolation across steps
        run: 'echo "::add-mask::ANOTHER_SECRET"
  
          echo "ANOTHER_SECRET"
  
          echo "MY_DYNAMIC_SECRET"
  
          echo "MASK_ISOLATION_TEST_DONE"
  
          '
      name: Test Add Mask
  name: '::add-mask:: 命令的正确性与安全性'

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "::add-mask:: 注册后 echo 注册值在日志中被遮蔽（显示 ***）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 ADD_MASK_TEST_DONE 和 MASK_ISOLATION_TEST_DONE"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不同 step 的 mask 表独立，不互相覆盖或泄露"

teardown:
  reset: fixture
