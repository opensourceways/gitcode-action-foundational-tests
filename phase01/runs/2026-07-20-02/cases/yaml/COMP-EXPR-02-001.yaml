id: COMP-EXPR-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证表达式状态函数不带括号语法 success/always/failed/cancelled"
intent_ref: INTENT-COMP-012

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    always-job:
      name: Always Job
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "FIRST_STEP_DONE"
      - if: ${{ success }}
        run: echo "SUCCESS_CONTEXT_TRUE"
      - if: ${{ always }}
        run: echo "ALWAYS_CONTEXT_TRUE"
      name: Always Job
    fail-job:
      name: Fail Job
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: exit 1
      name: Fail Job
    cleanup-after-fail:
      needs: fail-job
      if: ${{ failed }}
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "FAILED_CONTEXT_TRUE"
      name: Cleanup After Fail
  name: 验证表达式状态函数不带括号语法 success/always/failed/cancelled

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 SUCCESS_CONTEXT_TRUE 和 ALWAYS_CONTEXT_TRUE"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "cleanup-after-fail 日志含 FAILED_CONTEXT_TRUE"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不带括号表达式 success/always/failed 不应静默当字符串处理"

teardown:
  reset: fixture
