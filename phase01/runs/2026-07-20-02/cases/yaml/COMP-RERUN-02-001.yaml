id: COMP-RERUN-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证重运行机制 re-run all / re-run failed 的隔离性与状态保持"
intent_ref: INTENT-COMP-020

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    succeed-job:
      name: Succeed Job
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - run: echo "SUCCESS_JOB_DONE"
      name: Succeed Job
    fail-job:
      name: Fail Job
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: 'echo "FAIL_JOB_WILL_FAIL"
  
          exit 1
  
          '
      name: Fail Job
  name: 验证重运行机制 re-run all / re-run failed 的隔离性与状态保持

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "首次运行 succeed-job 日志含 SUCCESS_JOB_DONE"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "首次运行 fail-job 日志含 FAIL_JOB_WILL_FAIL 且 exit 1"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "Re-run failed jobs 仅 fail-job 重执行，succeed-job 保持原结果"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "Re-run 使用原始 commit 配置，atomgit.sha/ref/event_name 保持原值"

teardown:
  reset: fixture
