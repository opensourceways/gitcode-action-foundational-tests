id: COMP-CONTEXT-01-001
dimensions: [completeness]
dimension: completeness
priority: P1
title: 验证上下文对象 atomgit.* 的所有文档属性实际可用
intent_ref: INTENT-COMP-014
setup:
  repo_fixture: with-secrets
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    context-check:
      runs-on: default
      steps:
        - run: |
            echo "event_name=${{ atomgit.event_name }}"
            echo "sha=${{ atomgit.sha }}"
            echo "ref=${{ atomgit.ref }}"
            echo "ref_name=${{ atomgit.ref_name }}"
            echo "run_id=${{ atomgit.run_id }}"
            echo "run_number=${{ atomgit.run_number }}"
            echo "run_attempt=${{ atomgit.run_attempt }}"
            echo "workflow=${{ atomgit.workflow }}"
            echo "repository=${{ atomgit.repository }}"
            echo "server_url=${{ atomgit.server_url }}"
            echo "api_url=${{ atomgit.api_url }}"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "每个 atomgit.* 属性的输出为合法非空值"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "不应出现 null/undefined/空字符串（对于应有值的属性）"
teardown:
  reset: fixture
