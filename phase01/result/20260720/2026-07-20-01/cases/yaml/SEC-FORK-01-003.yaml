id: SEC-FORK-01-003
dimensions: [security]
dimension: security
priority: P0
title: pull_request_target 仅在 base 分支 workflow 定义中运行，不执行 fork 侧 workflow YAML
intent_ref: INTENT-SEC-003

setup:
  repo_fixture: with-secrets
  secrets: [DEPLOY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on: [pull_request_target]
  jobs:
    verify-base-workflow:
      runs-on: default
      steps:
        - uses: checkout
        - name: Base branch marker
          run: echo "BASE_BRANCH_WORKFLOW_EXECUTED"
        - name: Check fork modification not executed
          run: |
            # 如果 fork 侧添加了 FORK_MODIFIED_WORKFLOW 标记，
            # 此处不应出现。base 分支原始 workflow 不包含该标记。
            if echo "$RUN_LOG" | grep -q "FORK_MODIFIED_WORKFLOW"; then
              echo "FORK_WORKFLOW_EXECUTED_UNEXPECTEDLY"
              exit 1
            else
              echo "BASE_WORKFLOW_ONLY_AS_EXPECTED"
            fi

trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    event_type: pull_request_target

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中应出现 BASE_BRANCH_WORKFLOW_EXECUTED"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中应出现 BASE_WORKFLOW_ONLY_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "日志中不应出现 FORK_MODIFIED_WORKFLOW 或 FORK_WORKFLOW_EXECUTED_UNEXPECTEDLY"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "fork 侧新增的任何自定义 shell 命令不应出现在执行日志中"

teardown:
  reset: fixture
