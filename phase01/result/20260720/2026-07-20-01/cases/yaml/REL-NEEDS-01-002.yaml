id: REL-NEEDS-01-002
dimensions: [reliability]
dimension: reliability
priority: P1
title: needs 链失败传播
intent_ref: INTENT-REL-022
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    a:
      runs-on: default
      steps:
        - run: exit 1
    b:
      needs: [a]
      runs-on: default
      steps:
        - run: echo "B should be skipped"
    c:
      needs: [b]
      runs-on: default
      steps:
        - run: echo "C should be skipped"
    d:
      needs: [c]
      if: ${{ always }}
      runs-on: default
      steps:
        - run: echo "D always runs"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: needs_propagation
    eval: deterministic
    rubric: "A failure → B/C skipped；D (if:always()) success"
teardown:
  reset: none
