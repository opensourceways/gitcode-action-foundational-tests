id: USE-ERROR-01-005
dimensions: [usability]
dimension: usability
priority: P1
title: 表达式括号语法错误信息
intent_ref: INTENT-USE-005
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test:
      runs-on: default
      steps:
        - run: echo "valid"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: nonfunctional
    target: error_message
    eval: llm_assisted
    rubric: "使用 ${{ failure() }} GitHub 语法时报错含表达式位置+GitCode 不需要括号的提示"
teardown:
  reset: fixture
