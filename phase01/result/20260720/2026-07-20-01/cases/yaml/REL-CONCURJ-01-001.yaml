id: REL-CONCURJ-01-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: 跨 workflow concurrency 无死锁
intent_ref: INTENT-REL-021
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [workflow_dispatch]
  jobs:
    test:
      concurrency:
        enable: true
        max: 1
        exceed-action: QUEUE
      runs-on: default
      steps:
        - run: sleep 30
trigger:
  event: workflow_dispatch
  as: maintainer
  params: { trigger_count: 2 }
fault_injection: null
assertions:
  - type: positive
    target: concurrency_deadlock
    eval: deterministic
    rubric: "无死锁；5 分钟内全部到达终态；同 job 不出现两个同时 in_progress"
teardown:
  reset: none
