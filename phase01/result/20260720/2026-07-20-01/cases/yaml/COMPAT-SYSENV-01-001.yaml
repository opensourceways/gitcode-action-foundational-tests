id: COMPAT-SYSENV-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: 系统环境变量命名约定：ATOMGIT_* 注入完整性
intent_ref: INTENT-COMPAT-002
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    verify-env-vars:
      runs-on: default
      steps:
        - run: |
            echo "ATOMGIT_TOKEN=${{ secrets.atomgit_token != '' }}"
            echo "ATOMGIT_REPOSITORY=${{ atomgit.repository }}"
            echo "ATOMGIT_RUN_ID=${{ atomgit.run_id }}"
            echo "ATOMGIT_RUN_NUMBER=${{ atomgit.run_number }}"
            echo "ATOMGIT_WORKSPACE=${{ atomgit.workspace }}"
            echo "ATOMGIT_EVENT_NAME=${{ atomgit.event_name }}"
            echo "ATOMGIT_SHA=${{ atomgit.sha }}"
            echo "ATOMGIT_REF=${{ atomgit.ref }}"
            echo "ATOMGIT_ACTOR=${{ atomgit.actor }}"
            echo "ATOMGIT_SERVER_URL=${{ atomgit.server_url }}"
            echo "ATOMGIT_API_URL=${{ atomgit.api_url }}"
        - run: |
            echo "=== Checking file-based env protocols ==="
            echo "ATOMGIT_OUTPUT exists: $([ -f "$ATOMGIT_OUTPUT" ] && echo YES || echo NO)"
            echo "ATOMGIT_ENV exists: $([ -f "$ATOMGIT_ENV" ] && echo YES || echo NO)"
            echo "ATOMGIT_PATH exists: $([ -f "$ATOMGIT_PATH" ] && echo YES || echo NO)"
            echo "ATOMGIT_STEP_SUMMARY exists: $([ -f "$ATOMGIT_STEP_SUMMARY" ] && echo YES || echo NO)"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "所有文档列出的 ATOMGIT_* 系统变量在 Runner 环境中可用且值正确"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "ATOMGIT_OUTPUT/ENV/PATH/STEP_SUMMARY 文件路径存在且可写"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "$GITHUB_TOKEN 等 GitHub 命名不应静默返回空值（应 UNSET 或报错）"
teardown:
  reset: fixture
