id: REL-MATRIX-01-004
dimensions: [reliability]
dimension: reliability
priority: P1
title: strategy.max-parallel=3 并发限制
intent_ref: INTENT-REL-008
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    matrix-test:
      strategy:
        matrix:
          variant: [1, 2, 3, 4, 5, 6]
        max-parallel: 3
      runs-on: default
      steps:
        - run: sleep 30
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: matrix_max_parallel
    eval: deterministic
    rubric: "任意时刻 in_progress <= 3；6 个 job 全部完成无卡死"
teardown:
  reset: none
