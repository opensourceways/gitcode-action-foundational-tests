id: COMPAT-BACTREF-01-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: 内置 action 引用格式差异
intent_ref: INTENT-COMPAT-012
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test:
      runs-on: default
      steps:
        - uses: checkout
          with:
            ref: ${{ atomgit.ref }}
        - run: echo "Checkout successful, SHA: ${{ atomgit.sha }}"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "uses: checkout 短名正确解析；GitHub actions/checkout@v4 引用格式明确报错"
teardown:
  reset: fixture
