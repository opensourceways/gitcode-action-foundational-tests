id: USE-RERUN-01-001
dimensions: [usability]
dimension: usability
priority: P1
title: Re-run failed jobs 成功 job 日志保留
intent_ref: INTENT-USE-020

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [push]
  jobs:
    job-a-success:
      runs-on: default
      steps:
        - run: echo "job A done"
    job-b-fail:
      runs-on: default
      steps:
        - run: |
            echo "job B will fail"
            exit 1

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: ui_state_display
    eval: deterministic
    rubric: "Re-run failed jobs 后新 run 中成功的 job A 显示 cached/passed/已缓存/已通过（可截图判定）"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "成功 job A 的原始日志可在新 run 中展开查看"
  - type: positive
    target: ui_state_display
    eval: deterministic
    rubric: "原始 run 的日志完整保留未被清除或覆盖"
  - type: negative
    target: run_status
    eval: deterministic
    rubric: "成功的 job A 不应被隐式重新执行（不应消耗额外 Runner 资源）"

teardown:
  reset: fixture
