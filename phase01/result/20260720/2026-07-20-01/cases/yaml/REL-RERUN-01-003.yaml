id: REL-RERUN-01-003
dimensions: [reliability]
dimension: reliability
priority: P1
title: Re-run all 上下文变量
intent_ref: INTENT-REL-027
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test:
      runs-on: default
      steps:
        - run: |
            echo "RUN_ID=${{ atomgit.run_id }}"
            echo "RUN_NUMBER=${{ atomgit.run_number }}"
            echo "SHA=${{ atomgit.sha }}"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: rerun_context
    eval: deterministic
    rubric: "run_id 变化；run_number 递增；atomgit.sha 保持原值"
teardown:
  reset: none
