id: REL-CONCUR-01-002
dimensions: [reliability]
dimension: reliability
priority: P1
title: concurrency max=2 QUEUE 排队语义
intent_ref: INTENT-REL-002
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [workflow_dispatch]
  concurrency:
    enable: true
    max: 2
    exceed-action: QUEUE
  jobs:
    test:
      runs-on: default
      steps:
        - run: sleep 30
trigger:
  event: workflow_dispatch
  as: maintainer
  params: { trigger_count: 5 }
fault_injection: null
assertions:
  - type: positive
    target: concurrency_behavior
    eval: deterministic
    rubric: "任意时刻 in_progress <= 2；5 个 Run 全部到达 completed；排队 Run 自动开始"
teardown:
  reset: none
