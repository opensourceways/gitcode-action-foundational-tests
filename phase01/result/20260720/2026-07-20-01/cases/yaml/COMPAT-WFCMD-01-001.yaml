id: COMPAT-WFCMD-01-001
dimensions: [compatibility, usability]
dimension: compatibility
priority: P1
title: workflow 命令对标可用性
intent_ref: INTENT-COMPAT-024
setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default
workflow: |
  on: [push]
  jobs:
    test:
      runs-on: default
      steps:
        - run: |
            echo "::group::Build Section"
            echo "Building..."
            echo "::endgroup::"
            echo "::warning file=test.js,line=1::Deprecated API used"
            echo "::error file=app.js,line=10::Missing semicolon"
trigger:
  event: push
  as: maintainer
  params: {}
fault_injection: null
assertions:
  - type: positive
    target: workflow_commands
    eval: deterministic
    rubric: "::group::/::endgroup:: 日志折叠；::error::/::warning:: 创建注解；不支持时不失败"
teardown:
  reset: fixture
