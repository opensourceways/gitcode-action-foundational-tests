id: COMPAT-STAGES-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "stages 阶段机制：验证阶段间串行语义  fail_fast 正确性"
intent_ref: INTENT-COMPAT-017

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  stages:
  - name: build
    fail_fast: true
    jobs:
      compile:
        runs-on: [ubuntu-latest, x64, small]
        steps:
        - run: echo "Building..."
        - run: echo "Build complete"
      lint:
        runs-on: [ubuntu-latest, x64, small]
        steps:
        - run: echo "Linting..."
  - name: test
    jobs:
      unit-test:
        runs-on: [ubuntu-latest, x64, small]
        steps:
        - run: echo "Running unit tests..."
      integration-test:
        runs-on: [ubuntu-latest, x64, small]
        steps:
        - run: echo "Running integration tests..."
  - name: deploy
    jobs:
      deploy-staging:
        runs-on: [ubuntu-latest, x64, small]
        steps:
        - run: echo "Deploying to staging..."
  name: stages 阶段机制：验证阶段间串行语义 + fail_fast 正确性

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "build → test → deploy 按声明顺序串行执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "build stage 内的 compile 和 lint 并行执行"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "stage 内所有 job 完成后才进入下一 stage"

teardown:
  reset: fixture
