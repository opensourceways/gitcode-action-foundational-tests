id: COMPAT-EXPRSYN-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "验证状态函数不带括号时语法等价于 GitHub success()/failure()"
intent_ref: INTENT-COMPAT-003

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    success-job:
      name: Success Job
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "FIRST_STEP_OK"
      name: Success Job
    conditional-job:
      needs: success-job
      if: ${{ success }}
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "SUCCESS_CONDITION_TRUE"
      name: Conditional Job
    always-job:
      needs: success-job
      if: ${{ always }}
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "ALWAYS_CONDITION_TRUE"
      name: Always Job
  name: 验证状态函数不带括号时语法等价于 GitHub success()/failure()

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 SUCCESS_CONDITION_TRUE（${{ success }} 语义等价于 GitHub ${{ success() }}）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 ALWAYS_CONDITION_TRUE（${{ always }} 正确求值）"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "GitHub 括号语法 ${{ failure() }} 应有明确报错（非静默当字符串）"

teardown:
  reset: fixture
