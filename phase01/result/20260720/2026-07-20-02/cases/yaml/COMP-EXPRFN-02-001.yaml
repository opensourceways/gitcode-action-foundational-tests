id: COMP-EXPRFN-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证表达式函数边界行为 contains/startsWith/endsWith/format/hashFiles/toJson"
intent_ref: INTENT-COMP-013

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-expression-fns:
      name: Test Expression Fns
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Test contains
        if: ${{ contains('Hello World', 'Hello') }}
        run: echo "CONTAINS_WORKS"
      - name: Test startsWith
        if: ${{ startsWith('Hello', 'He') }}
        run: echo "STARTSWITH_WORKS"
      - name: Test endsWith
        if: ${{ endsWith('readme.txt', '.txt') }}
        run: echo "ENDSWITH_WORKS"
      - name: Test toJson
        run: echo "${{ toJson(fromJson('{"key":"val"}')) }}"
      - name: Test format
        run: echo "${{ format('{0} {1}', 'hello', 'world') }}"
      name: Test Expression Fns
  name: 验证表达式函数边界行为 contains/startsWith/endsWith/format/ha

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 CONTAINS_WORKS、STARTSWITH_WORKS、ENDSWITH_WORKS"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "toJson 返回合法 JSON 字符串，format 返回 'hello world'"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "边界输入（空串/缺参数）不导致崩溃或静默跳过"

teardown:
  reset: fixture
