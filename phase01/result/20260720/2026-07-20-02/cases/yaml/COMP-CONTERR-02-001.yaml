id: COMP-CONTERR-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 continue-on-error 对 job DAG 失败传播的影响"
intent_ref: INTENT-COMP-023

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    job-a:
      continue-on-error: true
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: exit 1
      name: Job A
    job-b:
      needs: job-a
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "JOB_B_DEFAULT_IF_SHOULD_BE_SKIPPED"
      name: Job B
    job-c:
      needs: job-a
      if: ${{ always }}
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "JOB_C_ALWAYS_EXECUTED"
      name: Job C
  name: 验证 continue-on-error 对 job DAG 失败传播的影响

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "continue-on-error 的 job-a 失败不阻断 workflow 整体"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job-b（默认 if: success()）被 skipped"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-c（if: always()）执行，日志含 JOB_C_ALWAYS_EXECUTED"

teardown:
  reset: fixture
