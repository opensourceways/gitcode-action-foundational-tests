id: COMP-STAGES-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 stages 阶段机制串行推进、fail_fast 与 job 并行"
intent_ref: INTENT-COMP-009

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  stages:
  - name: prepare
    fail_fast: true
    jobs:
      prep-1:
        runs-on:
          ubuntu-24: null
          x64: null
          small: null
        steps:
        - name: (TC) checkout
          uses: checkout
        - run: echo "PREP_1_DONE"
      prep-2:
        runs-on:
          ubuntu-24: null
          x64: null
          small: null
        steps:
        - run: echo "PREP_2_DONE"
  - name: build
    jobs:
      build-main:
        runs-on:
          ubuntu-24: null
          x64: null
          small: null
        steps:
        - run: echo "BUILD_MAIN_DONE"
  name: 验证 stages 阶段机制串行推进、fail_fast 与 job 并行

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "Stage prepare 的两个 job（prep-1/2）并行执行"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "Stage prepare 全部完成后 Stage build 才开始（build-main 在 prep 之后）"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志含 PREP_1_DONE、PREP_2_DONE、BUILD_MAIN_DONE"

teardown:
  reset: fixture
