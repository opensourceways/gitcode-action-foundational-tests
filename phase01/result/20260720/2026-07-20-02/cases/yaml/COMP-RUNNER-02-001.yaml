id: COMP-RUNNER-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 runner 标签匹配三段式标签、default 等效、自托管全匹配"
intent_ref: INTENT-COMP-017

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    runner-test:
      name: Runner Test
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Verify runner assigned
        run: 'echo "RUNNER_OS=${{ runner.os }}"
  
          echo "RUNNER_ARCH=${{ runner.arch }}"
  
          echo "RUNNER_NAME=${{ runner.name }}"
  
          '
      name: Runner Test
  name: 验证 runner 标签匹配三段式标签、default 等效、自托管全匹配

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "三段式标签 {ubuntu-24,x64,small} 正确匹配 runner"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "runner.os 和 runner.arch 输出非空且格式正确"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "无匹配 runner 时不随机分配到不匹配的 runner"

teardown:
  reset: fixture
