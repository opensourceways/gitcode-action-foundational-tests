id: SEC-SECRET-03-001
dimensions: [security]
dimension: security
priority: P0
title: "Secret 全生命周期管理——创建、更新、删除、过期"
intent_ref: INTENT-SEC-045

setup:
  repo_fixture: with-secret-lifecycle-management
  secrets: [LIFECYCLE_KEY]
  variables: {}
  branch_protection: default

workflow: |
  on: [push]
  permissions: {}
  jobs:
    lifecycle-check:
      name: (SEC-SECRET-03-001) 验证 Secret 生命周期
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (SEC-SECRET-03-001) 读取 Secret 当前值
          run: |
            if [ -n "${SECRET_VALUE}" ]; then
              echo "SECRET_AVAILABLE: yes"
              echo "SECRET_LENGTH: ${#SECRET_VALUE}"
            else
              echo "SECRET_AVAILABLE: no"
              echo "SECRET_DELETED_OR_EMPTY: yes"
            fi
          env:
            SECRET_VALUE: ${{ secrets.LIFECYCLE_KEY }}
        - name: (SEC-SECRET-03-001) 尝试 API 认证
          if: ${{ always() }}
          run: |
            if [ -n "${SECRET_VALUE}" ]; then
              echo "TOKEN_PRESENT: yes"
            else
              echo "TOKEN_PRESENT: no"
              echo "SECRET_LIFECYCLE_DELETED: verified"
            fi
          env:
            SECRET_VALUE: ${{ secrets.LIFECYCLE_KEY }}

trigger:
  event: push
  as: maintainer
  params:
    lifecycle_phase: create_update_delete_verify

fault_injection: null

assertions:
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "创建后 SECRET_AVAILABLE 为 yes；更新后新 run 使用新值"
  - type: negative
    target: step_logs
    eval: deterministic
    rubric: "删除后 SECRET_AVAILABLE 为 no 或 SECRET_DELETED_OR_EMPTY 为 yes"

teardown:
  reset: fixture
