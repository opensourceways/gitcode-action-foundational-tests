id: COMP-DAG-02-001
dimensions:
  - completeness
dimension: completeness
priority: P1
title: "验证 job DAG needs 依赖拓扑的正确执行与失败传播"
intent_ref: INTENT-COMP-003

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    job-a:
      name: Job A
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: exit 1
      name: Job A
    job-b:
      needs: job-a
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "JOB_B_EXECUTED"
      name: Job B
    job-c:
      needs: job-b
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "JOB_C_EXECUTED"
      name: Job C
    job-d:
      needs:
      - job-a
      - job-b
      if: ${{ always }}
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "JOB_D_ALWAYS_EXECUTED"
      name: Job D
    parallel-1:
      name: Parallel 1
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "PARALLEL_1_DONE"
      name: Parallel 1
    parallel-2:
      name: Parallel 2
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - run: echo "PARALLEL_2_DONE"
      name: Parallel 2
  name: 验证 job DAG needs 依赖拓扑的正确执行与失败传播

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "job-a 失败 → job-b/job-c 状态为 skipped"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "job-d（if: always()）执行，日志含 JOB_D_ALWAYS_EXECUTED"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "无 needs 的 parallel-1/2 并行执行，日志含 PARALLEL_1_DONE 和 PARALLEL_2_DONE"

teardown:
  reset: fixture
