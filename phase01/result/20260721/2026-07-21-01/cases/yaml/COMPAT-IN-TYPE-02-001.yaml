id: COMPAT-IN-TYPE-02-001
dimensions:
  - compatibility
dimension: compatibility
priority: P1
title: "inputs 类型限制：验证非 string 类型（boolean/number/choice）的拒绝行为"
intent_ref: INTENT-COMPAT-016

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    workflow_dispatch:
      inputs:
        mode:
          type: boolean
          default: true
          description: dry run mode
  jobs:
    test:
      name: Test
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - run: echo "Should not reach here if boolean type rejected"
      name: Test
  name: inputs 类型限制：验证非 string 类型（boolean/number/choice）的拒

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "type: boolean 的 inputs 应被拒绝（workflow 解析/触发时报错）"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不应静默将 boolean 当 string 处理"

teardown:
  reset: fixture
