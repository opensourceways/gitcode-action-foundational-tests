id: USE-DOC-02-003
dimensions:
  - usability
dimension: usability
priority: P1
title: "文档声明的 runner.os / runner.arch 返回值与平台实际返回值的一致性"
intent_ref: INTENT-USE-009

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  name: USE-DOC-02-003-runner-context
  on:
    workflow_dispatch:

  jobs:
    check-runner-values:
      name: check-runner-values
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: 输出 runner 上下文并对比文档声明
          run: |
            echo "runner.os=${{ runner.os }}"
            echo "runner.arch=${{ runner.arch }}"
            echo "runner.name=${{ runner.name }}"
            echo "---"
            echo "Expected (per docs): runner.os=Linux, runner.arch=X64"
            echo "Actual:    runner.os=${{ runner.os }}, runner.arch=${{ runner.arch }}"

trigger:
  event: workflow_dispatch
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "runner.os 和 runner.arch 返回值与文档声明完全一致（字符串精确匹配，大小写敏感）"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "若实际值为 linux（全小写）而文档声明为 Linux，则为 FAIL"

teardown:
  reset: fixture
