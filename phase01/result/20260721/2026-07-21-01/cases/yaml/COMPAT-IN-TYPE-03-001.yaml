id: COMPAT-IN-TYPE-03-001
dimensions: [compatibility, reliability]
dimension: compatibility
priority: P0
title: "inputs 字符串 3.10 隐式转换为数字 3.1 的回归验证——历史 #75"
intent_ref: INTENT-COMPAT-016

setup:
  repo_fixture: standard
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - workflow_dispatch
    inputs:
      version:
        type: string
        default: "3.10"
  jobs:
    test-type:
      name: test-input-type-preservation
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: print inputs version
          run: |
            echo "INPUTS_VERSION: ${{ inputs.version }}"
            echo "INPUTS_VERSION_LEN: $(echo -n '${{ inputs.version }}' | wc -c)"
        - name: verify string equality
          if: ${{ always() }}
          run: |
            if [ "${{ inputs.version }}" = "3.10" ]; then
              echo "STRING_MATCH: yes"
            else
              echo "STRING_MATCH: no (got: ${{ inputs.version }})"
              echo "NOTE: 已知 #75 回归——隐式类型转换 bug"
            fi

trigger:
  event: workflow_dispatch
  as: maintainer
  params:
    version: "3.10"

fault_injection: null

assertions:
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "INPUTS_VERSION=3.10（严格字符串），STRING_MATCH=yes"
  - type: negative
    target: step_logs
    eval: deterministic
    rubric: "INPUTS_VERSION 不应为 3.1（隐式 number 转换）"

teardown:
  reset: fixture
