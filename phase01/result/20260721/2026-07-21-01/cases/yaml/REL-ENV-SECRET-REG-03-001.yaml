id: REL-ENV-SECRET-REG-03-001
dimensions: [reliability]
dimension: reliability
priority: P1
title: "同一 secret 两次引用不报 bad substitution——历史 #11 回归"
intent_ref: INTENT-REL-048

setup:
  repo_fixture: with-secrets
  secrets: [MY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    secret-test:
      name: secret-double-reference-test
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: first reference to secret
          run: echo "FIRST_REF: ${{ secrets.MY_TOKEN }}"
        - name: second reference to same secret
          run: echo "SECOND_REF: ${{ secrets.MY_TOKEN }}"
        - name: verify no bad substitution
          if: ${{ always() }}
          run: echo "NO_BAD_SUBSTITUTION: yes"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "step1 和 step2 均 success，NO_BAD_SUBSTITUTION=yes"
  - type: negative
    target: step_logs
    eval: deterministic
    rubric: "step2 不报 'bad substitution'（历史 #11 回归）"

teardown:
  reset: fixture
