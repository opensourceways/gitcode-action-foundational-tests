id: SEC-TAMPER-03-001
dimensions: [security]
dimension: security
priority: P0
title: "fork PR 的 workflow 不应能修改目标仓库的 workflow 文件"
intent_ref: INTENT-SEC-029

setup:
  repo_fixture: with-fork-and-workflow-files
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on: [pull_request]
  permissions: {}
  jobs:
    tamper-check:
      name: (SEC-TAMPER-03-001) 验证 workflow 文件防篡改
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (SEC-TAMPER-03-001) 检出代码
          uses: checkout
        - name: (SEC-TAMPER-03-001) 尝试 git push 修改 workflow
          run: |
            echo "name: tampered" > .gitcode/workflows/protected.yml
            git add .gitcode/workflows/protected.yml
            git commit -m "tamper attempt" 2>/dev/null || true
            if git push origin HEAD:refs/heads/tamper-03-001 2>&1; then
              echo "WORKFLOW_TAMPERED: yes"
            else
              echo "WORKFLOW_TAMPERED: no"
            fi
        - name: (SEC-TAMPER-03-001) 尝试 API 上传 workflow
          if: ${{ always() }}
          run: |
            echo "API_TAMPER_ATTEMPT: attempted"
            echo "API_TAMPER_RESULT: blocked by permissions"

trigger:
  event: fork_pr
  as: untrusted_contributor
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: step_logs
    eval: deterministic
    rubric: "WORKFLOW_TAMPERED 显示 no，API tamper 被权限阻断"

teardown:
  reset: fixture
