id: COMP-PERM-MIN-03-001
dimensions: [completeness, security]
dimension: completeness
priority: P1
title: "permissions: {} 最小权限语义：验证 ATOMGIT_TOKEN 仅可读仓库"
intent_ref: INTENT-COMP-029

setup:
  repo_fixture: standard
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  permissions: {}
  jobs:
    perm-test:
      name: minimal-permissions-test
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: verify token exists
          run: |
            if [ -n "$ATOMGIT_TOKEN" ]; then
              echo "TOKEN_AVAILABLE: yes"
            else
              echo "TOKEN_AVAILABLE: no"
            fi
        - name: verify repository read access
          run: |
            echo "REPOSITORY: ${{ atomgit.repository }}"
            echo "REF: ${{ atomgit.ref }}"
            echo "BASIC_READ_OK: yes"
        - name: log permissions scope
          run: |
            echo "PERMISSIONS_EMPTY_OBJECT: true"
            echo "EXPECTED_SCOPE: repository:read only"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: step_logs
    eval: deterministic
    rubric: "TOKEN_AVAILABLE=yes, BASIC_READ_OK=yes——token 可读仓库"
  - type: nonfunctional
    target: step_logs
    eval: llm_assisted
    rubric: "若权限宽于 repository:read——标记为安全风险。文档应明确 permissions:{} 的实际权限范围"

teardown:
  reset: fixture
