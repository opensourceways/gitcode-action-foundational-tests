id: USE-MIGR-02-002
dimensions:
  - usability
  - compatibility
dimension: usability
priority: P1
title: "runs-on 使用 GitHub 风格标签时的错误信息质量与迁移指引"
intent_ref: INTENT-USE-015

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-gitcode-runs-on:
      name: Test Gitcode Runs On
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Verify GitCode runs-on format works
        run: 'echo "RUNNER_OS=${{ runner.os }}"
  
          echo "GITCODE_RUNS_ON_WORKS"
  
          '
      name: Test Gitcode Runs On
  name: runs-on 使用 GitHub 风格标签时的错误信息质量与迁移指引

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "GitCode 三段式 runs-on 格式正确匹配，日志含 GITCODE_RUNS_ON_WORKS"
  - type: nonfunctional
    target: error_message
    eval: "llm_assisted"
    rubric: "使用 runs-on: ubuntu-latest 等 GitHub 格式时，报错指出标签格式不匹配，含三段式格式说明和可用标签示例"

teardown:
  reset: fixture
