id: COMPAT-WF-CALL-02-001
dimensions: [compatibility]
dimension: compatibility
priority: P1
title: "workflow_call 复用差异——嵌套层数、secrets 传递、inputs 类型与 GitHub 对齐"
intent_ref: INTENT-COMPAT-061

setup:
  repo_fixture: basic-ci
  secrets: ["CALLEE_SECRET"]
  variables: {}
  branch_protection: default

workflow: |
  name: Workflow Call Reuse
  on:
  - push
  jobs:
    caller:
      name: Caller Job
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Call reusable workflow
        uses: ./.gitcode/workflows/callee.yml
        with:
          input-val: hello
        secrets:
          callee-secret: ${{ secrets.CALLEE_SECRET }}

trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "callee 正确接收 input-val"
  - type: negative
    target: run_status
    eval: "deterministic"
    rubric: "超过 2 层嵌套被拒绝"

teardown:
  reset: fixture
