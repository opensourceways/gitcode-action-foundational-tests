id: COMPAT-VAR-02-002
dimensions:
  - compatibility
  - reliability
dimension: compatibility
priority: P1
title: "env > vars 优先级链在 Shell 中的真实覆盖回归验证"
intent_ref: INTENT-COMPAT-063

setup:
  repo_fixture: basic-ci
  secrets: []
  variables:
    ENV_LEVEL: vars
  branch_protection: default

workflow: |
  on:
  - push
  env:
    ENV_LEVEL: workflow
  jobs:
    env-priority:
      name: Env Priority
      runs-on:
      - ubuntu-latest
      - x64
      - small
      env:
        ENV_LEVEL: job
      steps:
      - name: Three-level priority
        env:
          ENV_LEVEL: step
        run: |
          echo "ENV_LEVEL=$ENV_LEVEL"
      - name: Vars isolation check
        run: |
          echo "ENV_LEVEL_NO_STEP_MAP=$ENV_LEVEL"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "step env 映射时，ENV_LEVEL 输出为 step"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "无 step env 映射时，ENV_LEVEL 输出为 job（vars 不直接介入 shell 覆盖）"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "不应出现 step env 定义但 shell 中为空或未定义（历史 TC-533 不应复现）"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "vars 与 env 同名时，shell 不应读到 vars 值而是 env 值"

teardown:
  reset: none
