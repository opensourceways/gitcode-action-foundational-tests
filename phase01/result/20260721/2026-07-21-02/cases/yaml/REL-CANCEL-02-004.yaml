id: REL-CANCEL-02-004
dimensions:
  - reliability
dimension: reliability
priority: P1
title: "手动取消时运行中 step 进程的终止信号与 grace period 行为"
intent_ref: INTENT-REL-037

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    signal-test:
      name: Signal Test
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Long sleep with child process
        run: |
          sleep 300 &
          CHILD_PID=$!
          echo "CHILD_STARTED:$CHILD_PID"
          wait $CHILD_PID
      - name: Post cleanup marker
        if: always()
        run: echo "POST_CLEANUP_MARKER"
      name: Signal Test

  name: 手动取消时运行中 step 进程的终止信号与 grace period 行为

trigger:
  event: push
  as: maintainer
  params:
    cancel_after_seconds: 30

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中出现 POST_CLEANUP_MARKER，表明 post 清理被执行"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "不应出现 runner 因僵尸进程长期占用导致 120s 后仍无法调度新 job 的情况"
  - type: nonfunctional
    target: run_status
    eval: deterministic
    rubric: "取消后 runner 在 60s 内可成功调度新探针 job"

teardown:
  reset: fixture
