id: SEC-INJECT-02-004
dimensions:
  - security
dimension: security
priority: P0
title: "提交信息中的不可信输入不应通过   直接插入 run: 导致命令注入"
intent_ref: INTENT-SEC-012

setup:
  repo_fixture: with-pr-trigger
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-injection:
      name: Test Injection
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo commit message (direct interpolation — VULNERABLE PATTERN)
        run: echo "${{ atomgit.event.head_commit.message }}"
      - name: Verify no injection executed
        run: "if [ -f /tmp/cmd_injection_marker ]; then
    echo \"INJECTION_SUCCEEDED_UNEXPECTEDLY\"\
          
    exit 1
  else
    echo \"NO_INJECTION_AS_EXPECTED\"
  fi
  "
      name: Test Injection
  name: '提交信息中的不可信输入不应通过 ${{ }} 直接插入 run: 导致命令注入'

trigger:
  event: fork_pr
  as: untrusted_contributor
  params:
    commit_message_contains_injection: True

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "日志中应出现 NO_INJECTION_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "日志中不应出现 INJECTION_SUCCEEDED_UNEXPECTEDLY"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "commit message 中的反引号命令替换不应被执行"

teardown:
  reset: fixture
