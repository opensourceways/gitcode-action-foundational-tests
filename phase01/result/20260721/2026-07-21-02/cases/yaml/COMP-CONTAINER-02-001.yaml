id: COMP-CONTAINER-02-001
dimensions:
  - completeness
  - security
dimension: completeness
priority: P1
title: "验证 job 级 container 自定义镜像执行能力（含私有镜像认证）"
intent_ref: INTENT-COMP-009

setup:
  repo_fixture: container-ci
  secrets: [REGISTRY_USERNAME, REGISTRY_PASSWORD]
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    public-image:
      name: Public Image
      runs-on: [ubuntu-latest, x64, small]
      container:
        image: node:18-alpine
      steps:
      - name: Check node version
        run: |
          node -v
          echo "CONTAINER_PUBLIC_OK"
    private-image:
      name: Private Image
      runs-on: [ubuntu-latest, x64, small]
      container:
        image: registry.example.com/private-image:latest
        credentials:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      steps:
      - name: Marker
        run: echo "CONTAINER_PRIVATE_OK"
    bad-creds:
      name: Bad Creds
      runs-on: [ubuntu-latest, x64, small]
      container:
        image: registry.example.com/private-image:latest
        credentials:
          username: wrong-user
          password: wrong-pass
      steps:
      - name: Should not reach
        run: echo "SHOULD_NOT_RUN"
      name: Bad Creds

  name: 验证 job 级 container 自定义镜像执行能力（含私有镜像认证）

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "public-image job 日志中出现 CONTAINER_PUBLIC_OK"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "private-image job 日志中出现 CONTAINER_PRIVATE_OK"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "bad-creds job 不应出现 SHOULD_NOT_RUN，且应有镜像拉取失败报错"
  - type: negative
    target: run_status
    eval: deterministic
    rubric: "bad-creds job 不应标记为 success（静默回退到宿主机）"

teardown:
  reset: fixture
