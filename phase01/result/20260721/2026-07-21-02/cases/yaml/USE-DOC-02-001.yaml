id: USE-DOC-02-001
dimensions:
  - usability
dimension: usability
priority: P2
title: "文档声明的 runner.os/runner.arch 返回值与平台实际返回值的一致性"
intent_ref: INTENT-USE-009

setup:
  repo_fixture: basic-ci
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
  - push
  jobs:
    test-runner-doc:
      name: Test Runner Doc
      runs-on:
      - ubuntu-latest
      - x64
      - small
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Report runner context for doc comparison
        run: 'echo "RUNNER_OS=${{ runner.os }}"
  
          echo "RUNNER_ARCH=${{ runner.arch }}"
  
          echo "RUNNER_DOC_CONSISTENCY_CHECK"
  
          '
      name: Test Runner Doc
  name: 文档声明的 runner.os/runner.arch 返回值与平台实际返回值的一致性

trigger:
  event: push
  as: maintainer

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "runner.os 实际返回值与文档声明一致"
  - type: positive
    target: run_logs
    eval: "deterministic"
    rubric: "runner.arch 实际返回值与文档声明一致"
  - type: negative
    target: run_logs
    eval: "deterministic"
    rubric: "不存在大小写/命名差异"

teardown:
  reset: fixture
