id: SEC-REFPROT-02-001
dimensions:
  - security
  - completeness
dimension: security
priority: P1
title: "保护分支上下文标志 atomgit.ref_protected 的可用性与正确性"
intent_ref: INTENT-SEC-037

setup:
  repo_fixture: branch-protected
  secrets: []
  variables: {}
  branch_protection: protected_main

workflow: |
  on:
  - push
  jobs:
    check-ref-protected:
      name: Check Ref Protected
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Echo ref_protected
        run: |
          echo "REF_PROTECTED=${{ atomgit.ref_protected }}"
          echo "ATOMGIT_REF_PROTECTED=$ATOMGIT_REF_PROTECTED"
    deploy-gate:
      name: Deploy Gate
      runs-on: [ubuntu-latest, x64, small]
      if: ${{ atomgit.ref_protected == true }}
      steps:
      - uses: checkout
        name: (TC) checkout
      - name: Deploy step marker
        run: echo "DEPLOY_STEP_EXECUTED"
      name: Deploy Gate

  name: 保护分支上下文标志 atomgit.ref_protected 的可用性与正确性

trigger:
  event: push
  as: maintainer
  params:
    branches:
      - main
      - feature/test

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "保护分支触发时日志中出现 REF_PROTECTED=true 且 DEPLOY_STEP_EXECUTED"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "未保护分支触发时不应出现 DEPLOY_STEP_EXECUTED（条件门控被跳过）"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "未保护分支上 atomgit.ref_protected 不应为 true"

teardown:
  reset: fixture
