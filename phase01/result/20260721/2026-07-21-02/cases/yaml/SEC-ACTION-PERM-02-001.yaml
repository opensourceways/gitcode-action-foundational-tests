id: SEC-ACTION-PERM-02-001
dimensions: [security]
dimension: security
priority: P1
title: "第三方 action 对 ATOMGIT_TOKEN / secret 的隐式获取受最小权限约束"
intent_ref: INTENT-SEC-022

setup:
  repo_fixture: with-secrets
  secrets: ["TEST_SECRET"]
  variables: {}
  branch_protection: default

workflow: |
  name: Third Party Action Permission
  on:
  - push
  permissions:
    repository: read
  jobs:
    third-party:
      name: Third Party Action
      runs-on: [ubuntu-latest, x64, small]
      steps:
      - name: (TC) checkout
        uses: checkout
      - name: Run third party action
        uses: some-third-party/action
        with:
          input-param: test

trigger:
  event: push
  as: maintainer
  params:

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: "TEST_SECRET"
  - type: positive
    target: run_status
    eval: "deterministic"
    rubric: "若权限不足则 action 失败或被限制"

teardown:
  reset: fixture
