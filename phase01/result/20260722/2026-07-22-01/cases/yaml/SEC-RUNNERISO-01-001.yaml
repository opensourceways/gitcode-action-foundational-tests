id: SEC-RUNNERISO-01-001
dimensions: [security]
dimension: security
priority: P0
title: 自托管 Runner 跨项目残留应被隔离
intent_ref: INTENT-SEC-022

setup:
  repo_fixture: self-hosted-runner-shared
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches: [main]
  jobs:
    test:
      name: Test self-hosted runner cross-project isolation
      runs-on: [self-hosted, x64]
      steps:
        - name: (TC) checkout source
          uses: checkout
        - name: (TC) check for cross-project residue
          run: |
            if [ -f "/opt/runner/residue/other_project_secret.txt" ]; then
              echo "cross_project_leak"
              exit 1
            else
              echo "cross_project_isolated"
            fi
        - name: (TC) check temp workspace of previous runs
          run: |
            if [ -d "/opt/runner/work/_previous_project" ]; then
              echo "workspace_leak"
              exit 1
            else
              echo "workspace_isolated"
            fi

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain: "cross_project_leak"
  - type: negative
    target: run_logs
    must_not_contain: "workspace_leak"
  - type: positive
    target: run_logs
    must_contain: "cross_project_isolated"
  - type: positive
    target: run_logs
    must_contain: "workspace_isolated"
  - type: positive
    target: run_status
    equals: completed

teardown:
  reset: full_instance
