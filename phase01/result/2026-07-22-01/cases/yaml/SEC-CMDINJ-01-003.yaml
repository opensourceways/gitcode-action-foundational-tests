id: SEC-CMDINJ-01-003
dimensions: [security]
dimension: security
priority: P0
title: 分支名不可直接插进 run 脚本导致命令注入
intent_ref: INTENT-SEC-010

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches: [main]
  jobs:
    test:
      name: Test branch name command injection
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout source
          uses: checkout
        - name: (TC) echo branch name from expression
          run: |
            echo "Branch is ${{ atomgit.ref }}"

trigger:
  event: push
  as: untrusted_contributor
  params:
    branch_name: "feature/test;cat /etc/passwd"

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain: "root:"
  - type: negative
    target: run_logs
    must_not_contain: "etc/passwd"
  - type: positive
    target: run_status
    in: [completed, failed]

teardown:
  reset: fixture
