id: COMP-PRSYNC-01-001
dimensions: [completeness, security]
dimension: completeness
priority: P0
title: PR 同步更新时 pull_request_target 权限保持验证
intent_ref: INTENT-COMP-004

setup:
  repo_fixture: with-secrets
  secrets: [DEPLOY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request_target:
      branches: [main]
  jobs:
    verify:
      name: Verify permission on PR sync
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout base ref
          uses: checkout
        - name: (TC) check secret access
          run: |
            SECRET_VAL="${{ secrets.DEPLOY_TOKEN }}"
            if [ -z "$SECRET_VAL" ]; then
              echo "SECRET_EMPTY_AS_EXPECTED"
            else
              echo "SECRET_LEAKED_ON_SYNC"
              exit 1
            fi
        - name: (TC) check write permission
          run: |
            if git push origin HEAD:refs/heads/test-sync-push 2>/dev/null; then
              echo "WRITE_ALLOWED_UNEXPECTEDLY"
              exit 1
            else
              echo "WRITE_PROTECTED_AS_EXPECTED"
            fi

trigger:
  event: pull_request_target
  as: untrusted_contributor
  params:
    action: synchronize

fault_injection: null

assertions:
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中应出现 SECRET_EMPTY_AS_EXPECTED"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中应出现 WRITE_PROTECTED_AS_EXPECTED"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "日志中不应出现 SECRET_LEAKED_ON_SYNC"
  - type: negative
    target: run_logs
    eval: deterministic
    rubric: "日志中不应出现 WRITE_ALLOWED_UNEXPECTEDLY"

teardown:
  reset: fixture
