id: SEC-CONCAT-01-001
dimensions: [security]
dimension: security
priority: P0
title: secret 通过字符串拼接输出不应绕过日志脱敏
intent_ref: INTENT-SEC-006

setup:
  repo_fixture: with-secrets
  secrets: [DEPLOY_TOKEN]
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches: [main]
  jobs:
    test:
      name: Test concat bypass masking
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout source
          uses: checkout
        - name: (TC) concatenate prefix and secret
          run: |
            echo "prefix_${DEPLOY_TOKEN}_suffix"
        - name: (TC) concatenate secret with static text
          run: |
            result="static_${DEPLOY_TOKEN}_end"
            echo "$result"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain_secret: DEPLOY_TOKEN
  - type: negative
    target: run_logs
    must_not_contain: "placeholder_for_concatenated_result"
  - type: positive
    target: run_status
    equals: completed

teardown:
  reset: fixture
