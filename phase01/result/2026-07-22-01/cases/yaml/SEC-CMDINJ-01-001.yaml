id: SEC-CMDINJ-01-001
dimensions: [security]
dimension: security
priority: P0
title: PR 标题不可直接插进 run 脚本导致命令注入
intent_ref: INTENT-SEC-009

setup:
  repo_fixture: with-secrets
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    pull_request_target:
      branches: [main]
  jobs:
    test:
      name: Test PR title command injection
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout source
          uses: checkout
        - name: (TC) echo PR title from expression
          run: |
            echo "PR title is ${{ atomgit.event.pull_request.title }}"

trigger:
  event: pull_request_target
  as: untrusted_contributor
  params:
    pr_title: "test ; cat /etc/passwd #"

fault_injection: null

assertions:
  - type: negative
    target: run_logs
    must_not_contain: "root:"
  - type: negative
    target: run_logs
    must_not_contain: "etc/passwd"
  - type: positive
    target: run_status
    in: [completed, failed]

teardown:
  reset: fixture
