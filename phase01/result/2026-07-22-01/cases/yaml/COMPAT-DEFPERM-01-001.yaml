id: COMPAT-DEFPERM-01-001
dimensions: [compatibility, security]
dimension: compatibility
priority: P0
title: 未声明 permissions 时跨仓库默认 TOKEN 权限验证
intent_ref: INTENT-COMPAT-002

setup:
  repo_fixture: default
  secrets: []
  variables: {}
  branch_protection: default

workflow: |
  on:
    push:
      branches: [main]
  jobs:
    test:
      name: Test default token cross-repo scope
      runs-on: [ubuntu-latest, x64, small]
      steps:
        - name: (TC) checkout source
          uses: checkout
        - name: (TC) try read cross-repo
          run: |
            curl -s -o /dev/null -w "%{http_code}" "${{ atomgit.api_url }}/repos/other-org/other-repo" -H "Authorization: token $ATOMGIT_TOKEN" || echo "READ_EXIT"
            echo "read_attempt_done"
        - name: (TC) try write cross-repo
          run: |
            curl -s -o /dev/null -w "%{http_code}" -X POST "${{ atomgit.api_url }}/repos/other-org/other-repo/issues" -H "Authorization: token $ATOMGIT_TOKEN" -H "Content-Type: application/json" -d '{"title":"test"}' || echo "WRITE_EXIT"
            echo "write_attempt_done"

trigger:
  event: push
  as: maintainer
  params: {}

fault_injection: null

assertions:
  - type: nonfunctional
    target: run_logs
    eval: llm_assisted
    rubric: "跨仓库写操作应返回 403/401 或被拒绝，不应成功创建资源"
  - type: positive
    target: run_logs
    eval: deterministic
    rubric: "日志中应出现 read_attempt_done 和 write_attempt_done"

teardown:
  reset: fixture
