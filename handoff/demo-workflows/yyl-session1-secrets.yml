name: yyl session1 secrets

on:
  workflow_dispatch:

jobs:
  tc_008_organization_secret:
    name: TC-008 organization secret
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.SECRET_ORG }}
    steps:
      - name: TC-008 assert organization secret available
        run: |
          test -n "$SECRET_VALUE"
          printf 'organization_secret_present=true\n'

  tc_009_project_secret:
    name: TC-009 project secret
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.SECRET_PROJ }}
    steps:
      - name: TC-009 assert project secret available
        run: |
          test -n "$SECRET_VALUE"
          printf 'project_secret_present=true\n'

  tc_011_secret_masking:
    name: TC-011 secret masking
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.MASK_TEST_SECRET }}
    steps:
      - name: TC-011 print disposable secret for masking
        run: |
          test -n "$SECRET_VALUE"
          printf 'mask_test_secret=%s\n' "$SECRET_VALUE"

  tc_100_atomgit_token_masking:
    name: TC-100 atomgit token masking
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.atomgit_token }}
    steps:
      - name: TC-100 print atomgit token for masking
        run: |
          test -n "$SECRET_VALUE"
          printf 'atomgit_token=%s\n' "$SECRET_VALUE"

  tc_101_npm_token_masking:
    name: TC-101 npm token masking
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: TC-101 print npm token for masking
        run: |
          test -n "$SECRET_VALUE"
          printf 'npm_token=%s\n' "$SECRET_VALUE"

  tc_102_supersecret_masking:
    name: TC-102 supersecret masking
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.SUPERSECRET }}
    steps:
      - name: TC-102 print supersecret for masking
        run: |
          test -n "$SECRET_VALUE"
          printf 'supersecret=%s\n' "$SECRET_VALUE"

  tc_443_secret_output_safety:
    name: TC-443 secret output safety
    runs-on: [ubuntu-latest, x64, small]
    steps:
      - name: TC-443 checkout workflow sources
        uses: checkout
        with:
          repository: ${{ atomgit.repositoryUrl }}
          token: ${{ secrets.YULIN_ATOMGIT_TOKEN }}
      - name: TC-443 audit secret output paths
        run: |
          marker='$'
          files=$(find .gitcode/workflows -maxdepth 1 -type f -name 'yyl-*.yml' -print | sort)
          test -n "$files"
          printf 'scanned_workflows:\n%s\n' "$files"
          scanned_workflow_count=$(printf '%s\n' "$files" | grep -c .)
          printf 'scanned_workflow_count=%s\n' "$scanned_workflow_count"

          direct_expression="(echo|printf).*${marker}\\{\\{[[:space:]]*secrets\."
          secret_output='(echo|printf|tee).*(\$\{?[A-Za-z0-9_]*(SECRET|TOKEN)[A-Za-z0-9_]*\}?)'
          secret_transform='(base64|xxd|od|hexdump).*(\$\{?[A-Za-z0-9_]*(SECRET|TOKEN)[A-Za-z0-9_]*\}?)'
          secret_slice='\$\{[A-Za-z0-9_]*(SECRET|TOKEN)[A-Za-z0-9_]*:[^}]+\}'

          unsafe=$(grep -n -H -E "$direct_expression|$secret_output|$secret_transform|$secret_slice" $files || true)
          unsafe=$(printf '%s\n' "$unsafe" | grep -v -E "(direct_expression=|secret_output=|secret_transform=|secret_slice=|unsafe=|unsafe_secret_output_matches|secret_output_audit_passed)" || true)
          unsafe=$(printf '%s\n' "$unsafe" | grep -v -E "printf '(mask_test_secret|atomgit_token|npm_token|supersecret)=%s\\\\n' \"\\\$SECRET_VALUE\"" || true)
          if test -n "$unsafe"; then
            printf 'unsafe_secret_output_matches:\n%s\n' "$unsafe"
            exit 1
          fi
          printf 'unsafe_secret_output_match_count=0\n'
          printf 'secret_output_audit_passed=true\n'

  tc_444_secret_persistence_safety:
    name: TC-444 secret persistence safety
    runs-on: [ubuntu-latest, x64, small]
    steps:
      - name: TC-444 checkout workflow sources
        uses: checkout
        with:
          repository: ${{ atomgit.repositoryUrl }}
          token: ${{ secrets.YULIN_ATOMGIT_TOKEN }}
      - name: TC-444 audit secret persistence paths
        run: |
          marker='$'
          files=$(find .gitcode/workflows -maxdepth 1 -type f -name 'yyl-*.yml' -print | sort)
          test -n "$files"
          printf 'scanned_workflows:\n%s\n' "$files"
          scanned_workflow_count=$(printf '%s\n' "$files" | grep -c .)
          printf 'scanned_workflow_count=%s\n' "$scanned_workflow_count"

          persistence_actions=$(grep -n -H -E 'uses:[[:space:]]*(upload-artifact|cache)([[:space:]]|$)' $files || true)
          persistence_action_count=$(printf '%s\n' "$persistence_actions" | grep -c . || true)
          printf 'artifact_cache_action_count=%s\n' "$persistence_action_count"
          if test -n "$persistence_actions"; then
            printf 'artifact_cache_actions:\n%s\n' "$persistence_actions"
          fi

          secret_parameter="^[^#]*(name|path|key|restore-keys):.*${marker}\\{\\{[[:space:]]*secrets\."
          secret_file_write='(>|>>|tee[[:space:]]+[^|]*).*(\$\{?[A-Za-z0-9_]*(SECRET|TOKEN)[A-Za-z0-9_]*\}?)|(\$\{?[A-Za-z0-9_]*(SECRET|TOKEN)[A-Za-z0-9_]*\}?).*(>|>>|tee[[:space:]]+)'
          unsafe=$(grep -n -H -E "$secret_parameter|$secret_file_write" $files || true)
          unsafe=$(printf '%s\n' "$unsafe" | grep -v -E "(secret_parameter=|secret_file_write=|unsafe=|unsafe_secret_persistence_matches|secret_persistence_audit_passed)" || true)
          if test -n "$unsafe"; then
            printf 'unsafe_secret_persistence_matches:\n%s\n' "$unsafe"
            exit 1
          fi
          printf 'unsafe_secret_persistence_match_count=0\n'
          printf 'secret_persistence_audit_passed=true\n'

  tc_530_undefined_secret:
    name: TC-530 undefined secret
    runs-on: [ubuntu-latest, x64, small]
    env:
      SECRET_VALUE: ${{ secrets.YULIN_TC530_NOT_DEFINED }}
    steps:
      - name: TC-530 assert undefined secret empty
        run: |
          test -z "$SECRET_VALUE"
          printf 'undefined_secret_empty=true\n'
